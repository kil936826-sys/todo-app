name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        run: |
          mkdir -p "$HOME/android-sdk"
          cd "$HOME/android-sdk"
          curl -s -O https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
          unzip -q commandlinetools-linux-11076708_latest.zip
          yes | cmdline-tools/bin/sdkmanager --sdk_root="$HOME/android-sdk" --licenses
          cmdline-tools/bin/sdkmanager --sdk_root="$HOME/android-sdk" "platforms;android-35" "build-tools;35.0.0"
          echo "ANDROID_SDK_ROOT=$HOME/android-sdk" >> "$GITHUB_ENV"

      - name: Install npm dependencies
        run: npm install

      - name: Make www directory for Capacitor
        run: |
          mkdir -p www/icons
          cp index.html sw.js manifest.json www/
          cp -r icons/ www/

      - name: Configure Capacitor
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.daily.app",
            "appName": "自律日常",
            "webDir": "www"
          }
          EOF

      - name: Add Android
        run: npx cap add android

      - name: Sync
        run: npx cap sync

      - name: Build APK
        run: cd android && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: daily-app-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
