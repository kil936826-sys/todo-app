<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>日常任务清单</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="任务清单">
<link rel="apple-touch-icon" href="./icons/apple-icon.png">
<meta name="theme-color" content="#0C0C14">
<link rel="manifest" href="./manifest.json">
<style>
:root {
  --bg: #0C0C14; --surface: #151520; --surface2: #1C1C2A;
  --border: rgba(255,255,255,0.06);
  --text: #EDEDF5; --text2: #9A9AB0; --text3: #5C5C72;
  --accent: #7C6FF7; --accent-glow: rgba(124,111,247,0.35);
  --danger: #FF5B5B; --success: #34D399; --warn: #FBBF24;
  --gradient-1: linear-gradient(135deg, #7C6FF7, #5B8DEF);
  --gradient-2: linear-gradient(135deg, #FF5B5B, #F97316);
  --gradient-3: linear-gradient(135deg, #34D399, #06B6D4);
  --font: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  --radius: 16px; --radius-sm: 10px;
  --safe-b: env(safe-area-inset-bottom,12px);
  --safe-t: env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;height:100vh;
  user-select:none;-webkit-user-select:none;
  background-image:
    radial-gradient(ellipse 80% 80% at 50% -20%, rgba(124,111,247,0.08), transparent),
    radial-gradient(ellipse 60% 60% at 90% 80%, rgba(91,141,239,0.06), transparent);
}

/* ========= HEADER ========= */
header{
  padding:14px 20px;padding-top:calc(14px + var(--safe-t));
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;z-index:10;
  background:linear-gradient(180deg,var(--bg) 60%,transparent);
}
header .logo{display:flex;align-items:center;gap:10px}
header .logo-icon{
  width:38px;height:38px;border-radius:12px;
  background:var(--gradient-1);display:flex;
  align-items:center;justify-content:center;font-size:1.1rem;
  box-shadow:0 4px 16px var(--accent-glow);
}
header h1{font-size:1.3rem;font-weight:700;letter-spacing:-0.3px}
header .datetime{text-align:right}
header .time{font-size:1.15rem;font-weight:700;color:var(--text);font-variant-numeric:tabular-nums}
header .date{font-size:0.72rem;color:var(--text2);margin-top:1px}

/* ========= POMODORO BAR ========= */
.pomo-bar{
  margin:0 16px 10px;padding:12px 16px;border-radius:var(--radius);
  background:linear-gradient(135deg,rgba(124,111,247,0.12),rgba(91,141,239,0.08));
  border:1px solid rgba(124,111,247,0.25);
  display:none;align-items:center;gap:10px;flex-shrink:0;
  backdrop-filter:blur(10px);
}
.pomo-bar.on{display:flex}
.pomo-bar .pomo-ring{
  width:44px;height:44px;flex-shrink:0;
}
.pomo-bar .pomo-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.pomo-bar .pomo-ring .bg{fill:none;stroke:rgba(255,255,255,0.06);stroke-width:4}
.pomo-bar .pomo-ring .fg{fill:none;stroke:url(#pomo-grad);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.pomo-bar .pomo-info{flex:1;min-width:0}
.pomo-bar .pomo-timer{font-size:1.5rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px}
.pomo-bar .pomo-label{font-size:0.7rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pomo-bar .pomo-stop{
  width:34px;height:34px;border-radius:50%;border:1.5px solid rgba(255,91,91,0.3);
  background:rgba(255,91,91,0.08);color:var(--danger);font-size:0.8rem;
  cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
}

/* ========= STATS ========= */
.stats{
  display:flex;gap:8px;padding:0 16px 12px;flex-shrink:0;
}
.stats .card{
  flex:1;background:var(--surface);border-radius:var(--radius-sm);
  padding:12px 10px;text-align:center;border:1px solid var(--border);
  cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;
}
.stats .card::after{
  content:"";position:absolute;top:0;left:0;right:0;height:2px;
  background:var(--gradient-1);opacity:0;transition:opacity 0.3s;
}
.stats .card:active{transform:scale(0.96)}
.stats .card.active::after{opacity:1}
.stats .card .num{font-size:1.5rem;font-weight:800;letter-spacing:-1px}
.stats .card .lbl{font-size:0.66rem;color:var(--text2);margin-top:2px}
.stats .card:nth-child(1) .num{color:var(--accent)}
.stats .card:nth-child(2) .num{color:var(--warn)}
.stats .card:nth-child(3) .num{color:var(--success)}
.stats .card:nth-child(4) .num{color:#F472B6}

/* ========= TABS ========= */
.tabs{
  display:flex;padding:0 16px;gap:4px;flex-shrink:0;
}
.tabs button{
  padding:8px 14px;border-radius:20px;border:none;
  background:transparent;color:var(--text2);
  font-family:var(--font);font-size:0.78rem;cursor:pointer;
  transition:all 0.25s;font-weight:500;
}
.tabs button.on{
  background:var(--surface2);color:var(--text);
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}

/* ========= ADD ROW ========= */
.add-row{
  display:flex;gap:8px;padding:10px 16px;flex-shrink:0;
}
.add-row .input-wrap{
  flex:1;display:flex;align-items:center;gap:8px;
  background:var(--surface);border-radius:var(--radius);
  border:1.5px solid var(--border);padding:4px 4px 4px 16px;
  transition:all 0.25s;
}
.add-row .input-wrap:focus-within{
  border-color:var(--accent);box-shadow:0 0 0 4px rgba(124,111,247,0.1);
}
.add-row input{
  flex:1;border:none;background:transparent;color:var(--text);
  font-family:var(--font);font-size:0.9rem;outline:none;
  min-width:0;padding:8px 0;
}
.add-row input::placeholder{color:var(--text3)}
.add-row .prio-btn{
  width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);
  background:var(--surface2);color:var(--text);cursor:pointer;
  font-size:0.85rem;flex-shrink:0;transition:all 0.2s;
}
.add-row .prio-btn:active{transform:scale(0.9)}
.add-row .btn-add{
  width:48px;height:48px;border-radius:var(--radius-sm);border:none;
  background:var(--gradient-1);color:#fff;font-size:1.3rem;
  cursor:pointer;flex-shrink:0;box-shadow:0 4px 14px var(--accent-glow);
  transition:all 0.2s;display:flex;align-items:center;justify-content:center;
}
.add-row .btn-add:active{transform:scale(0.92);filter:brightness(1.15)}

/* ========= LIST ========= */
.list-wrap{
  flex:1;overflow-y:auto;padding:0 16px;padding-bottom:var(--safe-b);
  -webkit-overflow-scrolling:touch;
}
.list-wrap::-webkit-scrollbar{display:none}

/* Empty */
.empty{display:flex;flex-direction:column;align-items:center;padding:50px 20px}
.empty .illu{width:100px;height:100px;margin-bottom:16px;opacity:0.6}
.empty .illu svg{width:100%;height:100%}
.empty .msg{font-size:0.95rem;color:var(--text3);font-weight:500}
.empty .sub{font-size:0.75rem;color:var(--text3);opacity:0.6;margin-top:6px}

/* Task card */
.task{
  background:var(--surface);border-radius:var(--radius);
  margin-bottom:8px;border:1px solid var(--border);
  overflow:hidden;transition:all 0.3s;
  animation:taskIn 0.35s ease-out;
}
@keyframes taskIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.task.done{opacity:0.45}
.task.overdue{border-left:3px solid var(--danger)}
.task-inner{
  display:flex;align-items:center;gap:12px;padding:14px 14px;
}
.task.done .task-inner .txt{text-decoration:line-through;color:var(--text3)}

/* Checkbox */
.check{
  width:26px;height:26px;border-radius:50%;flex-shrink:0;
  border:2px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s cubic-bezier(.4,0,.2,1);
}
.check.checked{
  background:var(--success);border-color:var(--success);
  animation:popIn 0.35s cubic-bezier(.4,0,.2,1);
}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.check.checked::after{content:"✓";color:#fff;font-size:0.75rem;font-weight:700}

/* Task body */
.task-body{flex:1;min-width:0;cursor:pointer}
.txt{font-size:0.9rem;font-weight:500;line-height:1.4;word-break:break-word}
.meta{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;font-size:0.68rem}
.badge{padding:3px 8px;border-radius:20px;font-weight:600}
.badge-prio-high{background:rgba(255,91,91,0.15);color:var(--danger)}
.badge-prio-mid{background:rgba(251,191,36,0.15);color:var(--warn)}
.badge-prio-low{background:rgba(52,211,153,0.15);color:var(--success)}
.badge-due{background:rgba(124,111,247,0.12);color:var(--accent)}
.badge-overdue{background:rgba(255,91,91,0.2);color:var(--danger);animation:glitch 2s infinite}
@keyframes glitch{0%,100%{opacity:1}50%{opacity:0.6}}
.badge-timer{background:rgba(52,211,153,0.15);color:var(--success);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

/* Actions */
.actions{display:flex;gap:4px;flex-shrink:0}
.actions button{
  width:34px;height:34px;border-radius:50%;border:none;
  cursor:pointer;font-size:0.85rem;background:transparent;
  display:flex;align-items:center;justify-content:center;transition:all 0.2s;
}
.actions button:active{transform:scale(0.85)}
.actions .btn-timer{color:var(--accent)}
.actions .btn-timer.on{color:var(--success);background:rgba(52,211,153,0.1)}
.actions .btn-del{color:var(--text3)}
.actions .btn-del:active{color:var(--danger);background:rgba(255,91,91,0.1)}

/* ========= BOTTOM BAR ========= */
.bot-bar{
  display:flex;gap:8px;padding:10px 16px;
  padding-bottom:calc(10px + var(--safe-b));
  border-top:1px solid var(--border);flex-shrink:0;
}
.bot-bar button{
  flex:1;padding:10px 12px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:var(--surface);
  color:var(--text2);font-family:var(--font);font-size:0.76rem;
  cursor:pointer;transition:all 0.2s;font-weight:500;
}
.bot-bar button:active{background:var(--surface2);color:var(--text)}

/* ========= SHEET ========= */
.overlay{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);
  z-index:200;justify-content:center;align-items:flex-end;
  backdrop-filter:blur(4px);
}
.overlay.show{display:flex}
.sheet{
  width:100%;max-width:500px;background:var(--surface);
  border-radius:24px 24px 0 0;padding:8px 20px 24px;
  padding-bottom:calc(24px + var(--safe-b));
  animation:slideUp 0.3s cubic-bezier(.4,0,.2,1);
  border-top:1px solid var(--border);
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet .handle{width:36px;height:4px;border-radius:2px;background:var(--text3);margin:12px auto 16px;opacity:0.3}
.sheet h3{font-size:1.05rem;font-weight:700;margin-bottom:16px}
.sheet .row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.sheet .row label{width:44px;flex-shrink:0;font-size:0.78rem;color:var(--text2);font-weight:500}
.sheet input,.sheet select{
  flex:1;padding:11px 14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--surface2);
  color:var(--text);font-family:var(--font);font-size:0.9rem;outline:none;
}
.sheet input:focus,.sheet select:focus{border-color:var(--accent)}
.sheet .btn-row{display:flex;gap:10px;margin-top:18px}
.sheet .btn-save{
  flex:2;padding:13px;border-radius:var(--radius-sm);border:none;
  background:var(--gradient-1);color:#fff;font-size:0.95rem;
  font-weight:700;cursor:pointer;font-family:var(--font);
}
.sheet .btn-save:active{filter:brightness(1.15);transform:scale(0.97)}
.sheet .btn-cancel{
  flex:1;padding:13px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:transparent;
  color:var(--text2);font-size:0.9rem;cursor:pointer;font-family:var(--font);
}

/* ========= INSTALL TOAST ========= */
.install-toast{
  position:fixed;top:calc(var(--safe-t) + 50px);left:50%;
  transform:translateX(-50%);z-index:300;
  background:var(--surface);border:1px solid var(--border);
  padding:10px 20px;border-radius:20px;font-size:0.8rem;
  cursor:pointer;display:none;white-space:nowrap;
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  animation:fadeIn 0.3s ease-out;
}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.install-toast.on{display:block}
</style>
</head>
<body>

<!-- SVG gradient defs (invisible) -->
<svg style="position:absolute;width:0;height:0" aria-hidden="true">
  <defs>
    <linearGradient id="pomo-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7C6FF7"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <linearGradient id="grad-check" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
</svg>

<!-- Install Toast -->
<div class="install-toast" id="install-toast" onclick="installApp()">
  📲 点此安装到手机桌面
</div>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-icon">✓</div>
    <h1>任务清单</h1>
  </div>
  <div class="datetime">
    <div class="time" id="live-time">00:00</div>
    <div class="date" id="live-date">周一 1/1</div>
  </div>
</header>

<!-- POMODORO BAR -->
<div class="pomo-bar" id="pomo-bar">
  <div class="pomo-ring">
    <svg viewBox="0 0 44 44">
      <circle class="bg" cx="22" cy="22" r="18"/>
      <circle class="fg" id="pomo-circle" cx="22" cy="22" r="18" stroke-dasharray="113.1" stroke-dashoffset="0"/>
    </svg>
  </div>
  <div class="pomo-info">
    <div class="pomo-timer" id="pomo-timer">25:00</div>
    <div class="pomo-label" id="pomo-task-label">专注中</div>
  </div>
  <button class="pomo-stop" onclick="stopPomo()">✕</button>
</div>

<!-- STATS -->
<div class="stats">
  <div class="card active" onclick="switchTab('all')" id="card-all">
    <div class="num" id="s-total">0</div><div class="lbl">全部</div>
  </div>
  <div class="card" onclick="switchTab('active')" id="card-active">
    <div class="num" id="s-active">0</div><div class="lbl">待办</div>
  </div>
  <div class="card" onclick="switchTab('done')" id="card-done">
    <div class="num" id="s-done">0</div><div class="lbl">已完成</div>
  </div>
  <div class="card">
    <div class="num" id="s-pomo">0</div><div class="lbl">🍅 番茄</div>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="on" onclick="switchTab('all')" id="tab-all">全部</button>
  <button onclick="switchTab('today')" id="tab-today">📅 今日</button>
  <button onclick="switchTab('active')" id="tab-active">⏳ 待办</button>
  <button onclick="switchTab('done')" id="tab-done">✅ 完成</button>
</div>

<!-- ADD ROW -->
<div class="add-row">
  <div class="input-wrap">
    <input id="task-input" placeholder="输入任务，支持「今天/明天」关键词…" enterkeyhint="done">
    <button class="prio-btn" id="btn-prio" onclick="cyclePrio()" title="优先级">🟡</button>
  </div>
  <button class="btn-add" onclick="addTask()">＋</button>
</div>

<!-- LIST -->
<div class="list-wrap" id="list"></div>

<!-- BOTTOM -->
<div class="bot-bar">
  <button onclick="batchClearDone()">🗑 清除完成</button>
  <button onclick="exportData()">📤 导出</button>
  <button onclick="importData()">📥 导入</button>
</div>

<!-- EDIT SHEET -->
<div class="overlay" id="edit-sheet">
  <div class="sheet">
    <div class="handle"></div>
    <h3>✏️ 编辑任务</h3>
    <div class="row"><label>内容</label><input id="e-text" placeholder="任务内容"></div>
    <div class="row"><label>截止</label><input type="date" id="e-due"></div>
    <div class="row"><label>优先级</label>
      <select id="e-prio">
        <option value="high">🔴 高优先级</option>
        <option value="mid">🟡 中优先级</option>
        <option value="low">🟢 低优先级</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn-save" onclick="saveEdit()">保存</button>
      <button class="btn-cancel" onclick="closeEdit()">取消</button>
    </div>
  </div>
</div>

<script>
// ==================== DATA ====================
const KEY="todo-pwa-v2";
let DB={tasks:[],pomos:0};
function save(){localStorage.setItem(KEY,JSON.stringify(DB))}
function load(){try{var d=JSON.parse(localStorage.getItem(KEY));if(d)DB=d}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ==================== ADD ====================
let addPrio="mid";
function cyclePrio(){
  var o=["mid","high","low"],i=o.indexOf(addPrio);
  addPrio=o[(i+1)%3];
  var e={high:"🔴",mid:"🟡",low:"🟢"};
  document.getElementById("btn-prio").textContent=e[addPrio];
}

function addTask(){
  var inp=document.getElementById("task-input"),txt=inp.value.trim();
  if(!txt)return;
  var due="",today=new Date().toISOString().split("T")[0];
  if(txt.indexOf("今天")!==-1){due=today;txt=txt.replace(/今天/g,"").trim()}
  else if(txt.indexOf("明天")!==-1){var t=new Date();t.setDate(t.getDate()+1);due=t.toISOString().split("T")[0];txt=txt.replace(/明天/g,"").trim()}
  else if(txt.indexOf("后天")!==-1){var t=new Date();t.setDate(t.getDate()+2);due=t.toISOString().split("T")[0];txt=txt.replace(/后天/g,"").trim()}
  DB.tasks.push({id:uid(),text:txt||inp.value.trim(),priority:addPrio,due:due,done:false,createdAt:new Date().toISOString()});
  save();inp.value="";addPrio="mid";
  document.getElementById("btn-prio").textContent="🟡";
  render();vibrate(10);
}

// ==================== TOGGLE / DELETE ====================
function toggleTask(id){
  var t=DB.tasks.find(function(x){return x.id===id});
  if(t){t.done=!t.done;save();render();vibrate(t.done?20:10)}
}
function deleteTask(id){
  DB.tasks=DB.tasks.filter(function(x){return x.id!==id});
  if(pomoId===id)stopPomo();
  save();render();vibrate(30);
}

// ==================== EDIT ====================
var editingId=null;
function openEdit(id){
  var t=DB.tasks.find(function(x){return x.id===id});
  if(!t)return;editingId=id;
  document.getElementById("e-text").value=t.text;
  document.getElementById("e-due").value=t.due;
  document.getElementById("e-prio").value=t.priority;
  document.getElementById("edit-sheet").classList.add("show");
}
function closeEdit(){
  editingId=null;
  document.getElementById("edit-sheet").classList.remove("show");
}
function saveEdit(){
  if(!editingId)return;
  var t=DB.tasks.find(function(x){return x.id===editingId});
  if(!t)return;
  t.text=document.getElementById("e-text").value.trim()||t.text;
  t.due=document.getElementById("e-due").value;
  t.priority=document.getElementById("e-prio").value;
  save();closeEdit();render();
}

// ==================== POMODORO ====================
var pomoId=null,pomoInt=null,pomoLeft=0,pomoBreak=false;
var WORK=25*60,BREAK=5*60,CIRC=113.1;

function startPomo(id){
  var t=DB.tasks.find(function(x){return x.id===id});
  if(!t||t.done)return;
  if(pomoInt)stopPomo();
  pomoId=id;pomoBreak=false;pomoLeft=WORK;
  document.getElementById("pomo-bar").classList.add("on");
  document.getElementById("pomo-task-label").textContent=t.text;
  updatePomo();render();

  pomoInt=setInterval(function(){
    pomoLeft--;
    updatePomo();
    if(pomoLeft<=0){
      if(!pomoBreak){
        DB.pomos++;save();
        pomoBreak=true;pomoLeft=BREAK;
        document.getElementById("pomo-task-label").textContent="☕ 休息一下";
        notify("🍅 番茄完成！","休息 5 分钟吧");vibrate([200,100,200]);
      }else{
        pomoBreak=false;pomoLeft=WORK;
        document.getElementById("pomo-task-label").textContent=t.text;
      }
      updatePomo();render();
    }
  },1000);

  if("Notification"in window&&Notification.permission==="default")Notification.requestPermission();
}

function stopPomo(){
  if(pomoInt){clearInterval(pomoInt);pomoInt=null}
  pomoId=null;
  document.getElementById("pomo-bar").classList.remove("on");
  render();
}

function updatePomo(){
  var total=pomoBreak?BREAK:WORK;
  var m=Math.floor(pomoLeft/60),s=pomoLeft%60;
  document.getElementById("pomo-timer").textContent=m+":"+String(s).padStart(2,"0");
  var off=CIRC*(1-pomoLeft/total);
  document.getElementById("pomo-circle").style.strokeDashoffset=off;
  document.getElementById("pomo-circle").style.stroke=pomoBreak?"#FBBF24":"url(#pomo-grad)";
}

function notify(title,body){
  if("Notification"in window&&Notification.permission==="granted"){
    new Notification(title,{body:body,icon:"./icons/icon-192.png",tag:"pomo"});
  }
}
function vibrate(p){if(navigator.vibrate)navigator.vibrate(p)}

// ==================== RENDER ====================
var tab="all";
function switchTab(t){
  tab=t;
  document.querySelectorAll(".tabs button").forEach(function(b){b.classList.remove("on")});
  var el=document.getElementById("tab-"+t);if(el)el.classList.add("on");
  document.querySelectorAll(".stats .card").forEach(function(c){c.classList.remove("active")});
  var card=document.getElementById("card-"+t);if(card)card.classList.add("active");
  render();
}

function filtered(){
  var today=new Date().toISOString().split("T")[0];
  var tasks=DB.tasks.slice();
  var po={high:0,mid:1,low:2};
  tasks.sort(function(a,b){
    if(a.done!==b.done)return a.done?1:-1;
    if(a.priority!==b.priority)return po[a.priority]-po[b.priority];
    return b.createdAt.localeCompare(a.createdAt);
  });
  if(tab==="active")return tasks.filter(function(t){return !t.done;});
  if(tab==="done")return tasks.filter(function(t){return t.done;});
  if(tab==="today")return tasks.filter(function(t){return t.due===today;});
  return tasks;
}

function render(){
  var tasks=filtered(),today=new Date().toISOString().split("T")[0];
  var listEl=document.getElementById("list"),all=DB.tasks;

  if(tasks.length===0){
    var ico=tab==="done"?"🎉":"📋",msg=tab==="done"?"还没有完成的任务":"暂无任务",sub=tab==="done"?"继续加油！":"输入任务开始吧";
    listEl.innerHTML='<div class="empty"><div class="illu"><svg viewBox="0 0 100 100" fill="none"><rect x="20" y="15" width="60" height="12" rx="4" fill="currentColor" opacity="0.2"/><rect x="20" y="35" width="45" height="12" rx="4" fill="currentColor" opacity="0.12"/><rect x="20" y="55" width="52" height="12" rx="4" fill="currentColor" opacity="0.15"/><rect x="20" y="75" width="38" height="12" rx="4" fill="currentColor" opacity="0.1"/><circle cx="82" cy="27" r="10" fill="#7C6FF7" opacity="0.3"/></svg></div><div class="msg">'+ico+' '+msg+'</div><div class="sub">'+sub+'</div></div>';
  }else{
    listEl.innerHTML=tasks.map(function(t){
      var over=t.due&&t.due<today&&!t.done;
      var pc="pri-"+t.priority;
      var pl={high:"🔴 高",mid:"🟡 中",low:"🟢 低"}[t.priority];
      var run=pomoId===t.id;

      var tags='<span class="badge badge-'+pc+'">'+pl+'</span>';
      if(t.due){
        if(t.due<today&&!t.done)tags+='<span class="badge badge-overdue">⚠ 已过期</span>';
        else if(t.due===today)tags+='<span class="badge badge-due">📅 今天</span>';
        else tags+='<span class="badge badge-due">📅 '+t.due+'</span>';
      }
      if(t.done)tags+='<span class="badge" style="color:var(--success);background:rgba(52,211,153,0.1)">✅ 完成</span>';
      if(run)tags+='<span class="badge badge-timer">🍅 计时中</span>';

      return '<div class="task'+ (t.done?" done":"") + (over?" overdue":"") +'">'+
        '<div class="task-inner">'+
        '<div class="check'+ (t.done?" checked":"") +'" onclick="toggleTask(\''+t.id+'\')"></div>'+
        '<div class="task-body" onclick="openEdit(\''+t.id+'\')">'+
        '<div class="txt">'+esc(t.text)+'</div>'+
        '<div class="meta">'+tags+'</div>'+
        '</div>'+
        '<div class="actions">'+
        (!t.done?'<button class="btn-timer'+(run?" on":"")+'" onclick="event.stopPropagation();startPomo(\''+t.id+'\')" title="番茄钟">🍅</button>':'')+
        '<button class="btn-del" onclick="event.stopPropagation();deleteTask(\''+t.id+'\')" title="删除">✕</button>'+
        '</div>'+
        '</div></div>';
    }).join("");
  }

  // Stats
  document.getElementById("s-total").textContent=all.length;
  document.getElementById("s-active").textContent=all.filter(function(t){return !t.done;}).length;
  document.getElementById("s-done").textContent=all.filter(function(t){return t.done;}).length;
  document.getElementById("s-pomo").textContent=DB.pomos;
}

function esc(s){return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}

// ==================== BATCH ====================
function batchClearDone(){
  var cnt=DB.tasks.filter(function(t){return t.done;}).length;
  if(cnt===0)return;
  if(confirm("删除 "+cnt+" 个已完成任务？")){DB.tasks=DB.tasks.filter(function(t){return !t.done;});save();render()}
}
function exportData(){
  var b=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});
  var a=document.createElement("a");a.href=URL.createObjectURL(b);
  a.download="todo-backup-"+new Date().toISOString().split("T")[0]+".json";a.click();
}
function importData(){
  var inp=document.createElement("input");inp.type="file";inp.accept=".json";
  inp.onchange=function(e){
    var f=e.target.files[0];if(!f)return;var r=new FileReader();
    r.onload=function(ev){
      try{var data=JSON.parse(ev.target.result);
        if(data.tasks&&Array.isArray(data.tasks)){
          if(confirm("将导入 "+data.tasks.length+" 个任务，确定？")){
            var ids=new Set(DB.tasks.map(function(t){return t.id;}));
            data.tasks.forEach(function(t){if(!ids.has(t.id))DB.tasks.push(t)});
            DB.pomos=Math.max(DB.pomos,data.pomos||0);save();render();
          }
        }
      }catch(ex){alert("文件格式错误")}
    };r.readAsText(f);
  };inp.click();
}

// ==================== CLOCK ====================
function tickClock(){
  var n=new Date(),wk=["周日","周一","周二","周三","周四","周五","周六"];
  document.getElementById("live-time").textContent=String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");
  document.getElementById("live-date").textContent=wk[n.getDay()]+" "+(n.getMonth()+1)+"/"+n.getDate();
}
tickClock();setInterval(tickClock,30000);

window.addEventListener("beforeinstallprompt",function(e){e.preventDefault();deferredPrompt=e;document.getElementById("install-toast").classList.add("on")});
function installApp(){
  if(deferredPrompt){
    deferredPrompt.prompt();deferredPrompt.userChoice.then(function(r){document.getElementById("install-toast").classList.remove("on");deferredPrompt=null})
  }else{

  }
}
if(navigator.standalone||window.matchMedia("(display-mode: standalone)").matches){document.getElementById("install-toast").classList.remove("on")}

// ==================== INIT ====================
load();render();
if("serviceWorker"in navigator){navigator.serviceWorker.register("./sw.js")}
document.getElementById("task-input").addEventListener("keydown",function(e){if(e.key==="Enter")addTask()});
document.getElementById("edit-sheet").addEventListener("click",function(e){if(e.target===this)closeEdit()});
