<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>日常任务清单</title>

<!-- PWA Meta -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="任务清单">
<link rel="apple-touch-icon" href="./icons/apple-icon.png">
<meta name="theme-color" content="#6c5ce7">
<link rel="manifest" href="./manifest.json">

<style>
  :root {
    --bg: #0f0f14; --card: #1a1a24; --border: #2a2a3a;
    --text: #e0e0e0; --muted: #777; --accent: #6c5ce7;
    --danger: #e74c3c; --success: #2ecc71; --warn: #f39c12;
    --font: "Segoe UI", "Microsoft YaHei", "PingFang SC", sans-serif;
    --safe-bottom: env(safe-area-inset-bottom, 16px);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font); background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; height: 100vh;
    height: -webkit-fill-available;
    user-select: none; -webkit-user-select: none;
  }

  /* ===== 顶部栏 ===== */
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 20px; padding-top: max(12px, env(safe-area-inset-top));
    background: var(--bg); flex-shrink: 0;
    border-bottom: 1px solid var(--border);
  }
  .top-bar h1 { font-size: 1.4rem; letter-spacing: 1px; }
  .top-bar .date-box { text-align: right; }
  .top-bar .live-time { font-size: 1.2rem; color: var(--accent); font-weight: bold; }
  .top-bar .live-date { font-size: 0.75rem; color: var(--muted); }

  /* ===== 番茄钟横幅 ===== */
  .pomo-banner {
    display: none; align-items: center; gap: 10px;
    padding: 10px 16px; background: linear-gradient(135deg, #1a1a30, #16213e);
    border-bottom: 1px solid var(--accent); flex-shrink: 0;
  }
  .pomo-banner.on { display: flex; }
  .pomo-banner .pomo-icon { font-size: 1.4rem; animation: bounce 0.6s infinite alternate; }
  @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-4px); } }
  .pomo-banner .pomo-timer { font-size: 1.6rem; font-weight: bold; color: var(--accent); font-variant-numeric: tabular-nums; }
  .pomo-banner .pomo-info { flex: 1; min-width: 0; }
  .pomo-banner .pomo-task { font-size: 0.8rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .pomo-banner .pomo-stop {
    padding: 6px 12px; border-radius: 6px; border: 1px solid var(--danger);
    background: transparent; color: var(--danger); font-size: 0.75rem; cursor: pointer;
    font-family: var(--font);
  }

  /* ===== 统计卡片 ===== */
  .stats-row {
    display: flex; gap: 8px; padding: 12px 16px; flex-shrink: 0;
  }
  .stat-card {
    flex: 1; background: var(--card); border-radius: 10px;
    padding: 10px 8px; text-align: center; border: 1px solid var(--border);
    cursor: pointer; transition: all 0.15s;
  }
  .stat-card:active { transform: scale(0.96); background: #222; }
  .stat-card .num { font-size: 1.3rem; font-weight: bold; color: var(--accent); }
  .stat-card .lbl { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }

  /* ===== Tab 切换 ===== */
  .tabs {
    display: flex; padding: 0 16px; gap: 2px; flex-shrink: 0;
  }
  .tabs button {
    flex: 1; padding: 10px 0; background: transparent; border: none;
    color: var(--muted); font-family: var(--font); font-size: 0.8rem;
    cursor: pointer; border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tabs button.on { color: var(--accent); border-bottom-color: var(--accent); font-weight: bold; }

  /* ===== 添加栏 ===== */
  .add-row {
    display: flex; gap: 6px; padding: 10px 16px; flex-shrink: 0;
  }
  .add-row input {
    flex: 1; padding: 10px 14px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--text); font-family: var(--font); font-size: 0.9rem;
    min-width: 0;
  }
  .add-row input:focus { border-color: var(--accent); outline: none; }
  .add-row .btn-add {
    width: 44px; height: 44px; border-radius: 10px; border: none;
    background: var(--accent); color: #fff; font-size: 1.3rem;
    cursor: pointer; flex-shrink: 0; font-family: var(--font);
    display: flex; align-items: center; justify-content: center;
  }
  .add-row .btn-add:active { filter: brightness(1.2); transform: scale(0.94); }
  .add-row .btn-opt {
    width: 44px; height: 44px; border-radius: 10px;
    border: 1px solid var(--border); background: var(--card);
    color: var(--muted); font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
  }

  /* ===== 任务列表（可滚动）===== */
  .task-scroll {
    flex: 1; overflow-y: auto; padding: 0 16px;
    padding-bottom: var(--safe-bottom);
    -webkit-overflow-scrolling: touch;
  }
  .empty-state {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; padding: 60px 20px; color: var(--muted);
  }
  .empty-state .icon { font-size: 3.5rem; margin-bottom: 10px; }
  .empty-state .txt { font-size: 0.9rem; }

  .task-item {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 12px; background: var(--card); border-radius: 12px;
    margin-bottom: 8px; border: 1px solid var(--border);
    transition: all 0.2s;
    transform: translateX(0);
  }
  .task-item.swiped { transform: translateX(-80px); }
  .task-item.done { opacity: 0.5; }
  .task-item.done .task-text { text-decoration: line-through; }
  .task-item.overdue { border-left: 3px solid var(--danger); }

  .check-circle {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
    border: 2px solid var(--border); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .check-circle.checked { background: var(--success); border-color: var(--success); }
  .check-circle.checked::after { content: "✓"; color: #fff; font-size: 0.7rem; font-weight: bold; }

  .task-body { flex: 1; min-width: 0; }
  .task-text { font-size: 0.9rem; word-break: break-word; line-height: 1.4; }
  .task-tags {
    display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap;
    font-size: 0.68rem;
  }
  .tag { padding: 2px 8px; border-radius: 10px; }
  .tag-pri-high { background: rgba(231,76,60,0.2); color: var(--danger); }
  .tag-pri-mid  { background: rgba(243,156,18,0.2); color: var(--warn); }
  .tag-pri-low  { background: rgba(46,204,113,0.2); color: var(--success); }
  .tag-due      { background: rgba(108,92,231,0.15); color: var(--accent); }
  .tag-overdue  { background: rgba(231,76,60,0.25); color: var(--danger); font-weight: bold; }
  .tag-timer    { background: rgba(46,204,113,0.2); color: var(--success); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .task-btns { display: flex; gap: 4px; flex-shrink: 0; }
  .task-btns button {
    width: 32px; height: 32px; border-radius: 8px; border: none;
    cursor: pointer; font-size: 0.85rem; background: transparent;
    color: var(--muted); display: flex; align-items: center; justify-content: center;
  }
  .task-btns button:active { background: var(--border); }
  .task-btns .btn-pomo { color: var(--accent); }
  .task-btns .btn-pomo.playing { color: var(--success); }
  .task-btns .btn-del { color: var(--danger); }

  /* ===== 底部操作栏 ===== */
  .bottom-bar {
    display: flex; gap: 8px; padding: 10px 16px;
    padding-bottom: max(10px, var(--safe-bottom));
    border-top: 1px solid var(--border); background: var(--bg);
    flex-shrink: 0;
  }
  .bottom-bar button {
    flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
    background: var(--card); color: var(--text); font-family: var(--font);
    font-size: 0.8rem; cursor: pointer;
  }
  .bottom-bar button:active { background: #222; }

  /* ===== 弹窗 ===== */
  .overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    z-index: 200; justify-content: center; align-items: flex-end;
  }
  .overlay.show { display: flex; }
  .sheet {
    width: 100%; max-width: 500px; background: var(--card);
    border-radius: 20px 20px 0 0; padding: 24px 20px;
    padding-bottom: max(24px, var(--safe-bottom));
    animation: slideUp 0.25s ease-out;
  }
  @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
  .sheet h3 { margin-bottom: 16px; font-size: 1.1rem; }
  .sheet .row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; }
  .sheet .row label { width: 50px; flex-shrink: 0; font-size: 0.8rem; color: var(--muted); }
  .sheet input, .sheet select {
    flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--bg); color: var(--text); font-family: var(--font); font-size: 0.9rem;
  }
  .sheet .btn-row { display: flex; gap: 10px; margin-top: 16px; }
  .sheet .btn-save {
    flex: 2; padding: 12px; border-radius: 10px; border: none;
    background: var(--accent); color: #fff; font-size: 0.95rem;
    font-weight: bold; cursor: pointer; font-family: var(--font);
  }
  .sheet .btn-cancel {
    flex: 1; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
    background: transparent; color: var(--muted); font-size: 0.9rem;
    cursor: pointer; font-family: var(--font);
  }

  /* ===== 安装提示 ===== */
  .install-toast {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    background: var(--accent); color: #fff; padding: 10px 20px;
    border-radius: 20px; font-size: 0.85rem; z-index: 300;
    cursor: pointer; box-shadow: 0 4px 20px rgba(108,92,231,0.5);
    display: none;
    animation: fadeDown 0.3s ease-out;
  }
  @keyframes fadeDown { from{opacity:0;transform:translateX(-50%) translateY(-20px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  .install-toast.on { display: block; }
</style>
</head>
<body>

<!-- 安装提示 -->
<div class="install-toast" id="install-toast" onclick="installApp()">
  📲 点击安装到手机桌面
</div>

<!-- 顶部栏 -->
<div class="top-bar">
  <h1>📋 任务清单</h1>
  <div class="date-box">
    <div class="live-time" id="live-time">00:00</div>
    <div class="live-date" id="live-date">周一 1/1</div>
  </div>
</div>

<!-- 番茄钟横幅 -->
<div class="pomo-banner" id="pomo-bar">
  <div class="pomo-icon">🍅</div>
  <div class="pomo-info">
    <div class="pomo-timer" id="pomo-timer">25:00</div>
    <div class="pomo-task" id="pomo-task-label">专注中</div>
  </div>
  <button class="pomo-stop" onclick="stopPomo()">⏹ 停</button>
</div>

<!-- 统计 -->
<div class="stats-row">
  <div class="stat-card" onclick="switchTab('all')"><div class="num" id="s-total">0</div><div class="lbl">全部</div></div>
  <div class="stat-card" onclick="switchTab('active')"><div class="num" id="s-active">0</div><div class="lbl">⏳ 待办</div></div>
  <div class="stat-card" onclick="switchTab('done')"><div class="num" id="s-done">0</div><div class="lbl">✅ 完成</div></div>
  <div class="stat-card"><div class="num" id="s-pomo">0</div><div class="lbl">🍅 番茄</div></div>
</div>

<!-- 标签页 -->
<div class="tabs">
  <button class="on" onclick="switchTab('all')" id="tab-all">全部</button>
  <button onclick="switchTab('today')" id="tab-today">📅 今日</button>
  <button onclick="switchTab('active')" id="tab-active">⏳ 待办</button>
  <button onclick="switchTab('done')" id="tab-done">✅ 完成</button>
</div>

<!-- 添加栏 -->
<div class="add-row">
  <input type="text" id="task-input" placeholder="输入新任务..." enterkeyhint="done">
  <button class="btn-opt" id="btn-prio" onclick="cyclePrio()" title="优先级">🟡</button>
  <button class="btn-add" onclick="addTask()">＋</button>
</div>

<!-- 列表 -->
<div class="task-scroll" id="list">
  <div class="empty-state">
    <div class="icon">📝</div>
    <div class="txt">还没有任务，添加一个吧</div>
  </div>
</div>

<!-- 底部 -->
<div class="bottom-bar">
  <button onclick="batchClearDone()">🗑 清除已完成</button>
  <button onclick="exportData()">📤 导出数据</button>
  <button onclick="importData()">📥 导入数据</button>
</div>

<!-- 编辑弹窗 -->
<div class="overlay" id="edit-sheet">
  <div class="sheet">
    <h3>✏️ 编辑任务</h3>
    <div class="row"><label>内容</label><input type="text" id="e-text"></div>
    <div class="row"><label>截止</label><input type="date" id="e-due"></div>
    <div class="row"><label>优先级</label>
      <select id="e-prio">
        <option value="high">🔴 高优先级</option>
        <option value="mid">🟡 中优先级</option>
        <option value="low">🟢 低优先级</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn-save" onclick="saveEdit()">💾 保存</button>
      <button class="btn-cancel" onclick="closeEdit()">取消</button>
    </div>
  </div>
</div>

<script>
// ===================== 数据层 =====================
const KEY = "todo-pwa-v2";
let DB = { tasks: [], pomos: 0, lastDate: "" };
function save() { localStorage.setItem(KEY, JSON.stringify(DB)); }
function load() { try { var d = JSON.parse(localStorage.getItem(KEY)); if (d) DB = d; } catch(e){} }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

// ===================== 任务操作 =====================
let addPrio = "mid";
function cyclePrio() {
  var order = ["mid","high","low"], idx = order.indexOf(addPrio);
  addPrio = order[(idx+1)%3];
  var emoji = {high:"🔴",mid:"🟡",low:"🟢"};
  document.getElementById("btn-prio").textContent = emoji[addPrio];
}

function addTask() {
  var inp = document.getElementById("task-input");
  var txt = inp.value.trim();
  if (!txt) return;

  // 解析截止日期关键词
  var due = "";
  var today = new Date().toISOString().split("T")[0];
  if (txt.indexOf("今天")!==-1) { due = today; txt = txt.replace(/今天/g,"").trim(); }
  else if (txt.indexOf("明天")!==-1) { var t=new Date();t.setDate(t.getDate()+1); due=t.toISOString().split("T")[0]; txt=txt.replace(/明天/g,"").trim(); }
  else if (txt.indexOf("后天")!==-1) { var t=new Date();t.setDate(t.getDate()+2); due=t.toISOString().split("T")[0]; txt=txt.replace(/后天/g,"").trim(); }

  DB.tasks.push({
    id: uid(), text: txt || inp.value.trim(),
    priority: addPrio, due: due,
    done: false, createdAt: new Date().toISOString()
  });
  save(); inp.value = ""; addPrio = "mid";
  document.getElementById("btn-prio").textContent = "🟡";
  render(); vibrate(10);
}

function toggleTask(id) {
  var t = DB.tasks.find(function(x){return x.id===id;});
  if (t) { t.done = !t.done; save(); render(); vibrate(t.done?20:10); }
}

function deleteTask(id) {
  DB.tasks = DB.tasks.filter(function(x){return x.id!==id;});
  if (pomoId === id) stopPomo();
  save(); render(); vibrate(30);
}

// ===================== 编辑弹窗 =====================
var editingId = null;
function openEdit(id) {
  var t = DB.tasks.find(function(x){return x.id===id;});
  if (!t) return; editingId = id;
  document.getElementById("e-text").value = t.text;
  document.getElementById("e-due").value = t.due;
  document.getElementById("e-prio").value = t.priority;
  document.getElementById("edit-sheet").classList.add("show");
}
function closeEdit() {
  editingId = null;
  document.getElementById("edit-sheet").classList.remove("show");
}
function saveEdit() {
  if (!editingId) return;
  var t = DB.tasks.find(function(x){return x.id===editingId;});
  if (!t) return;
  t.text = document.getElementById("e-text").value.trim() || t.text;
  t.due = document.getElementById("e-due").value;
  t.priority = document.getElementById("e-prio").value;
  save(); closeEdit(); render();
}

// ===================== 番茄钟 =====================
var pomoId = null, pomoTimer = null, pomoLeft = 0, pomoBreak = false;
var WORK = 25*60, BREAK = 5*60;

function startPomo(id) {
  var t = DB.tasks.find(function(x){return x.id===id;});
  if (!t || t.done) return;
  if (pomoTimer) stopPomo();
  pomoId = id; pomoBreak = false; pomoLeft = WORK;
  document.getElementById("pomo-bar").classList.add("on");
  document.getElementById("pomo-task-label").textContent = t.text;
  tickPomo(); render();

  pomoTimer = setInterval(function(){
    pomoLeft--;
    tickPomo();
    if (pomoLeft <= 0) {
      if (!pomoBreak) {
        DB.pomos++; save();
        pomoBreak = true; pomoLeft = BREAK;
        document.getElementById("pomo-task-label").textContent = "☕ 休息一下";
        notify("🍅 番茄完成！", "休息 5 分钟吧");
        vibrate([200,100,200]);
      } else {
        pomoBreak = false; pomoLeft = WORK;
        document.getElementById("pomo-task-label").textContent = t.text;
      }
      tickPomo(); render();
    }
  }, 1000);

  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission();
  }
}

function stopPomo() {
  if (pomoTimer) { clearInterval(pomoTimer); pomoTimer = null; }
  pomoId = null;
  document.getElementById("pomo-bar").classList.remove("on");
  render();
}

function tickPomo() {
  var m = Math.floor(pomoLeft/60), s = pomoLeft%60;
  document.getElementById("pomo-timer").textContent = m+":"+String(s).padStart(2,"0");
}

function notify(title, body) {
  if ("Notification" in window && Notification.permission === "granted") {
    new Notification(title, { body: body, icon: "./icons/icon-192.png", tag: "pomo" });
  }
}

function vibrate(p) { if (navigator.vibrate) navigator.vibrate(p); }

// ===================== 渲染 =====================
var tab = "all";
function switchTab(t) {
  tab = t;
  document.querySelectorAll(".tabs button").forEach(function(b){b.classList.remove("on");});
  var el = document.getElementById("tab-"+t);
  if (el) el.classList.add("on");
  render();
}

function filtered() {
  var today = new Date().toISOString().split("T")[0];
  var tasks = DB.tasks.slice();
  var po = {high:0,mid:1,low:2};
  tasks.sort(function(a,b){
    if (a.done!==b.done) return a.done?1:-1;
    if (a.priority!==b.priority) return po[a.priority]-po[b.priority];
    return b.createdAt.localeCompare(a.createdAt);
  });
  if (tab==="active") return tasks.filter(function(t){return !t.done;});
  if (tab==="done") return tasks.filter(function(t){return t.done;});
  if (tab==="today") return tasks.filter(function(t){return t.due===today;});
  return tasks;
}

function render() {
  var tasks = filtered(), today = new Date().toISOString().split("T")[0];
  var listEl = document.getElementById("list");
  var all = DB.tasks;

  if (tasks.length === 0) {
    var ico = tab==="done"?"🎉":"📝", msg = tab==="done"?"还没有已完成的任务":"暂无任务";
    listEl.innerHTML = '<div class="empty-state"><div class="icon">'+ico+'</div><div class="txt">'+msg+'</div></div>';
  } else {
    listEl.innerHTML = tasks.map(function(t){
      var over = t.due && t.due < today && !t.done;
      var pc = "pri-"+t.priority;
      var pl = {high:"🔴 高",mid:"🟡 中",low:"🟢 低"}[t.priority];
      var run = pomoId === t.id;

      var tags = '<span class="tag tag-'+pc+'">'+pl+'</span>';
      if (t.due) {
        if (t.due < today && !t.done) tags += '<span class="tag tag-overdue">⚠ 已过期</span>';
        else if (t.due === today) tags += '<span class="tag tag-due">📅 今天</span>';
        else tags += '<span class="tag tag-due">📅 '+t.due+'</span>';
      }
      if (t.done) tags += '<span class="tag" style="color:var(--success)">✅</span>';
      if (run) tags += '<span class="tag tag-timer">🍅 计时中</span>';

      return '<div class="task-item'+ (t.done?" done":"") + (over?" overdue":"") +'">'+
        '<div class="check-circle'+ (t.done?" checked":"") +'" onclick="toggleTask(\''+t.id+'\')"></div>'+
        '<div class="task-body" onclick="openEdit(\''+t.id+'\')">'+
        '<div class="task-text">'+esc(t.text)+'</div>'+
        '<div class="task-tags">'+tags+'</div>'+
        '</div>'+
        '<div class="task-btns">'+
        (!t.done ? '<button class="btn-pomo'+(run?" playing":"")+'" onclick="event.stopPropagation();startPomo(\''+t.id+'\')">🍅</button>' : "")+
        '<button class="btn-del" onclick="event.stopPropagation();deleteTask(\''+t.id+'\')">🗑</button>'+
        '</div></div>';
    }).join("");
  }

  // stats
  document.getElementById("s-total").textContent = all.length;
  document.getElementById("s-active").textContent = all.filter(function(t){return !t.done;}).length;
  document.getElementById("s-done").textContent = all.filter(function(t){return t.done;}).length;
  document.getElementById("s-pomo").textContent = DB.pomos;
}

function esc(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ===================== 批量操作 =====================
function batchClearDone() {
  var cnt = DB.tasks.filter(function(t){return t.done;}).length;
  if (cnt===0) return;
  if (confirm("确定删除 "+cnt+" 个已完成任务吗？")) {
    DB.tasks = DB.tasks.filter(function(t){return !t.done;});
    save(); render();
  }
}

function exportData() {
  var blob = new Blob([JSON.stringify(DB,null,2)], {type:"application/json"});
  var a = document.createElement("a"); a.href = URL.createObjectURL(blob);
  a.download = "tasks-backup-" + new Date().toISOString().split("T")[0] + ".json";
  a.click();
}

function importData() {
  var inp = document.createElement("input"); inp.type = "file"; inp.accept = ".json";
  inp.onchange = function(e) {
    var f = e.target.files[0]; if (!f) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      try {
        var data = JSON.parse(ev.target.result);
        if (data.tasks && Array.isArray(data.tasks)) {
          if (confirm("导入将合并 "+data.tasks.length+" 个任务，确定吗？")) {
            var ids = new Set(DB.tasks.map(function(t){return t.id;}));
            data.tasks.forEach(function(t){ if(!ids.has(t.id)) DB.tasks.push(t); });
            DB.pomos = Math.max(DB.pomos, data.pomos||0);
            save(); render();
          }
        }
      } catch(ex) { alert("文件格式错误"); }
    };
    reader.readAsText(f);
  };
  inp.click();
}

// ===================== 日期/时间 =====================
function tickClock() {
  var n = new Date();
  var wk = ["周日","周一","周二","周三","周四","周五","周六"];
  document.getElementById("live-time").textContent =
    String(n.getHours()).padStart(2,"0")+":"+String(n.getMinutes()).padStart(2,"0");
  document.getElementById("live-date").textContent =
    wk[n.getDay()]+" "+(n.getMonth()+1)+"/"+n.getDate();
}
tickClock(); setInterval(tickClock, 30000);

// ===================== PWA 安装 =====================
var deferredPrompt = null;
window.addEventListener("beforeinstallprompt", function(e){
  e.preventDefault(); deferredPrompt = e;
  document.getElementById("install-toast").classList.add("on");
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function(r){
      document.getElementById("install-toast").classList.remove("on");
      deferredPrompt = null;
    });
  } else {
    alert("如果使用的是 iPhone：\n请用 Safari 打开，点击底部「分享」→「添加到主屏幕」\n\n安卓用户：\nChrome 菜单 → 添加到主屏幕");
  }
}

// iOS standalone 检测（已安装则隐藏提示）
if (navigator.standalone || window.matchMedia("(display-mode: standalone)").matches) {
  document.getElementById("install-toast").classList.remove("on");
}

// ===================== 初始化 =====================
load();
render();

// 注册 Service Worker
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js");
}

// 输入框回车快捷键
document.getElementById("task-input").addEventListener("keydown", function(e){
  if (e.key==="Enter") addTask();
});

// 点击 overlay 关闭
document.getElementById("edit-sheet").addEventListener("click", function(e){
  if (e.target === this) closeEdit();
});
</script>
