<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>自律日常</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="自律日常">
<link rel="apple-touch-icon" href="./icons/apple-icon.png">
<meta name="theme-color" content="#F5F0EA">
<link rel="manifest" href="./manifest.json">
<style>
:root{--bg:#F5F0EA;--surface:#EDE7DF;--surface2:#E5DED5;--border:rgba(0,0,0,0.05);--shadow:0 1px 3px rgba(0,0,0,0.04);--text:#2D2926;--text2:#8C8882;--text3:#B5B0AA;--accent:#C2653A;--accent2:#D4956A;--accent3:#7D9B5A;--accent4:#5B8C9E;--danger:#D14343;--success:#5B9B6F;--warn:#D4952A;--font:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;--radius:14px;--safe-b:env(safe-area-inset-bottom,10px);--safe-t:env(safe-area-inset-top,0px)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;user-select:none;-webkit-user-select:none}

header{padding:14px 18px;padding-top:calc(14px + var(--safe-t));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:-0.3px}
header h1 .dot{width:7px;height:7px;border-radius:50%}
header .time{font-size:0.9rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text2)}
.mod-dot(none){}
.mod-dot(task){background:var(--accent)}.mod-dot(expense){background:var(--accent2)}.mod-dot(word){background:var(--accent3)}.mod-dot(track){background:var(--accent4)}
.dot-task{background:var(--accent)}.dot-expense{background:var(--accent2)}.dot-word{background:var(--accent3)}.dot-track{background:var(--accent4)}

.btn-base{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.btn-base:active{background:var(--surface2);transform:scale(0.92)}

.pomo-bar{margin:0 16px 8px;padding:10px 14px;border-radius:var(--radius);background:rgba(194,101,58,0.04);border:1px solid rgba(194,101,58,0.12);display:none;align-items:center;gap:10px;flex-shrink:0}
.pomo-bar.on{display:flex}
.pomo-timer{font-size:1.4rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent)}
.pomo-label{font-size:0.62rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.pomo-bar .btn-stop{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(209,67,67,0.2);background:transparent;color:var(--danger);cursor:pointer;font-size:0.65rem;margin-left:auto;flex-shrink:0}

.nav-bar{display:flex;flex-shrink:0;border-top:1px solid var(--border);background:var(--bg);padding-bottom:var(--safe-b)}
.nav-bar button{flex:1;min-width:0;padding:5px 2px 1px;border:none;background:transparent;color:var(--text3);font-family:var(--font);font-size:0.58rem;cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;align-items:center}
.nav-bar button .ni{font-size:0.95rem}
.nav-bar button.on{color:var(--accent);font-weight:600}.nav-bar button.on.n2{color:var(--accent2)}.nav-bar button.on.n3{color:var(--accent3)}.nav-bar button.on.n4{color:var(--accent4)}

.panel{display:none;flex-direction:column;flex:1;overflow:hidden}
.panel.on{display:flex}
.scroll{flex:1;overflow-y:auto;padding:0 16px 6px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.empty{padding:50px 20px;text-align:center;color:var(--text3);font-size:0.82rem}
.empty .ei{font-size:2.2rem;margin-bottom:8px;opacity:0.4}

.tabs{display:flex;padding:0 16px 5px;gap:3px;flex-shrink:0}
.tabs button{padding:5px 12px;border-radius:20px;border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:0.72rem;cursor:pointer;transition:all 0.15s}
.tabs button.on{background:var(--surface2);color:var(--text);font-weight:600}

/* Shared form patterns */
.inline-add{display:flex;gap:5px;padding:0 16px 8px;flex-shrink:0;align-items:center}
.inline-add input{padding:9px 10px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:0.82rem;outline:none;flex:1}
.inline-add .add-btn{width:40px;height:40px;border-radius:var(--radius);border:none;color:#fff;font-size:1.05rem;cursor:pointer;flex-shrink:0;transition:all 0.12s}
.inline-add .add-btn:active{transform:scale(0.9)}

.bot-bar{padding:5px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:5px}
.bot-bar button{flex:1;padding:6px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:var(--font);font-size:0.66rem;cursor:pointer;transition:all 0.12s}
.bot-bar button:active{background:var(--surface2)}

.list-item{display:flex;align-items:center;gap:7px;padding:9px 10px;background:var(--surface);border-radius:var(--radius);margin-bottom:3px;border:1px solid var(--border);box-shadow:var(--shadow)}
.list-item .li-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0}
.list-item .li-info{flex:1;min-width:0}.list-item .li-name{font-size:0.76rem;font-weight:500}.list-item .li-date{font-size:0.58rem;color:var(--text3)}
.list-item .li-val{font-weight:700;font-size:0.82rem;flex-shrink:0}
.list-item .li-del{font-size:0.58rem;color:var(--text3);cursor:pointer;padding:3px;opacity:0;transition:all 0.12s}.list-item:active .li-del{opacity:1}
.date-head{font-size:0.62rem;color:var(--text3);padding:5px 0 3px;font-weight:600}

/* TASK specific */
.task-add{display:flex;gap:5px;padding:0 16px 8px;flex-shrink:0}
.task-add input{flex:1;padding:9px 12px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:0.82rem;outline:none}
.task-add input:focus{border-color:var(--accent)}
.task-add .prio{width:34px;height:41px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.85rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.task-add .add-btn{width:42px;height:41px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:1.1rem;cursor:pointer;flex-shrink:0;transition:all 0.12s}
.task-add .add-btn:active,.task-add .prio:active{transform:scale(0.9)}

.tcard-wrap{margin-bottom:5px}
.tcard{display:flex;flex-direction:column;padding:10px 12px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.tcard.done{opacity:0.4}
.tcard .main-row{display:flex;align-items:center;gap:7px}
.tcheck{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s cubic-bezier(.4,0,.2,1)}
.tcheck.done{background:var(--success);border-color:var(--success);animation:pop 0.3s cubic-bezier(.4,0,.2,1)}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.tcheck.done::after{content:"✓";color:#fff;font-size:0.55rem;font-weight:700}
.ttxt{flex:1;font-size:0.82rem;line-height:1.4;word-break:break-word;cursor:pointer}
.tcard.done .ttxt{text-decoration:line-through;color:var(--text3)}
.tprio{width:5px;height:5px;border-radius:50%;flex-shrink:0}.tprio-1{background:var(--success)}.tprio-2{background:var(--warn)}.tprio-3{background:var(--danger)}
.tdue{font-size:0.62rem;color:var(--text3);flex-shrink:0}.tdue.ov{color:var(--danger)}
.tpomo{width:24px;height:24px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:0.65rem;flex-shrink:0;color:var(--accent);transition:all 0.12s;display:flex;align-items:center;justify-content:center}
.tpomo.on{color:var(--success);background:rgba(91,155,111,0.08)}
.tdel{width:24px;height:24px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:0.65rem;flex-shrink:0;color:var(--text3);transition:all 0.12s}
.tdel:active{color:var(--danger);transform:scale(0.85)}
.chkl{margin-top:3px;padding-left:25px}.chkl .ci{display:flex;align-items:center;gap:5px;padding:2px 0;font-size:0.73rem;color:var(--text2);cursor:pointer}
.chkl .ci .cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--text3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.chkl .ci .cb.done{background:var(--success);border-color:var(--success)}.chkl .ci .cb.done::after{content:"✓";color:#fff;font-size:0.4rem;font-weight:700}
.chkl .ci.done .ct{text-decoration:line-through;color:var(--text3)}.chkl .progress{font-size:0.58rem;color:var(--text3);margin-bottom:2px}

/* EXPENSE specific */
.exp-sum{display:flex;gap:5px;padding:0 16px 6px;flex-shrink:0}
.exp-c{flex:1;background:var(--surface);border-radius:var(--radius);padding:10px;border:1px solid var(--border);text-align:center;box-shadow:var(--shadow)}
.exp-c .ev{font-size:1.2rem;font-weight:800}.exp-c .el{font-size:0.58rem;color:var(--text2);margin-top:1px}
.exp-c.in .ev{color:var(--success)}.exp-c.out .ev{color:var(--danger)}.exp-c.net .ev{color:var(--accent)}
.eia.in{color:var(--success)}.eia.out{color:var(--danger)}
.exp-mn{display:flex;align-items:center;justify-content:center;gap:6px;padding:0 16px 4px;flex-shrink:0}
.exp-mn button{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:0.7rem;transition:all 0.12s}
.exp-mn .ml{font-size:0.76rem;font-weight:700}
.exp-add .amt{width:70px;padding:9px 5px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:0.95rem;font-weight:700;outline:none;text-align:center}
.exp-add .amt:focus{border-color:var(--accent2)}
.exp-add .ecat{padding:7px 9px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.7rem;white-space:nowrap;font-family:var(--font);color:var(--text);flex-shrink:0;transition:all 0.12s}
.exp-add .ecat:active{background:var(--surface2)}

/* WORD specific */
.word-stats{display:flex;gap:5px;padding:4px 16px 6px;flex-shrink:0}
.word-card{flex:1;background:var(--surface);border-radius:var(--radius);padding:10px 6px;border:1px solid var(--border);text-align:center;box-shadow:var(--shadow)}
.word-card .wv{font-size:1.25rem;font-weight:800;color:var(--accent3)}.word-card .wl{font-size:0.58rem;color:var(--text2);margin-top:1px}
.word-add .wnum{width:70px;text-align:center;font-weight:700}
.word-add .wrev{width:60px;text-align:center;font-size:0.72rem}

/* TRACK specific */
.track-main{display:flex;flex-direction:column;align-items:center;padding:12px 16px 6px;flex-shrink:0}
.track-emoji{font-size:2.5rem;transition:all 0.3s}
.track-emoji.running{animation:bounce 0.5s infinite alternate}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.1)}}
.track-clock{font-size:2.6rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:2px;color:var(--accent)}
.track-range{font-size:0.7rem;color:var(--text3);margin:2px 0 6px;font-variant-numeric:tabular-nums}
.track-label{font-size:0.8rem;color:var(--text2);margin-bottom:8px}
.track-label .act-name{color:var(--text);font-weight:600}
.track-ctrl{display:flex;gap:12px;margin-bottom:8px}
.track-ctrl button{width:52px;height:52px;border-radius:50%;border:none;font-size:1.3rem;cursor:pointer;transition:all 0.12s;font-family:var(--font)}
.track-ctrl .btn-play{background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(194,101,58,0.25)}
.track-ctrl .btn-pause{background:var(--warn);color:#fff}
.track-ctrl .btn-stop{background:var(--danger);color:#fff;font-size:0.9rem}
.track-ctrl button:active{transform:scale(0.88)}
.track-picker{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:6px}
.track-picker button{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font);font-size:0.7rem;cursor:pointer;transition:all 0.12s;white-space:nowrap}
.track-picker button:active{background:var(--surface2)}
.track-picker button.on{border-color:var(--accent);color:var(--accent);background:rgba(194,101,58,0.06);font-weight:600}
.track-picker .add-act{padding:5px 10px;border-radius:20px;border:1px dashed var(--border);color:var(--text3);font-size:0.68rem;cursor:pointer}
.track-stats{display:flex;gap:5px;padding:0 16px 6px;flex-shrink:0}
.track-stats .ts{flex:1;background:var(--surface);border-radius:var(--radius);padding:9px 6px;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow)}
.track-stats .ts .tv{font-size:1.15rem;font-weight:800;color:var(--accent)}.track-stats .ts .tl{font-size:0.58rem;color:var(--text2);margin-top:1px}
.track-records{padding:2px 16px 4px;flex-shrink:0;font-size:0.68rem;color:var(--text2);font-weight:600}

/* Reminder */
.remind-toast{position:fixed;top:calc(var(--safe-t) + 50px);left:50%;transform:translateX(-50%);z-index:300;background:var(--accent);color:#fff;padding:14px 20px;border-radius:var(--radius);font-size:0.8rem;display:none;white-space:nowrap;box-shadow:0 8px 30px rgba(194,101,58,0.3);animation:toastIn 0.3s ease-out;font-weight:600;letter-spacing:0.5px}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.remind-toast.show{display:block}

/* Shared overlay/sheet/undo */
.undo{position:fixed;bottom:calc(var(--safe-b) + 80px);left:50%;transform:translateX(-50%);z-index:300;background:var(--surface);border:1px solid var(--border);padding:7px 13px;border-radius:20px;font-size:0.74rem;display:none;gap:7px;align-items:center;box-shadow:0 8px 30px rgba(0,0,0,0.08)}
.undo.on{display:flex}.undo button{background:var(--accent);color:#fff;border:none;padding:3px 9px;border-radius:12px;font-family:var(--font);font-size:0.68rem;cursor:pointer;font-weight:600}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.2);z-index:200;justify-content:center;align-items:flex-end;backdrop-filter:blur(6px)}
.overlay.on{display:flex}
.sheet{width:100%;max-width:500px;background:var(--surface);border-radius:20px 20px 0 0;padding:6px 18px 16px;padding-bottom:calc(16px + var(--safe-b));animation:slideUp 0.3s cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet h3{font-size:0.9rem;margin-bottom:10px}
.sheet .row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.sheet .row label{width:38px;font-size:0.68rem;color:var(--text2)}
.sheet input,.sheet select{flex:1;padding:8px 10px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:0.8rem;outline:none}
.sheet .btns{display:flex;gap:7px;margin-top:12px}
.sheet .btns .save{flex:2;padding:10px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:var(--font)}
.sheet .btns .cancel{flex:1;padding:10px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:0.82rem;cursor:pointer;font-family:var(--font)}
.sheet .srow{display:flex;gap:4px;margin-bottom:4px;align-items:center}
.sheet .srow input{flex:1;padding:6px 7px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:0.73rem;outline:none}
.sheet .srow .rs{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--danger);cursor:pointer;font-size:0.58rem}
.sheet .adc{font-size:0.66rem;color:var(--accent);cursor:pointer;display:inline-block;font-weight:500;margin-bottom:6px}
.lb{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.9);justify-content:center;align-items:center}.lb.on{display:flex}
.lb img{max-width:95vw;max-height:85vh;border-radius:8px}
.lb .lbc{position:absolute;top:20px;right:20px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.1);color:#fff;border:none;font-size:0.9rem;cursor:pointer}
</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0"><defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C2653A"/><stop offset="100%" stop-color="#D4956A"/></linearGradient></defs></svg>

<header>
  <h1><span class="dot dot-task" id="logo-dot"></span><span id="logo-text">任务</span></h1>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="btn-base" id="pomo-btn" onclick="tap();togglePomo()" title="番茄钟">🍅</button>
    <div class="time" id="live-time">00:00</div>
  </div>
</header>

<div class="pomo-bar" id="pomo-bar">
  <div class="pomo-timer" id="pomo-timer">25:00</div>
  <div class="pomo-label" id="pomo-label">专注中</div>
  <button class="btn-stop" onclick="tap();stopPomo()">✕</button>
</div>

<div class="remind-toast" id="remind-toast"></div>

<!-- TASK -->
<div class="panel on" id="p-task">
  <div class="tabs">
    <button class="on" onclick="tap();S.task.setTab('active')" id="tab-active">⏳ 待办</button>
    <button onclick="tap();S.task.setTab('done')" id="tab-done">✅ 已完成</button>
  </div>
  <div class="task-add">
    <input id="task-input" placeholder="添加任务..." enterkeyhint="done">
    <button class="prio" id="prio-btn" onclick="tap();S.task.cyclePrio()">🟢</button>
    <button class="add-btn" onclick="tap();S.task.add()">＋</button>
  </div>
  <div class="scroll" id="task-list"></div>
  <div class="bot-bar">
    <button onclick="tap();S.task.clearDone()">🗑 清除完成</button>
    <button onclick="tap();S.io.export()">📤 导出</button>
  </div>
</div>

<!-- EXPENSE -->
<div class="panel" id="p-expense">
  <div class="exp-sum">
    <div class="exp-c in"><div class="ev" id="e-income">¥0</div><div class="el">收入</div></div>
    <div class="exp-c out"><div class="ev" id="e-spent">¥0</div><div class="el">支出</div></div>
    <div class="exp-c net"><div class="ev" id="e-bal">¥0</div><div class="el">结余</div></div>
  </div>
  <div class="exp-mn">
    <button onclick="tap();S.expense.chMonth(-1)">◀</button>
    <div class="ml" id="e-month">2026年7月</div>
    <button onclick="tap();S.expense.chMonth(1)">▶</button>
  </div>
  <div class="inline-add exp-add">
    <input class="amt" id="exp-amount" placeholder="金额" step="0.01" enterkeyhint="done">
    <button class="ecat" id="exp-cat" onclick="tap();S.expense.cycleCat()">🍔 餐饮</button>
    <button class="ecat" id="exp-type" onclick="tap();S.expense.cycleType()">💸 支出</button>
    <button class="add-btn" style="background:var(--accent2)" onclick="tap();S.expense.add()">＋</button>
  </div>
  <div class="scroll" id="exp-list"></div>
  <div class="bot-bar">
    <button class="on" onclick="tap();S.expense.setView('month')" id="eb-m">📅 本月</button>
    <button onclick="tap();S.expense.setView('all')" id="eb-a">📋 全部</button>
    <button onclick="tap();S.io.export()">📤 导出</button>
  </div>
</div>

<!-- WORD -->
<div class="panel" id="p-word">
  <div class="word-stats">
    <div class="word-card"><div class="wv" id="ws-today">0</div><div class="wl">今日新词</div></div>
    <div class="word-card"><div class="wv" id="ws-review">0</div><div class="wl">今日复习</div></div>
    <div class="word-card"><div class="wv" id="ws-total">0</div><div class="wl">总词汇量</div></div>
    <div class="word-card"><div class="wv" id="ws-streak">0</div><div class="wl">连续天数</div></div>
  </div>
  <div class="inline-add word-add">
    <input class="wnum" id="word-new" placeholder="新词" type="number" min="0" enterkeyhint="done">
    <input class="wrev" id="word-review" placeholder="复习" type="number" min="0" enterkeyhint="done">
    <input id="word-note" placeholder="备注（可选）" style="flex:2">
    <button class="add-btn" style="background:var(--accent3)" onclick="tap();S.word.add()">＋</button>
  </div>
  <div class="scroll" id="word-list"></div>
  <div class="bot-bar">
    <button class="on" onclick="tap();S.word.setView('week')" id="wb-week">📅 本周</button>
    <button onclick="tap();S.word.setView('all')" id="wb-all">📋 全部</button>
    <button onclick="tap();S.io.export()">📤 导出</button>
  </div>
</div>

<!-- TRACK -->
<div class="panel" id="p-track">
  <div class="track-picker" id="track-picker"></div>
  <div class="track-main">
    <div class="track-emoji" id="track-emoji">📚</div>
    <div class="track-clock" id="track-clock">00:00:00</div>
    <div class="track-range" id="track-range">—:— 至 —:—</div>
    <div class="track-label">正在安排：<span class="act-name" id="track-act-name">读书</span></div>
    <div class="track-ctrl">
      <button class="btn-play" id="btn-play" onclick="tap();S.track.start()">▶</button>
      <button class="btn-pause" id="btn-pause" onclick="tap();S.track.pause()" style="display:none">⏸</button>
      <button class="btn-stop" id="btn-stop" onclick="tap();S.track.stop()">⏹</button>
    </div>
  </div>
  <div class="track-stats">
    <div class="ts"><div class="tv" id="ts-today">0h</div><div class="tl">今日总计</div></div>
    <div class="ts"><div class="tv" id="ts-week">0h</div><div class="tl">本周总计</div></div>
    <div class="ts"><div class="tv" id="ts-sessions">0</div><div class="tl">今日次数</div></div>
  </div>
  <div class="track-records">📋 今日安排</div>
  <div class="scroll" id="track-list"></div>
  <div class="bot-bar">
    <button class="on" onclick="tap();S.track.setView('today')" id="tb-today">📅 今天</button>
    <button onclick="tap();S.track.setView('week')" id="tb-week">📅 本周</button>
    <button onclick="tap();S.track.setView('all')" id="tb-all">📋 全部</button>
    <button onclick="tap();S.io.export()">📤 导出</button>
  </div>
</div>

<!-- NAV -->
<div class="nav-bar">
  <button class="on n1" onclick="switchMode('task')" id="nav-task"><span class="ni">📋</span>任务</button>
  <button class="n2" onclick="switchMode('expense')" id="nav-expense"><span class="ni">💰</span>记账</button>
  <button class="n3" onclick="switchMode('word')" id="nav-word"><span class="ni">📖</span>单词</button>
  <button class="n4" onclick="switchMode('track')" id="nav-track"><span class="ni">⏱</span>安排</button>
</div>

<!-- EDIT -->
<div class="overlay" id="edit-sheet"><div class="sheet">
  <h3>✏️ 编辑任务</h3>
  <div class="row"><label>内容</label><input id="e-text"></div>
  <div class="row"><label>截止</label><input type="date" id="e-due"></div>
  <div class="row"><label>优先级</label><select id="e-prio"><option value="low">🟢 简单</option><option value="mid">🟡 重要</option><option value="high">🔴 紧急</option></select></div>
  <div style="font-size:0.7rem;color:var(--text2);font-weight:500;margin:6px 0 3px">📝 任务选项</div>
  <div id="clist-sheet"></div><span class="adc" onclick="S.task.addChkItem()">+ 添加选项</span>
  <div class="btns"><button class="save" onclick="tap();S.task.saveEdit()">💾 保存</button><button class="cancel" onclick="tap();S.task.closeEdit()">取消</button></div>
</div></div>

<div class="lb" id="lightbox" onclick="closeLightbox()"><img id="lb-img"><button class="lbc">✕</button></div>
<div class="undo" id="undo"><span id="undo-msg"></span><button onclick="tap();S.undo.exec()">撤销</button></div>

<script>
/* =========================== UTILS =========================== */
const $=id=>document.getElementById(id);
const now=()=>new Date();
const todayStr=()=>now().toISOString().split('T')[0];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const hms=s=>{s=s||0;let h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?h+'h'+m+'m':m>0?m+'m':'<1m'};
const esc=s=>{let d={"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};return s.replace(/[&<>"']/g,c=>d[c])};
const escAttr=s=>s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const hm=x=>{let h=x.getHours().toString().padStart(2,"0"),m=x.getMinutes().toString().padStart(2,"0");return h+":"+m};

/* Audio */
let _actx=null;
const beep=()=>{try{if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();let o=_actx.createOscillator(),g=_actx.createGain();o.connect(g);g.connect(_actx.destination);o.frequency.value=1200;o.type='sine';g.gain.setValueAtTime(0.12,_actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,_actx.currentTime+0.07);o.start(_actx.currentTime);o.stop(_actx.currentTime+0.07)}catch(e){}};
const loudBeep=()=>{try{if(!_actx)_actx=new(window.AudioContext||window.webkitAudioContext)();for(let i=0;i<3;i++){let o=_actx.createOscillator(),g=_actx.createGain();o.connect(g);g.connect(_actx.destination);o.frequency.value=800+i*300;o.type='square';g.gain.setValueAtTime(0.25,_actx.currentTime+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,_actx.currentTime+i*0.1+0.1);o.start(_actx.currentTime+i*0.1);o.stop(_actx.currentTime+i*0.1+0.1)}}catch(e){}};
const vib=p=>{if(navigator.vibrate)navigator.vibrate(p)};
const tap=()=>{vib(6);beep()};
const nfy=(t,b)=>{if("Notification"in window&&Notification.permission==="granted")new Notification(t,{body:b,icon:"./icons/icon-192.png",tag:"daily"})};

/* =========================== DATA =========================== */
const KEY="daily-v3";
let DB={tasks:[],expenses:[],wordRecords:[],timeRecords:[],activities:["📚 读书","💻 学习","🏃 运动","🎧 练琴","✍️ 写作"],pomos:0,workTime:25};

function load(){
  try{let d=JSON.parse(localStorage.getItem(KEY));if(!d)return;
    DB=d;
    DB.wordRecords=DB.wordRecords||[];DB.expenses=DB.expenses||[];DB.timeRecords=DB.timeRecords||[];
    DB.activities=DB.activities||["📚 读书","💻 学习","🏃 运动","🎧 练琴","✍️ 写作"];
    DB.expenses=DB.expenses.map(e=>{e.type=e.type||'expense';return e});
  }catch(e){}
}
const save=()=>localStorage.setItem(KEY,JSON.stringify(DB));
const find=(arr,id)=>arr.find(x=>x.id===id);
const findI=(arr,id)=>arr.findIndex(x=>x.id===id);

/* Generic: group records by date, render with date headers */
function renderDateGrouped(recs,renderItem,colorVar){
  if(!recs.length)return '<div class="empty"><div class="ei">📋</div>暂无记录</div>';
  let gr={};recs.forEach(r=>{let d=r.date;if(!gr[d])gr[d]=[];gr[d].push(r)});
  return Object.keys(gr).sort().reverse().map(dt=>{
    let items=gr[dt],dTotal=items.reduce((s,r)=>{let v=typeof r.amount!=='undefined'?(r.type==='income'?r.amount:-r.amount):r.seconds||0;return s+v},0);
    let sign=dTotal>=0?'+':'';let sColor=dTotal>=0?'var(--success)':'var(--danger)';
    return'<div><div class="date-head">📅 '+dt+' <span style="color:'+(colorVar?sColor:'var(--accent)')+'">'+(typeof items[0].amount!=='undefined'?sign+dTotal.toFixed(2):hms(Math.abs(dTotal)))+'</span></div>'+items.map(renderItem).join("")+'</div>';
  }).join("");
}

/* =========================== MODE =========================== */
let curMode="task";
const PANELS=["task","expense","word","track"];
const MODE_INFO={task:["任务","dot-task"],expense:["记账","dot-expense"],word:["单词","dot-word"],track:["安排","dot-track"]};

function switchMode(m){tap();
  curMode=m;let mi=MODE_INFO[m];
  PANELS.forEach(k=>($("p-"+k).classList.toggle("on",k===m), $("nav-"+k).classList.toggle("on",k===m)));
  $("logo-text").textContent=mi[0];$("logo-dot").className="dot "+mi[1];
  $("pomo-btn").style.display=m==="task"?"":"none";
  let renders={task:S.task.render,expense:S.expense.render,word:S.word.render,track:S.track.render};
  renders[m]();
}

/* =========================== MODULES =========================== */
const S={};

/* -- POMODORO -- */
S.pomo={id:null,timer:null,left:0,isBreak:false};
S.pomo.toggle=()=>{let w=prompt("番茄钟时长（分钟）","25");if(w){DB.workTime=parseInt(w)||25;save();alert("已设 "+DB.workTime+" 分钟")}};
S.pomo.start=function(id){tap();
  let t=find(DB.tasks,id);if(!t||t.done)return;if(this.timer)this.stop();
  this.id=id;this.isBreak=false;this.left=(DB.workTime||25)*60;
  $("pomo-bar").classList.add("on");$("pomo-label").textContent=t.text;
  this.doStart();
};
S.pomo.doStart=function(){
  let self=this,tick=()=>{let m=Math.floor(self.left/60),s=self.left%60;$("pomo-timer").textContent=m+":"+String(s).padStart(2,"0")};
  tick();S.task.render();
  this.timer=setInterval(()=>{this.left--;tick();
    if(this.left<=0){if(!this.isBreak){DB.pomos++;save();this.isBreak=true;this.left=300;$("pomo-label").textContent="☕ 休息";nfy("🍅 完成！","休息 5 分钟");vib([200,100,200]);loudBeep()}else{this.isBreak=false;let t=find(DB.tasks,this.id);this.left=(DB.workTime||25)*60;$("pomo-label").textContent=t?t.text:"专注中"}tick();S.task.render()}
  },1000);
  if("Notification"in window&&Notification.permission==="default")Notification.requestPermission();
};
S.pomo.stop=function(){tap();if(this.timer){clearInterval(this.timer);this.timer=null}this.id=null;$("pomo-bar").classList.remove("on");S.task.render()};
const togglePomo=()=>S.pomo.toggle();
const startPomo=id=>S.pomo.start(id);
const stopPomo=()=>S.pomo.stop();

/* -- TASK -- */
S.task={prio:"low",tab:"active"};
S.task.PRIO={high:"🔴",mid:"🟡",low:"🟢"};
S.task.PN={high:3,mid:2,low:1};
S.task.cyclePrio=()=>{let o=["low","mid","high"];S.task.prio=o[(o.indexOf(S.task.prio)+1)%3];$("prio-btn").textContent=S.task.PRIO[S.task.prio]};
S.task.setTab=t=>{S.task.tab=t;$("tab-active").classList.toggle("on",t==="active");$("tab-done").classList.toggle("on",t==="done");S.task.render()};
S.task.add=()=>{
  let inp=$("task-input"),txt=inp.value.trim();if(!txt)return;
  let due="",td=todayStr();if(/今天/.test(txt)){due=td;txt=txt.replace(/今天/g,"").trim()}else if(/明天/.test(txt)){let d=now();d.setDate(d.getDate()+1);due=d.toISOString().split('T')[0];txt=txt.replace(/明天/g,"").trim()}
  DB.tasks.push({id:uid(),text:txt||inp.value.trim(),priority:S.task.prio,due:due,done:false,checklist:[],createdAt:now().toISOString()});
  save();inp.value="";S.task.prio="low";$("prio-btn").textContent="🟢";S.task.render()
};
S.task.toggle=id=>{let t=find(DB.tasks,id);if(t){t.done=!t.done;save();S.task.render();tap()}};
S.task.toggleChk=(tid,i)=>{tap();let t=find(DB.tasks,tid);if(t&&t.checklist[i]){t.checklist[i].done=!t.checklist[i].done;save();S.task.render()}};
S.task.del=id=>{tap();let i=findI(DB.tasks,id);if(i===-1)return;S.undo.set({t:"task",d:DB.tasks[i],i:i});DB.tasks.splice(i,1);save();S.task.render();S.undo.show("已删除")};
S.task.clearDone=()=>{tap();let td=DB.tasks.filter(t=>t.done);if(!td.length)return;S.undo.set({t:"batch",d:td});DB.tasks=DB.tasks.filter(t=>!t.done);save();S.task.render();S.undo.show("已清除 "+td.length+" 个")};

S.task.render=()=>{
  if(curMode!=="task")return;
  let ts=DB.tasks.slice().sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  ts=S.task.tab==="done"?ts.filter(t=>t.done):ts.filter(t=>!t.done);
  let el=$("task-list"),td=todayStr();
  if(!ts.length){el.innerHTML='<div class="empty"><div class="ei">'+(S.task.tab==="done"?"🎉":"📝")+'</div>'+(S.task.tab==="done"?"还没有完成的任务":"暂无待办任务")+'</div>';return}
  el.innerHTML=ts.map(t=>{
    let ov=t.due&&t.due<td&&!t.done,run=S.pomo.id===t.id;
    let dueStr='';if(t.due){if(t.due<td&&!t.done)dueStr='<span class="tdue ov">过期</span>';else dueStr='<span class="tdue">'+(t.due===td?"今天":t.due)+'</span>'}
    let clHtml='';let cl=t.checklist||[];
    if(cl.length){let dc=cl.filter(c=>c.done).length;clHtml='<div class="chkl"><div class="progress">'+dc+'/'+cl.length+'</div>'+cl.map((c,i)=>'<div class="ci'+(c.done?" done":"")+'" onclick="event.stopPropagation();S.task.toggleChk(\''+t.id+'\','+i+')"><div class="cb'+(c.done?" done":"")+'"></div><span class="ct">'+esc(c.text)+'</span></div>').join("")+'</div>'}
    return'<div class="tcard-wrap"><div class="tcard'+(t.done?" done":"")+'"><div class="main-row"><div class="tcheck'+(t.done?" done":"")+'" onclick="S.task.toggle(\''+t.id+'\')"></div><div class="ttxt" onclick="S.task.openEdit(\''+t.id+'\')">'+esc(t.text)+'</div>'+dueStr+'<div class="tprio tprio-'+S.task.PN[t.priority]+'"></div>'+(t.done?"":'<button class="tpomo'+(run?" on":"")+'" onclick="event.stopPropagation();tap();startPomo(\''+t.id+'\')">🍅</button>')+'<button class="tdel" onclick="event.stopPropagation();tap();S.task.del(\''+t.id+'\')">✕</button></div>'+clHtml+'</div></div>'
  }).join("")
};

/* Task Edit */
S.task.editId=null;S.task.tmpChkl=[];
S.task.openEdit=function(id){let t=find(DB.tasks,id);if(!t)return;this.editId=id;$("e-text").value=t.text;$("e-due").value=t.due||"";$("e-prio").value=t.priority;this.tmpChkl=(t.checklist||[]).map(c=>({text:c.text,done:c.done}));this.renderChkl();$("edit-sheet").classList.add("on")};
S.task.closeEdit=()=>{S.task.editId=null;S.task.tmpChkl=[];$("edit-sheet").classList.remove("on")};
S.task.addChkItem=()=>{S.task.tmpChkl.push({text:"",done:false});S.task.renderChkl()};
S.task.rmChkItem=i=>{S.task.tmpChkl.splice(i,1);S.task.renderChkl()};
S.task.renderChkl=()=>{$("clist-sheet").innerHTML=S.task.tmpChkl.map((c,i)=>'<div class="srow"><input value="'+escAttr(c.text)+'" oninput="S.task.tmpChkl['+i+'].text=this.value" placeholder="选项 '+(i+1)+'"><button class="rs" onclick="S.task.rmChkItem('+i+')">✕</button></div>').join("")};
S.task.saveEdit=function(){if(!this.editId)return;let t=find(DB.tasks,this.editId);if(!t)return;t.text=$("e-text").value.trim()||t.text;t.due=$("e-due").value;t.priority=$("e-prio").value;t.checklist=this.tmpChkl.filter(c=>c.text.trim());save();this.closeEdit();S.task.render()};
const openEdit=id=>S.task.openEdit(id);
const closeEdit=()=>S.task.closeEdit();
const addChkItem=()=>S.task.addChkItem();

/* -- EXPENSE -- */
S.expense={cat:0,type:"expense",month:0,view:"month"};
S.expense.CATS=[{k:"food",i:"🍔",n:"餐饮"},{k:"transport",i:"🚌",n:"交通"},{k:"shop",i:"🛒",n:"购物"},{k:"entertain",i:"🎮",n:"娱乐"},{k:"bills",i:"📱",n:"通讯"},{k:"housing",i:"🏠",n:"居住"},{k:"health",i:"💊",n:"医疗"},{k:"other",i:"📌",n:"其他"}];
S.expense.cycleCat=()=>{this.cat=(this.cat+1)%this.CATS.length;$("exp-cat").textContent=this.CATS[this.cat].i+" "+this.CATS[this.cat].n};
S.expense.cycleType=()=>{this.type=this.type==="expense"?"income":"expense";$("exp-type").textContent=this.type==="expense"?"💸 支出":"💰 收入"};
S.expense.chMonth=d=>{this.month+=d;S.expense.render()};
S.expense.setView=v=>{this.view=v;$("eb-m").classList.toggle("on",v==="month");$("eb-a").classList.toggle("on",v==="all");S.expense.render()};
S.expense.getMonth=()=>{let d=now();d.setMonth(d.getMonth()+this.month);return d.toISOString().slice(0,7)};
S.expense.add=()=>{let a=parseFloat($("exp-amount").value);if(!a||a<=0)return;let c=this.CATS[this.cat],uc=this.type==="income"?"income":c.k;DB.expenses.push({id:uid(),amount:a,type:this.type,category:uc,date:todayStr(),createdAt:now().toISOString()});save();$("exp-amount").value="";S.expense.render()};
S.expense.del=id=>{tap();let i=findI(DB.expenses,id);if(i===-1)return;S.undo.set({t:"expense",d:DB.expenses[i],i:i});DB.expenses.splice(i,1);save();S.expense.render();S.undo.show("已删除账单")};

S.expense.render=()=>{
  if(curMode!=="expense")return;
  let ym=this.getMonth();$("e-month").textContent=ym.replace("-","年")+"月";
  let exps=DB.expenses.slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(this.view==="month")exps=exps.filter(e=>e.date.slice(0,7)===ym);
  let inc=0,sp=0;exps.forEach(e=>{if(e.type==="income")inc+=e.amount;else sp+=e.amount});
  $("e-income").textContent="¥"+inc.toFixed(2);$("e-spent").textContent="¥"+sp.toFixed(2);$("e-bal").textContent="¥"+(inc-sp).toFixed(2);
  let el=$("exp-list");
  if(!exps.length){el.innerHTML='<div class="empty"><div class="ei">💸</div>暂无记录</div>';return}
  el.innerHTML=renderDateGrouped(exps,function(e){
    let c=S.expense.CATS.find(x=>x.k===e.category)||S.expense.CATS[7],isIn=e.type==="income";
    return'<div class="list-item"><div class="li-icon" style="background:rgba(212,149,106,0.1)">'+c.i+'</div><div class="li-info"><div class="li-name">'+(isIn?"收入":c.n)+'</div><div class="li-date">'+e.date+'</div></div><div class="li-val '+(isIn?"eia in":"eia out")+'">'+(isIn?"+":"-")+'¥'+e.amount.toFixed(2)+'</div><span class="li-del" onclick="event.stopPropagation();S.expense.del(\''+e.id+'\')">✕</span></div>'
  },true);
};

/* -- WORD -- */
S.word={view:"week"};
S.word.setView=v=>{S.word.view=v;$("wb-week").classList.toggle("on",v==="week");$("wb-all").classList.toggle("on",v==="all");S.word.render()};
S.word.add=()=>{
  let nw=parseInt($("word-new").value)||0,rv=parseInt($("word-review").value)||0;if(!nw&&!rv)return;
  let nt=$("word-note").value.trim();DB.wordRecords.push({id:uid(),newWords:nw,reviewWords:rv,note:nt,date:todayStr(),createdAt:now().toISOString()});
  save();$("word-new").value="";$("word-review").value="";$("word-note").value="";S.word.render()
};
S.word.del=id=>{tap();let i=findI(DB.wordRecords,id);if(i===-1)return;S.undo.set({t:"word",d:DB.wordRecords[i],i:i});DB.wordRecords.splice(i,1);save();S.word.render();S.undo.show("已删除记录")};
S.word.calcStreak=()=>{let dates=[...new Set(DB.wordRecords.map(r=>r.date))].sort().reverse();if(!dates.length)return 0;let s=0;for(let i=0;i<100;i++){let d=new Date(now());d.setDate(d.getDate()-i);let ds=d.toISOString().split("T")[0];if(dates.includes(ds))s++;else if(i===0)continue;else break}return s};

S.word.render=()=>{
  if(curMode!=="word")return;
  let today=now().toISOString().split("T")[0],recs=DB.wordRecords.slice().sort((a,b)=>b.date.localeCompare(a.date));
  if(S.word.view==="week"){let w=now();w.setDate(w.getDate()-7);recs=recs.filter(r=>r.date>=w.toISOString().split("T")[0])}
  let todayRecs=recs.filter(r=>r.date===today);
  $("ws-today").textContent=todayRecs.reduce((s,r)=>s+(r.newWords||0),0);
  $("ws-review").textContent=todayRecs.reduce((s,r)=>s+(r.reviewWords||0),0);
  $("ws-total").textContent=DB.wordRecords.reduce((s,r)=>s+(r.newWords||0),0);
  $("ws-streak").textContent=S.word.calcStreak();
  let el=$("word-list");
  if(!recs.length){el.innerHTML='<div class="empty"><div class="ei">📖</div>暂无记录</div>';return}
  el.innerHTML=renderDateGrouped(recs,function(r){
    return'<div class="list-item" style="--c:var(--accent3)"><div class="li-icon" style="background:rgba(125,155,90,0.1)">📖</div><div class="li-info"><div class="li-name">'+(r.note?esc(r.note):"单词记录")+'</div><div class="li-date">'+r.date+'</div></div><div class="li-val" style="color:var(--accent3)">+'+r.newWords+' | 复'+r.reviewWords+'</div><span class="li-del" onclick="event.stopPropagation();S.word.del(\''+r.id+'\')">✕</span></div>'
  },false);
};

/* -- TRACK -- */
S.track={actIdx:0,running:false,paused:false,startTime:null,stored:0,timer:null,view:"today",remindTimer:null,remindStart:0};
let tk=S.track;

tk.pickAct=i=>{tk.actIdx=i;document.querySelectorAll("#track-picker button.on").forEach(b=>b.classList.remove("on"));document.querySelectorAll("#track-picker button")[i].classList.add("on");tk.updateLabel();if(!tk.running)tk.render()};
tk.updateLabel=()=>{let act=(DB.activities||[])[tk.actIdx]||"📌 自定义";$("track-emoji").textContent=act.slice(0,2);$("track-act-name").textContent=act.slice(2).trim()||act;$("track-emoji").className="track-emoji"+(tk.running?" running":"")};
tk.getElapsed=()=>tk.paused?tk.stored:Math.floor((Date.now()-tk.startTime)/1000);
tk.updateClock=()=>{let s=tk.getElapsed();$("track-clock").textContent=String(Math.floor(s/3600)).padStart(2,"0")+":"+String(Math.floor((s%3600)/60)).padStart(2,"0")+":"+String(s%60).padStart(2,"0")};
tk.updateRange=()=>{if(!tk.running&&!tk.paused){$("track-range").textContent="—:— 至 —:—";return}let st=tk.running?tk.startTime:Date.now()-tk.stored*1000,stD=new Date(st),enD=tk.running?now():new Date(stD.getTime()+tk.stored*1000);$("track-range").textContent=hm(stD)+" 至 "+hm(enD)};
tk.startReminder=()=>{tk.remindStart=Date.now();tk.remindTimer=setInterval(()=>{if(tk.running&&Date.now()-tk.remindStart>300000){loudBeep();vib([500,200,300,200,500]);let act=(DB.activities||[])[tk.actIdx]||"专注中",t=$("remind-toast");t.textContent="⏰ "+act+" — 已经5分钟了，回来专注！";t.classList.add("show");setTimeout(()=>t.classList.remove("show"),3000);tk.remindStart=Date.now()}},60000)};
tk.stopReminder=()=>{if(tk.remindTimer){clearInterval(tk.remindTimer);tk.remindTimer=null}};

tk.start=()=>{tap();if(tk.running)return;if(tk.paused){tk.paused=false;tk.stored=tk.getElapsed()}else tk.stored=0;tk.running=true;tk.startTime=Date.now()-tk.stored*1000;$("track-emoji").classList.add("running");$("btn-play").style.display="none";$("btn-pause").style.display="";tk.updateLabel();tk.updateClock();tk.updateRange();tk.render();tk.timer=setInterval(()=>{tk.updateClock();tk.updateRange()},200);tk.startReminder();nfy("⏱ 开始计时",(DB.activities||[])[tk.actIdx]||"专注中")};
tk.pause=()=>{tap();if(!tk.running)return;tk.running=false;tk.paused=true;tk.stored=Math.floor((Date.now()-tk.startTime)/1000);clearInterval(tk.timer);tk.timer=null;tk.stopReminder();$("track-emoji").classList.remove("running");$("btn-play").style.display="";$("btn-pause").style.display="none";tk.updateRange();tk.render()};
tk.stop=()=>{tap();if(!tk.running&&!tk.paused)return;let secs=tk.paused?tk.stored:Math.floor((Date.now()-tk.startTime)/1000);if(secs<5){tk.running=false;tk.paused=false;tk.stored=0;tk.startTime=null;clearInterval(tk.timer);tk.timer=null;tk.stopReminder();$("btn-play").style.display="";$("btn-pause").style.display="none";$("track-clock").textContent="00:00:00";$("track-range").textContent="—:— 至 —:—";tk.render();return}let act=(DB.activities||[])[tk.actIdx]||"自定义",stDt=tk.running?new Date(tk.startTime):new Date(Date.now()-tk.stored*1000),enDt=new Date(stDt.getTime()+secs*1000);DB.timeRecords.push({id:uid(),activity:act,seconds:secs,startTime:stDt.toISOString(),endTime:enDt.toISOString(),date:todayStr(),createdAt:now().toISOString()});tk.running=false;tk.paused=false;tk.stored=0;tk.startTime=null;clearInterval(tk.timer);tk.timer=null;tk.stopReminder();save();$("btn-play").style.display="";$("btn-pause").style.display="none";$("track-clock").textContent="00:00:00";$("track-range").textContent="—:— 至 —:—";$("track-emoji").classList.remove("running");tk.render();vib([50,30,50]);loudBeep()};
tk.addActivity=()=>{tap();let name=prompt("输入活动名称（如：画画）");if(!name||!name.trim())return;DB.activities.push("📌 "+name.trim());save();tk.renderBtns();tk.pickAct(DB.activities.length-1)};
tk.removeActivity=i=>{tap();let acts=DB.activities||[];if(acts.length<=1){alert("至少保留一个活动");return}acts.splice(i,1);DB.activities=acts;save();if(tk.actIdx>=i)tk.actIdx--;if(tk.actIdx<0)tk.actIdx=0;tk.render();S.undo.show("已删除活动")};
tk.delRecord=id=>{tap();let i=findI(DB.timeRecords,id);if(i===-1)return;S.undo.set({t:"track",d:DB.timeRecords[i],i:i});DB.timeRecords.splice(i,1);save();tk.render();S.undo.show("已删除记录")};
tk.setView=v=>{tk.view=v;$("tb-today").classList.toggle("on",v==="today");$("tb-week").classList.toggle("on",v==="week");$("tb-all").classList.toggle("on",v==="all");tk.render()};

// Long press handler
let _actPressTm=null;
function handleActDown(e,i){_actPressTm=setTimeout(()=>{let el=$("act-del-"+i);if(el)el.style.display="block";vib(15);beep()},500)}
function handleActUp(e,i){clearTimeout(_actPressTm);setTimeout(()=>{let el=$("act-del-"+i);if(el)el.style.display="none"},2000)}

tk.renderBtns=()=>{
  let acts=DB.activities||[];
  $("track-picker").innerHTML=acts.map((a,i)=>'<button'+(i===tk.actIdx?' class="on"':'')+' onclick="tap();tk.pickAct('+i+')" style="position:relative" oncontextmenu="return false" onpointerdown="handleActDown(event,'+i+')" onpointerup="handleActUp(event,'+i+')" onpointerleave="handleActUp(event,'+i+')">'+a+'<span style="position:absolute;top:1px;right:2px;font-size:0.4rem;color:var(--text3);line-height:1;display:none" id="act-del-'+i+'" onclick="event.stopPropagation();tap();tk.removeActivity('+i+')">✕</span></button>').join("")+'<button class="add-act" onclick="tap();tk.addActivity()">+自定义</button>';
};

tk.render=()=>{
  if(curMode!=="track")return;
  let today=now().toISOString().split("T")[0],recs=DB.timeRecords.slice().sort((a,b)=>b.createdAt.localeCompare(a.createdAt));
  if(tk.view==="today")recs=recs.filter(r=>r.date===today);else if(tk.view==="week"){let w=now();w.setDate(w.getDate()-7);recs=recs.filter(r=>r.createdAt>=w.toISOString())}
  let todayRecs=DB.timeRecords.filter(r=>r.date===today);
  $("ts-today").textContent=hms(todayRecs.reduce((s,r)=>s+r.seconds,0));
  $("ts-week").textContent=hms(DB.timeRecords.filter(r=>{let w=now();w.setDate(w.getDate()-7);return r.createdAt>=w.toISOString()}).reduce((s,r)=>s+r.seconds,0));
  $("ts-sessions").textContent=todayRecs.length;
  let el=$("track-list");
  if(!recs.length){el.innerHTML='<div class="empty"><div class="ei">⏱</div>暂无安排记录</div>'}
  else el.innerHTML=renderDateGrouped(recs,function(r){
    let em=r.activity.slice(0,2),nm=r.activity.slice(2).trim()||r.activity,timeRange='';
    if(r.startTime){let st=new Date(r.startTime),et=new Date(r.endTime||r.startTime);timeRange='<span style="font-size:0.58rem;color:var(--text3);margin-left:4px">'+hm(st)+' - '+hm(et)+'</span>'}
    return'<div class="list-item"><div class="li-icon" style="background:rgba(194,101,58,0.08)">'+em+'</div><div class="li-info"><div class="li-name">'+esc(nm)+timeRange+'</div><div class="li-date">'+r.date+'</div></div><div class="li-val" style="color:var(--accent)">'+hms(r.seconds)+'</div><span class="li-del" onclick="event.stopPropagation();tk.delRecord(\''+r.id+'\')">✕</span></div>'
  },false);
  tk.renderBtns();tk.updateLabel();if(!tk.running&&!tk.paused)$("track-clock").textContent="00:00:00";
};

/* -- UNDO -- */
S.undo={data:null,timer:null};
S.undo.set=function(d){this.data=d};
S.undo.show=function(msg){clearTimeout(this.timer);$("undo-msg").textContent=msg;$("undo").classList.add("on");let self=this;this.timer=setTimeout(()=>{self.data=null;$("undo").classList.remove("on")},4000)};
S.undo.exec=function(){let d=this.data;if(!d)return;
  if(d.t==="batch"){d.d.forEach(t=>DB.tasks.push(t))}
  else if(d.t==="task")DB.tasks.splice(d.i,0,d.d);
  else if(d.t==="expense")DB.expenses.splice(d.i,0,d.d);
  else if(d.t==="word")DB.wordRecords.splice(d.i,0,d.d);
  else if(d.t==="track")DB.timeRecords.splice(d.i,0,d.d);
  this.data=null;save();let renders={task:S.task.render,expense:S.expense.render,word:S.word.render,track:S.track.render};renders[curMode]();$("undo").classList.remove("on")
};

/* -- IO -- */
S.io={};
S.io.export=()=>{let b=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"});let a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="daily-"+todayStr()+".json";a.click()};
S.io.import=()=>{let inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=function(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=function(ev){try{let d=JSON.parse(ev.target.result),tc=(d.tasks||[]).length,ec=(d.expenses||[]).length,wc=(d.wordRecords||[]).length,rc=(d.timeRecords||[]).length;if(confirm("导入 "+tc+" 任务 / "+ec+" 账单 / "+wc+" 单词 / "+rc+" 安排？")){let merge=(target,src)=>{let ids=new Set(target.map(x=>x.id));src.forEach(x=>{if(!ids.has(x.id))target.push(x)})};if(d.tasks)merge(DB.tasks,d.tasks);if(d.expenses)merge(DB.expenses,d.expenses);if(d.wordRecords)merge(DB.wordRecords,d.wordRecords);if(d.timeRecords)merge(DB.timeRecords,d.timeRecords);DB.pomos=Math.max(DB.pomos||0,d.pomos||0);if(d.activities)DB.activities=d.activities;save();let renders={task:S.task.render,expense:S.expense.render,word:S.word.render,track:S.track.render};renders[curMode]()}}catch(ex){alert("格式错误")}};r.readAsText(f)};inp.click()};
const exportAll=()=>S.io.export();

/* Lightbox */
function closeLightbox(){$("lightbox").classList.remove("on")}

/* Clock */
function tickClock(){$("live-time").textContent=String(now().getHours()).padStart(2,"0")+":"+String(now().getMinutes()).padStart(2,"0")}

/* =========================== INIT =========================== */
load();S.task.render();S.expense.render();S.word.render();S.track.render();tickClock();
setInterval(tickClock,30000);
if("serviceWorker"in navigator){navigator.serviceWorker.register("./sw.js").then(reg=>{reg.addEventListener("updatefound",()=>{let nw=reg.installing;nw.addEventListener("statechange",()=>{if(nw.state==="installed"&&navigator.serviceWorker.controller){nw.postMessage("skipWaiting");setTimeout(()=>location.reload(),300)}})})})}
$("task-input").addEventListener("keydown",e=>{if(e.key==="Enter"){tap();S.task.add()}});
$("edit-sheet").addEventListener("click",function(e){if(e.target===this)S.task.closeEdit()});
$("exp-amount").addEventListener("keydown",e=>{if(e.key==="Enter"){tap();S.expense.add()}});
$("word-new").addEventListener("keydown",e=>{if(e.key==="Enter"){tap();S.word.add()}});
$("word-review").addEventListener("keydown",e=>{if(e.key==="Enter"){tap();S.word.add()}});
</script>
</body>
