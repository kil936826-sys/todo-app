<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>日常 · 任务|记账|日记</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="日常">
<link rel="apple-touch-icon" href="./icons/apple-icon.png">
<meta name="theme-color" content="#0C0C14">
<link rel="manifest" href="./manifest.json">
<style>
:root{--bg:#0C0C14;--surface:#151520;--surface2:#1C1C2A;--border:rgba(255,255,255,0.06);--text:#EDEDF5;--text2:#9A9AB0;--text3:#5C5C72;--accent:#7C6FF7;--accent2:#F472B6;--accent3:#38BDF8;--danger:#FF5B5B;--success:#34D399;--warn:#FBBF24;--gradient-1:linear-gradient(135deg,#7C6FF7,#5B8DEF);--gradient-2:linear-gradient(135deg,#F472B6,#FB923C);--gradient-3:linear-gradient(135deg,#38BDF8,#34D399);--font:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;--radius:16px;--radius-sm:10px;--safe-b:env(safe-area-inset-bottom,12px);--safe-t:env(safe-area-inset-top,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;user-select:none;-webkit-user-select:none;background-image:radial-gradient(ellipse 80% 80% at 50% -20%,rgba(124,111,247,0.06),transparent),radial-gradient(ellipse 60% 60% at 90% 80%,rgba(244,114,182,0.04),transparent)}
header{padding:12px 16px;padding-top:calc(12px + var(--safe-t));display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:10;background:linear-gradient(180deg,var(--bg) 60%,transparent)}
header .logo{display:flex;align-items:center;gap:8px}
header .logo-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;box-shadow:0 4px 16px rgba(124,111,247,0.3);transition:all 0.3s}
header .logo-icon.task{background:var(--gradient-1);box-shadow:0 4px 16px rgba(124,111,247,0.3)}
header .logo-icon.expense{background:var(--gradient-2);box-shadow:0 4px 16px rgba(244,114,182,0.3)}
header .logo-icon.journal{background:var(--gradient-3);box-shadow:0 4px 16px rgba(56,189,248,0.3)}
header h1{font-size:1.2rem;font-weight:700}
header .right{display:flex;align-items:center;gap:6px}
header .icon-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
header .icon-btn:active{background:var(--surface2);transform:scale(0.92)}

/* ===== POMODORO ===== */
.pomo-bar{margin:0 16px 8px;padding:12px 14px;border-radius:var(--radius);background:linear-gradient(135deg,rgba(124,111,247,0.1),rgba(91,141,239,0.06));border:1px solid rgba(124,111,247,0.2);display:none;align-items:center;gap:10px;flex-shrink:0}
.pomo-bar.on{display:flex}
.pomo-ring{width:40px;height:40px;flex-shrink:0}
.pomo-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.pomo-ring .bg{fill:none;stroke:rgba(255,255,255,0.05);stroke-width:4}
.pomo-ring .fg{fill:none;stroke:#7C6FF7;stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.pomo-info{flex:1;min-width:0;overflow:hidden}
.pomo-timer{font-size:1.5rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:1px}
.pomo-label{font-size:0.65rem;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pomo-actions{display:flex;gap:4px}
.pomo-actions button{width:30px;height:30px;border-radius:50%;border:1.5px solid rgba(255,255,255,0.08);background:transparent;cursor:pointer;font-size:0.7rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.pomo-actions button:active{transform:scale(0.9)}
.pomo-settings{display:none;margin:0 16px 6px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);flex-shrink:0;align-items:center;gap:6px;flex-wrap:wrap}
.pomo-settings.show{display:flex}
.pomo-settings label{font-size:0.65rem;color:var(--text2)}
.pomo-settings input{width:44px;padding:5px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:0.75rem;text-align:center;outline:none}
.pomo-settings button{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:0.65rem;cursor:pointer}

/* ===== BOTTOM NAV ===== */
.nav-bar{display:flex;flex-shrink:0;border-top:1px solid var(--border);background:var(--bg);padding-bottom:var(--safe-b)}
.nav-bar button{flex:1;padding:10px 0 6px;border:none;background:transparent;color:var(--text3);font-family:var(--font);font-size:0.68rem;cursor:pointer;transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:2px}
.nav-bar button .ni{font-size:1.15rem;transition:all 0.2s}
.nav-bar button.on{color:var(--accent)}
.nav-bar button.on:nth-child(2){color:var(--accent2)}
.nav-bar button.on:nth-child(3){color:var(--accent3)}
.nav-bar button:active .ni{transform:scale(0.85)}

/* ===== PANELS ===== */
.panel{display:none;flex-direction:column;flex:1;overflow:hidden}
.panel.on{display:flex}
.scroll-area{flex:1;overflow-y:auto;padding:0 16px 4px;-webkit-overflow-scrolling:touch}
.scroll-area::-webkit-scrollbar{display:none}

/* ===== SHARED ===== */
.stats{display:flex;gap:6px;padding:0 16px 8px;flex-shrink:0}
.stat{flex:1;background:var(--surface);border-radius:var(--radius-sm);padding:9px 6px;text-align:center;border:1px solid var(--border);cursor:pointer;transition:all 0.15s;overflow:hidden;position:relative}
.stat::after{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--gradient-1);opacity:0;transition:opacity 0.3s}
.stat:active{transform:scale(0.96)}
.stat.active::after{opacity:1}
.stat .num{font-size:1.2rem;font-weight:800;letter-spacing:-1px}
.stat .lbl{font-size:0.6rem;color:var(--text2);margin-top:1px}
.empty{display:flex;flex-direction:column;align-items:center;padding:50px 20px}
.empty .ei{font-size:3rem;margin-bottom:8px;opacity:0.5}
.empty .em{font-size:0.85rem;color:var(--text3);font-weight:500}
.empty .es{font-size:0.68rem;color:var(--text3);opacity:0.4;margin-top:4px}
.undo-toast{position:fixed;bottom:calc(var(--safe-b) + 90px);left:50%;transform:translateX(-50%);z-index:300;background:var(--surface);border:1px solid var(--border);padding:10px 16px;border-radius:20px;font-size:0.78rem;display:none;gap:8px;align-items:center;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:fadeUp 0.3s ease-out}
.undo-toast.show{display:flex}
.undo-toast button{background:var(--accent);color:#fff;border:none;padding:4px 10px;border-radius:12px;font-family:var(--font);font-size:0.7rem;cursor:pointer;font-weight:600}
@keyframes fadeUp{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.install-toast{position:fixed;top:calc(var(--safe-t) + 50px);left:50%;transform:translateX(-50%);z-index:300;background:var(--surface);border:1px solid var(--border);padding:10px 18px;border-radius:20px;font-size:0.78rem;cursor:pointer;display:none;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,0.5);animation:toastIn 0.3s ease-out}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.install-toast.on{display:block}

/* ===== TASK PANEL ===== */
.task-progress{margin:0 16px 8px;padding:9px 12px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;gap:8px;flex-shrink:0}
.task-progress .dp-info{flex:1;min-width:0}
.task-progress .dp-title{font-size:0.68rem;color:var(--text2)}
.task-progress .dp-count{font-size:0.8rem;font-weight:700;margin-top:1px}
.task-progress .dp-bar{width:60px;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.task-progress .dp-fill{height:100%;background:var(--gradient-1);border-radius:3px;transition:width 0.4s}
.toolbar{display:flex;gap:6px;padding:0 16px 6px;flex-shrink:0;align-items:center}
.search-box{display:none;flex:1;align-items:center;gap:4px;background:var(--surface);border-radius:20px;border:1.5px solid var(--border);padding:5px 10px}
.search-box.show{display:flex}
.search-box input{flex:1;border:none;background:transparent;color:var(--text);font-family:var(--font);font-size:0.78rem;outline:none;padding:3px 0}
.search-box .clear-btn{width:20px;height:20px;border-radius:50%;border:none;background:var(--text3);color:var(--bg);cursor:pointer;font-size:0.55rem;display:flex;align-items:center;justify-content:center}
.sort-btn{padding:5px 10px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:var(--font);font-size:0.66rem;cursor:pointer;white-space:nowrap;transition:all 0.15s}
.sort-btn:active{background:var(--surface2)}
.task-tabs{display:flex;padding:0 16px;gap:3px;flex-shrink:0}
.task-tabs button{padding:6px 12px;border-radius:20px;border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:0.72rem;cursor:pointer;transition:all 0.2s;font-weight:500}
.task-tabs button.on{background:var(--surface2);color:var(--text)}
.cat-row{display:flex;gap:5px;padding:5px 16px 6px;flex-shrink:0;overflow-x:auto}
.cat-row::-webkit-scrollbar{display:none}
.cat-row button{padding:4px 10px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font);font-size:0.66rem;cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0}
.cat-row button.on{background:var(--accent);border-color:var(--accent);color:#fff}
.task-add-row{display:flex;gap:6px;padding:6px 16px 10px;flex-shrink:0}
.task-add-row .input-wrap{flex:1;display:flex;align-items:center;gap:4px;background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:3px 3px 3px 12px;transition:all 0.25s}
.task-add-row .input-wrap:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(124,111,247,0.08)}
.task-add-row input{flex:1;border:none;background:transparent;color:var(--text);font-family:var(--font);font-size:0.84rem;outline:none;min-width:0;padding:7px 0}
.task-add-row .chip{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;font-size:0.72rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.task-add-row .chip:active{transform:scale(0.88)}
.task-add-row .add-btn{width:42px;height:42px;border-radius:var(--radius-sm);border:none;background:var(--gradient-1);color:#fff;font-size:1.2rem;cursor:pointer;flex-shrink:0;box-shadow:0 3px 10px rgba(124,111,247,0.3);transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.task-add-row .add-btn:active{transform:scale(0.9);filter:brightness(1.15)}
.task-bot-bar{display:flex;gap:6px;padding:8px 16px;border-top:1px solid var(--border);flex-shrink:0}
.task-bot-bar button{flex:1;padding:9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:var(--font);font-size:0.7rem;cursor:pointer;transition:all 0.2s}
.task-bot-bar button:active{background:var(--surface2);color:var(--text)}

/* Task card */
.tcard-wrap{position:relative;margin-bottom:6px;overflow:hidden;border-radius:var(--radius)}
.tcard-wrap .swipe-bg{position:absolute;inset:0;border-radius:var(--radius);display:flex;align-items:center;justify-content:flex-end;padding-right:18px;font-size:0.7rem;font-weight:700;z-index:0;background:linear-gradient(135deg,rgba(255,91,91,0.25),rgba(249,115,22,0.15));color:var(--danger)}
.tcard{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);transition:transform 0.25s cubic-bezier(.4,0,.2,1);position:relative;z-index:1;touch-action:pan-y}
.tcard-inner{display:flex;align-items:flex-start;gap:8px;padding:12px}
.tcard.overdue{border-left:2px solid var(--danger)}
.tcheck{width:22px;height:22px;border-radius:50%;flex-shrink:0;margin-top:1px;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.25s cubic-bezier(.4,0,.2,1)}
.tcheck.done{background:var(--success);border-color:var(--success);animation:popIn 0.3s cubic-bezier(.4,0,.2,1)}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.tcheck.done::after{content:"✓";color:#fff;font-size:0.65rem;font-weight:700}
.tbody{flex:1;min-width:0;cursor:pointer}
.ttxt{font-size:0.84rem;font-weight:500;line-height:1.4;word-break:break-word}
.ttags{display:flex;gap:4px;margin-top:3px;flex-wrap:wrap;font-size:0.63rem}
.tag{padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.tag-w{background:rgba(124,111,247,0.12);color:var(--accent)}.tag-s{background:rgba(251,191,36,0.12);color:var(--warn)}.tag-l{background:rgba(52,211,153,0.12);color:var(--success)}.tag-o{background:rgba(154,154,176,0.12);color:var(--text2)}
.tag-h{background:rgba(255,91,91,0.12);color:var(--danger)}.tag-m{background:rgba(251,191,36,0.12);color:var(--warn)}.tag-lo{background:rgba(52,211,153,0.12);color:var(--success)}
.tag-d{background:rgba(124,111,247,0.1);color:var(--accent)}.tag-ov{background:rgba(255,91,91,0.18);color:var(--danger);animation:glitch 2s infinite}.tag-re{background:rgba(56,189,248,0.1);color:var(--info)}.tag-tm{background:rgba(52,211,153,0.12);color:var(--success);animation:blink 1.2s infinite}
@keyframes glitch{0%,100%{opacity:1}50%{opacity:0.5}}@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.tactions{display:flex;gap:1px;flex-shrink:0}
.tactions button{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;font-size:0.72rem;background:transparent;display:flex;align-items:center;justify-content:center;transition:all 0.15s;color:var(--text3)}
.tactions .tpomo{color:var(--accent)}.tactions .tpomo.on{color:var(--success);background:rgba(52,211,153,0.08)}
.tactions .tdel:active{color:var(--danger)}
.subtasks{margin-top:4px}.subtask{display:flex;align-items:center;gap:4px;padding:2px 0;font-size:0.72rem;color:var(--text2)}
.subtask .scheck{width:16px;height:16px;border-radius:3px;border:1.5px solid var(--text3);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.subtask .scheck.done{background:var(--success);border-color:var(--success)}
.subtask .scheck.done::after{content:"✓";color:#fff;font-size:0.45rem;font-weight:700}
.subtask.done .stxt{text-decoration:line-through;color:var(--text3)}

/* ===== EXPENSE PANEL ===== */
.exp-summary{display:flex;gap:6px;padding:0 16px 8px;flex-shrink:0}
.exp-card{flex:1;background:var(--surface);border-radius:var(--radius-sm);padding:12px;border:1px solid var(--border);text-align:center}
.exp-card .ev{font-size:1.35rem;font-weight:800;letter-spacing:-1px}
.exp-card .el{font-size:0.62rem;color:var(--text2);margin-top:1px}
.exp-card.in .ev{color:var(--success)}.exp-card.out .ev{color:var(--danger)}.exp-card.net .ev{color:var(--accent)}
.exp-month-nav{display:flex;align-items:center;gap:8px;padding:0 16px 6px;flex-shrink:0;justify-content:center}
.exp-month-nav button{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:0.8rem;transition:all 0.15s}
.exp-month-nav .mnl{font-size:0.8rem;font-weight:700;min-width:70px;text-align:center}
.exp-bd{padding:0 16px 6px;flex-shrink:0}
.exp-bd .cb{margin-bottom:5px;display:flex;align-items:center;gap:6px}
.exp-bd .cb .ci{width:24px;text-align:center;font-size:0.65rem;flex-shrink:0}
.exp-bd .cb .cn{width:32px;font-size:0.63rem;color:var(--text2);flex-shrink:0}
.exp-bd .cb .ct{flex:1;height:5px;background:var(--bg);border-radius:3px;overflow:hidden}
.exp-bd .cb .cf{height:100%;border-radius:3px;transition:width 0.4s}
.exp-bd .cb .ca{width:45px;text-align:right;font-size:0.68rem;font-weight:600;flex-shrink:0;color:var(--text2)}
.exp-add-row{display:flex;gap:5px;padding:6px 16px 8px;flex-shrink:0;align-items:center}
.exp-add-row .amt-in{width:80px;padding:10px 8px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:1.1rem;font-weight:700;outline:none;text-align:center}
.exp-add-row .amt-in:focus{border-color:var(--accent2);box-shadow:0 0 0 3px rgba(244,114,182,0.08)}
.exp-add-row .ecat-btn{padding:7px 10px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.72rem;white-space:nowrap;font-family:var(--font);color:var(--text);transition:all 0.15s;flex-shrink:0}
.exp-add-row .ecat-btn:active{background:var(--surface2)}
.exp-add-row .add-btn{width:42px;height:42px;border-radius:var(--radius-sm);border:none;background:var(--gradient-2);color:#fff;font-size:1.2rem;cursor:pointer;flex-shrink:0;box-shadow:0 3px 10px rgba(244,114,182,0.3);transition:all 0.2s;display:flex;align-items:center;justify-content:center}
.exp-add-row .add-btn:active{transform:scale(0.9);filter:brightness(1.15)}
.exp-date-label{font-size:0.64rem;color:var(--text3);padding:3px 0 5px;font-weight:600}
.exp-item{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--surface);border-radius:var(--radius-sm);margin-bottom:4px;border:1px solid var(--border)}
.exp-item .eii{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:0.8rem;flex-shrink:0}
.exp-item .einfo{flex:1;min-width:0}
.exp-item .ein{font-size:0.8rem;font-weight:500}
.exp-item .eid{font-size:0.62rem;color:var(--text3);margin-top:1px}
.exp-item .eiamt{font-weight:700;font-size:0.88rem;flex-shrink:0}
.eiamt.in{color:var(--success)}.eiamt.out{color:var(--danger)}
.exp-item .eidel{width:22px;height:22px;border-radius:50%;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:0.6rem;display:none;align-items:center;justify-content:center}
.exp-item:active .eidel{display:flex}
.exp-bot-bar{display:flex;gap:6px;padding:8px 16px;border-top:1px solid var(--border);flex-shrink:0}
.exp-bot-bar button{flex:1;padding:9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:var(--font);font-size:0.7rem;cursor:pointer;transition:all 0.2s}
.exp-bot-bar button.on{background:var(--surface2);color:var(--accent2);border-color:rgba(244,114,182,0.2)}
.exp-bot-bar button:active{background:var(--surface2)}

/* ===== JOURNAL PANEL ===== */
.journal-add-row{display:flex;gap:6px;padding:6px 16px 8px;flex-shrink:0}
.journal-add-row textarea{flex:1;padding:10px 12px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:0.84rem;outline:none;resize:none;height:44px;transition:all 0.25s}
.journal-add-row textarea:focus{border-color:var(--accent3);box-shadow:0 0 0 3px rgba(56,189,248,0.08);height:60px}
.journal-add-row .add-btn{width:42px;height:42px;border-radius:var(--radius-sm);border:none;background:var(--gradient-3);color:#fff;font-size:1.2rem;cursor:pointer;flex-shrink:0;box-shadow:0 3px 10px rgba(56,189,248,0.3);transition:all 0.2s;display:flex;align-items:center;justify-content:center;align-self:flex-end}
.journal-add-row .add-btn:active{transform:scale(0.9);filter:brightness(1.15)}
.photo-btn{position:relative;flex-shrink:0;width:34px;height:34px;border-radius:50%;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;align-self:flex-end;margin-bottom:4px;transition:all 0.15s;overflow:hidden}
.photo-btn:active{transform:scale(0.88)}
.photo-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.photo-preview{display:flex;gap:4px;padding:0 16px 6px;flex-shrink:0;flex-wrap:wrap}
.photo-preview .pp{width:48px;height:48px;border-radius:8px;background-size:cover;background-position:center;position:relative;border:1px solid var(--border)}
.photo-preview .pp .rm{position:absolute;top:-6px;right:-6px;width:18px;height:18px;border-radius:50%;background:var(--danger);color:#fff;border:none;font-size:0.55rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.journal-stats{display:flex;gap:6px;padding:0 16px 6px;flex-shrink:0}
.journal-stats .js{flex:1;background:var(--surface);border-radius:var(--radius-sm);padding:8px 6px;text-align:center;border:1px solid var(--border)}
.journal-stats .js .jv{font-size:1.1rem;font-weight:800;color:var(--accent3)}
.journal-stats .js .jl{font-size:0.58rem;color:var(--text2);margin-top:1px}

.jentry{background:var(--surface);border-radius:var(--radius);margin-bottom:10px;border:1px solid var(--border);overflow:hidden}
.jentry-header{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 6px}
.jentry-date{font-size:0.68rem;color:var(--text3);font-weight:600}
.jentry-time{font-size:0.62rem;color:var(--text3);opacity:0.6}
.jentry-text{padding:2px 14px 10px;font-size:0.84rem;line-height:1.6;word-break:break-word;white-space:pre-wrap}
.jentry-photos{display:flex;gap:3px;padding:0 14px 10px;flex-wrap:wrap}
.jentry-photos .jp{height:80px;border-radius:8px;background-size:cover;background-position:center;cursor:pointer;transition:all 0.2s}
.jentry-photos .jp:active{transform:scale(0.96)}
.jentry-footer{padding:6px 14px;border-top:1px solid var(--border);display:flex;justify-content:flex-end}
.jentry-footer button{background:transparent;border:none;color:var(--text3);font-size:0.65rem;cursor:pointer;padding:3px 8px;border-radius:12px;font-family:var(--font);transition:all 0.15s}
.jentry-footer button:active{color:var(--danger);background:rgba(255,91,91,0.08)}
.journal-bot-bar{display:flex;gap:6px;padding:8px 16px;border-top:1px solid var(--border);flex-shrink:0}
.journal-bot-bar button{flex:1;padding:9px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:var(--font);font-size:0.7rem;cursor:pointer;transition:all 0.2s}
.journal-bot-bar button.on{background:var(--surface2);color:var(--accent3);border-color:rgba(56,189,248,0.2)}
.journal-bot-bar button:active{background:var(--surface2)}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;z-index:400;background:rgba(0,0,0,0.92);justify-content:center;align-items:center}
.lightbox.show{display:flex}
.lightbox img{max-width:95vw;max-height:85vh;border-radius:8px;object-fit:contain}
.lightbox .lb-close{position:absolute;top:20px;right:20px;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.1);color:#fff;border:none;font-size:1rem;cursor:pointer}

/* ===== SHEET (editing) ===== */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;justify-content:center;align-items:flex-end;backdrop-filter:blur(4px)}
.overlay.show{display:flex}
.sheet{width:100%;max-width:500px;background:var(--surface);border-radius:24px 24px 0 0;padding:8px 20px 20px;padding-bottom:calc(20px + var(--safe-b));animation:slideUp 0.3s cubic-bezier(.4,0,.2,1);border-top:1px solid var(--border);max-height:90vh;overflow-y:auto}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet .handle{width:36px;height:4px;border-radius:2px;background:var(--text3);margin:10px auto 14px;opacity:0.3}
.sheet h3{font-size:1rem;font-weight:700;margin-bottom:14px}
.sheet .row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.sheet .row label{width:40px;flex-shrink:0;font-size:0.72rem;color:var(--text2);font-weight:500}
.sheet input,.sheet select{flex:1;padding:9px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:0.84rem;outline:none}
.sheet input:focus,.sheet select:focus{border-color:var(--accent)}
.sheet .srow{display:flex;gap:5px;margin-bottom:5px;align-items:center}
.sheet .srow input{flex:1;padding:7px 8px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:0.78rem;outline:none}
.sheet .srow .rms{width:24px;height:24px;border-radius:50%;border:none;background:transparent;color:var(--danger);cursor:pointer;font-size:0.7rem}
.sheet .asub{font-size:0.68rem;color:var(--accent);cursor:pointer;display:inline-block;font-weight:500}
.sheet .btn-row{display:flex;gap:8px;margin-top:16px}
.sheet .btn-save{flex:2;padding:12px;border-radius:var(--radius-sm);border:none;background:var(--gradient-1);color:#fff;font-size:0.9rem;font-weight:700;cursor:pointer;font-family:var(--font)}
.sheet .btn-save:active{filter:brightness(1.15);transform:scale(0.96)}
.sheet .btn-danger{flex:1;padding:12px;border-radius:var(--radius-sm);border:none;background:rgba(255,91,91,0.08);color:var(--danger);font-size:0.85rem;cursor:pointer;font-family:var(--font);font-weight:600}
.sheet .btn-cancel{flex:1;padding:12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:transparent;color:var(--text2);font-size:0.85rem;cursor:pointer;font-family:var(--font)}
</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0"><defs><linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#7C6FF7"/><stop offset="100%" stop-color="#34D399"/></linearGradient></defs></svg>
<div class="install-toast" id="install-toast" onclick="installApp()">📲 点此安装到手机桌面</div>

<!-- HEADER -->
<header>
  <div class="logo"><div class="logo-icon task" id="logo-icon">✓</div><h1 id="header-title">任务清单</h1></div>
  <div class="right">
    <button class="icon-btn" id="header-search-btn" onclick="toggleSearch()" title="搜索">🔍</button>
    <button class="icon-btn" onclick="togglePomoSettings()" title="番茄钟">⚙️</button>
    <div style="text-align:right;font-size:0.95rem;font-weight:700;font-variant-numeric:tabular-nums" id="live-time">00:00</div>
  </div>
</header>

<!-- POMODORO -->
<div class="pomo-bar" id="pomo-bar">
  <div class="pomo-ring"><svg viewBox="0 0 40 40"><circle class="bg" cx="20" cy="20" r="17"/><circle class="fg" id="pomo-circle" cx="20" cy="20" r="17" stroke-dasharray="106.8" stroke-dashoffset="0"/></svg></div>
  <div class="pomo-info"><div class="pomo-timer" id="pomo-timer">25:00</div><div class="pomo-label" id="pomo-task-label">专注中</div></div>
  <div class="pomo-actions"><button onclick="skipPomo()" style="color:var(--warn);border-color:rgba(251,191,36,0.3)">⏭</button><button onclick="stopPomo()" style="color:var(--danger);border-color:rgba(255,91,91,0.3)">✕</button></div>
</div>
<div class="pomo-settings" id="pomo-settings">
  <label>🍅</label><input type="number" id="set-work" value="25" min="1" max="120"><label>分 ☕</label><input type="number" id="set-break" value="5" min="1" max="60"><label>分</label>
  <button onclick="savePomoSettings()">保存</button>
</div>

<!-- ========== TASK PANEL ========== -->
<div class="panel on" id="panel-task">
  <div class="task-progress"><div class="dp-info"><div class="dp-title">📅 今日进度</div><div class="dp-count" id="dp-text">0/0 已完成</div></div><div class="dp-bar"><div class="dp-fill" id="dp-fill" style="width:0%"></div></div></div>
  <div class="stats">
    <div class="stat active" onclick="switchTaskTab('all')" id="card-all"><div class="num" id="s-total">0</div><div class="lbl">全部</div></div>
    <div class="stat" onclick="switchTaskTab('active')" id="card-active"><div class="num" id="s-active">0</div><div class="lbl">待办</div></div>
    <div class="stat" onclick="switchTaskTab('done')" id="card-done"><div class="num" id="s-done">0</div><div class="lbl">完成</div></div>
    <div class="stat"><div class="num" id="s-pomo" style="color:#F472B6">0</div><div class="lbl">🍅 番茄</div></div>
  </div>
  <div class="toolbar">
    <div class="search-box" id="search-box"><input id="search-input" placeholder="搜索..." oninput="renderTasks()"><button class="clear-btn" onclick="clearSearch()">✕</button></div>
    <button class="sort-btn" onclick="cycleSort()" id="sort-btn">🕐 最新</button>
  </div>
  <div class="task-tabs">
    <button class="on" onclick="switchTaskTab('all')" id="tab-all">全部</button><button onclick="switchTaskTab('today')" id="tab-today">📅 今日</button><button onclick="switchTaskTab('active')" id="tab-active">⏳ 待办</button><button onclick="switchTaskTab('done')" id="tab-done">✅ 完成</button>
  </div>
  <div class="cat-row" id="cat-row">
    <button class="on" onclick="setCatFilter('all')" id="cat-all">📋 全部</button><button onclick="setCatFilter('work')" id="cat-work">💼 工作</button><button onclick="setCatFilter('study')" id="cat-study">📚 学习</button><button onclick="setCatFilter('life')" id="cat-life">🏠 生活</button><button onclick="setCatFilter('other')" id="cat-other">📌 其他</button>
  </div>
  <div class="task-add-row">
    <div class="input-wrap"><input id="task-input" placeholder="输入任务，支持「今天/明天/后天」…" enterkeyhint="done"><button class="chip" id="tc-cat" onclick="cycTCat()">💼</button><button class="chip" id="tc-prio" onclick="cycTPrio()">🟡</button><button class="chip" id="tc-rep" onclick="cycTRep()" style="font-size:0.6rem">1×</button></div>
    <button class="add-btn" onclick="addTask()">＋</button>
  </div>
  <div class="scroll-area" id="task-list"></div>
  <div class="task-bot-bar"><button onclick="batchClearDone()">🗑 清除完成</button><button onclick="batchReschedule()">🔄 重置过期</button><button onclick="exportAll()">📤 导出</button><button onclick="importAll()">📥 导入</button></div>
</div>

<!-- ========== EXPENSE PANEL ========== -->
<div class="panel" id="panel-expense">
  <div class="exp-summary">
    <div class="exp-card in"><div class="ev" id="mc-income">¥0</div><div class="el">💰 收入</div></div>
    <div class="exp-card out"><div class="ev" id="mc-expense">¥0</div><div class="el">💸 支出</div></div>
    <div class="exp-card net"><div class="ev" id="mc-balance">¥0</div><div class="el">📊 结余</div></div>
  </div>
  <div class="exp-month-nav"><button onclick="chExpMonth(-1)">◀</button><div class="mnl" id="exp-month-label">2026年7月</div><button onclick="chExpMonth(1)">▶</button></div>
  <div class="exp-bd" id="exp-bd"></div>
  <div class="exp-add-row">
    <input type="number" class="amt-in" id="exp-amount" placeholder="金额" step="0.01" min="0" enterkeyhint="done">
    <button class="ecat-btn" id="exp-cat-btn" onclick="cycECat()">🍔 餐饮</button>
    <button class="ecat-btn" id="exp-type-btn" onclick="cycEType()">💸 支出</button>
    <button class="add-btn" onclick="addExpense()">＋</button>
  </div>
  <div class="scroll-area" id="exp-list"></div>
  <div class="exp-bot-bar"><button class="on" onclick="setExpView('month')" id="eb-month">📅 本月</button><button onclick="setExpView('all')" id="eb-all">📋 全部</button><button onclick="exportAll()">📤 导出</button></div>
</div>

<!-- ========== JOURNAL PANEL ========== -->
<div class="panel" id="panel-journal">
  <div class="journal-stats">
    <div class="js"><div class="jv" id="js-total">0</div><div class="jl">📝 日记</div></div>
    <div class="js"><div class="jv" id="js-photos">0</div><div class="jl">📷 照片</div></div>
    <div class="js"><div class="jv" id="js-days">0</div><div class="jl">🔥 连续天</div></div>
  </div>
  <div class="journal-add-row">
    <textarea id="journal-text" placeholder="记录今天吃了什么、做了什么..." enterkeyhint="done"></textarea>
    <div class="photo-btn" title="添加照片">📷<input type="file" id="photo-input" accept="image/*" multiple onchange="onPhotosSelected()"></div>
    <button class="add-btn" onclick="addJournal()">＋</button>
  </div>
  <div class="photo-preview" id="photo-preview"></div>
  <div class="scroll-area" id="journal-list"></div>
  <div class="journal-bot-bar"><button class="on" onclick="setJournalView('week')" id="jb-week">📅 本周</button><button onclick="setJournalView('all')" id="jb-all">📋 全部</button><button onclick="exportAll()">📤 导出</button></div>
</div>

<!-- BOTTOM NAV -->
<div class="nav-bar">
  <button class="on" onclick="switchMode('task')" id="nav-task"><span class="ni">📋</span>任务</button>
  <button onclick="switchMode('expense')" id="nav-expense"><span class="ni">💰</span>记账</button>
  <button onclick="switchMode('journal')" id="nav-journal"><span class="ni">📔</span>日记</button>
</div>

<!-- EDIT TASK SHEET -->
<div class="overlay" id="edit-sheet"><div class="sheet">
  <div class="handle"></div><h3>✏️ 编辑任务</h3>
  <div class="row"><label>内容</label><input id="e-text"></div>
  <div class="row"><label>截止</label><input type="date" id="e-due"></div>
  <div class="row"><label>优先级</label><select id="e-prio"><option value="high">🔴 高</option><option value="mid">🟡 中</option><option value="low">🟢 低</option></select></div>
  <div class="row"><label>分类</label><select id="e-cat"><option value="work">💼 工作</option><option value="study">📚 学习</option><option value="life">🏠 生活</option><option value="other">📌 其他</option></select></div>
  <div class="row"><label>重复</label><select id="e-repeat"><option value="">不重复</option><option value="daily">🔄 每日</option><option value="weekly">🔄 每周</option><option value="monthly">🔄 每月</option></select></div>
  <div style="font-size:0.72rem;color:var(--text2);font-weight:500;margin-bottom:4px">📝 子任务</div><div id="subtask-list"></div><span class="asub" onclick="addSubField()">+ 添加子任务</span>
  <div class="btn-row"><button class="btn-save" onclick="saveEdit()">💾 保存</button><button class="btn-danger" onclick="deleteFromEdit()">🗑 删除</button></div>
  <button class="btn-cancel" onclick="closeEdit()" style="width:100%;margin-top:6px">取消</button>
</div></div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()"><img id="lightbox-img" src=""><button class="lb-close">✕</button></div>

<!-- UNDO TOAST -->
<div class="undo-toast" id="undo-toast"><span id="undo-msg"></span><button onclick="undoDelete()">撤销</button></div>

<script>
// ==================== DATA ====================
const KEY="daily-pwa-v1";
let DB={tasks:[],expenses:[],journals:[],pomos:0,workTime:25,breakTime:5};
function save(){localStorage.setItem(KEY,JSON.stringify(DB))}
function load(){try{var d=JSON.parse(localStorage.getItem(KEY));if(d){DB=d;if(!DB.workTime)DB.workTime=25;if(!DB.breakTime)DB.breakTime=5}if(!DB.journals)DB.journals=[];if(!DB.expenses)DB.expenses=[];DB.expenses=DB.expenses.map(function(e){if(!e.type)e.type='expense';return e})}catch(e){}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}

// ==================== MODE SWITCH ====================
let curMode="task";
function switchMode(m){
  curMode=m;
  document.getElementById("panel-task").classList.toggle("on",m==="task");
  document.getElementById("panel-expense").classList.toggle("on",m==="expense");
  document.getElementById("panel-journal").classList.toggle("on",m==="journal");
  document.getElementById("nav-task").classList.toggle("on",m==="task");
  document.getElementById("nav-expense").classList.toggle("on",m==="expense");
  document.getElementById("nav-journal").classList.toggle("on",m==="journal");
  var titles={task:"任务清单",expense:"消费记账",journal:"日常日记"};
  var icons={task:"✓",expense:"¥",journal:"📔"};
  document.getElementById("header-title").textContent=titles[m];
  var li=document.getElementById("logo-icon");li.textContent=icons[m];li.className="logo-icon "+m;
  document.getElementById("header-search-btn").style.display=m==="task"?"":"none";
  if(m==="task")renderTasks();else if(m==="expense")renderExpenses();else renderJournals();
}

// ==================== POMODORO ====================
let pomoId=null,pomoInt=null,pomoLeft=0,pomoBreak=false,circ=106.8;
function getW(){return(DB.workTime||25)*60}function getB(){return(DB.breakTime||5)*60}
function startPomo(id){
  var t=DB.tasks.find(function(x){return x.id===id});if(!t||t.done)return;
  if(pomoInt)stopPomo();pomoId=id;pomoBreak=false;pomoLeft=getW();
  document.getElementById("pomo-bar").classList.add("on");document.getElementById("pomo-task-label").textContent=t.text;
  updPomo();renderTasks();
  pomoInt=setInterval(function(){pomoLeft--;updPomo();if(pomoLeft<=0){if(!pomoBreak){DB.pomos++;save();pomoBreak=true;pomoLeft=getB();document.getElementById("pomo-task-label").textContent="☕ 休息";nfy("🍅 番茄完成！","休息一下吧");vib([200,100,200])}else{pomoBreak=false;pomoLeft=getW();document.getElementById("pomo-task-label").textContent=t.text}updPomo();renderTasks()}},1000);
  if("Notification"in window&&Notification.permission==="default")Notification.requestPermission()
}
function stopPomo(){if(pomoInt){clearInterval(pomoInt);pomoInt=null}pomoId=null;document.getElementById("pomo-bar").classList.remove("on");renderTasks()}
function skipPomo(){if(!pomoInt)return;pomoLeft=0;if(!pomoBreak){DB.pomos++;save();pomoBreak=true;pomoLeft=getB();document.getElementById("pomo-task-label").textContent="☕ 休息"}else{pomoBreak=false;pomoLeft=getW();var t=pomoId?DB.tasks.find(function(x){return x.id===pomoId}):null;document.getElementById("pomo-task-label").textContent=t?t.text:"专注中"}updPomo();renderTasks()}
function updPomo(){var t=pomoBreak?getB():getW();var m=Math.floor(pomoLeft/60),s=pomoLeft%60;document.getElementById("pomo-timer").textContent=m+":"+String(s).padStart(2,"0");document.getElementById("pomo-circle").style.strokeDashoffset=circ*(1-pomoLeft/t);document.getElementById("pomo-circle").style.stroke=pomoBreak?"#FBBF24":"url(#ring-grad)"}
function togglePomoSettings(){document.getElementById("pomo-settings").classList.toggle("show")}
function savePomoSettings(){var w=parseInt(document.getElementById("set-work").value)||25,b=parseInt(document.getElementById("set-break").value)||5;DB.workTime=Math.max(1,Math.min(120,w));DB.breakTime=Math.max(1,Math.min(60,b));save();document.getElementById("pomo-settings").classList.remove("show")}

// ==================== TASK LOGIC ====================
let tCat="work",tPrio="mid",tRep="";
let ce={work:"💼",study:"📚",life:"🏠",other:"📌"};
let pe={high:"🔴",mid:"🟡",low:"🟢"};
let re={"":"1×",daily:"🔄",weekly:"🔁",monthly:"🔂"};
let cn={work:"工作",study:"学习",life:"生活",other:"其他"};
let pn={high:"高",mid:"中",low:"低"};
function cycTCat(){var o=["work","study","life","other"],i=o.indexOf(tCat);tCat=o[(i+1)%4];document.getElementById("tc-cat").textContent=ce[tCat]}
function cycTPrio(){var o=["mid","high","low"],i=o.indexOf(tPrio);tPrio=o[(i+1)%3];document.getElementById("tc-prio").textContent=pe[tPrio]}
function cycTRep(){var o=["","daily","weekly","monthly"],i=o.indexOf(tRep);tRep=o[(i+1)%4];document.getElementById("tc-rep").textContent=re[tRep]}
function addTask(){
  var inp=document.getElementById("task-input"),txt=inp.value.trim();if(!txt)return;
  var due="",today=new Date().toISOString().split("T")[0];
  if(/今天/.test(txt)){due=today;txt=txt.replace(/今天/g,"").trim()}else if(/明天/.test(txt)){var t=new Date();t.setDate(t.getDate()+1);due=t.toISOString().split("T")[0];txt=txt.replace(/明天/g,"").trim()}else if(/后天/.test(txt)){var t=new Date();t.setDate(t.getDate()+2);due=t.toISOString().split("T")[0];txt=txt.replace(/后天/g,"").trim()}
  DB.tasks.push({id:uid(),text:txt||inp.value.trim(),category:tCat,priority:tPrio,repeat:tRep,due:due,done:false,subtasks:[],createdAt:new Date().toISOString()});
  save();inp.value="";tCat="work";tPrio="mid";tRep="";document.getElementById("tc-cat").textContent="💼";document.getElementById("tc-prio").textContent="🟡";document.getElementById("tc-rep").textContent="1×";renderTasks();vib(10)
}
function toggleTask(id){var t=DB.tasks.find(function(x){return x.id===id});if(t){t.done=!t.done;if(t.done&&t.repeat)handleRepeat(t);save();renderTasks();vib(t.done?20:10)}}
function handleRepeat(t){var n="";if(t.repeat==="daily"){var d=new Date();d.setDate(d.getDate()+1);n=d.toISOString().split("T")[0]}else if(t.repeat==="weekly"){var d=new Date();d.setDate(d.getDate()+7);n=d.toISOString().split("T")[0]}else if(t.repeat==="monthly"){var d=new Date();d.setMonth(d.getMonth()+1);n=d.toISOString().split("T")[0]}if(n)DB.tasks.push({id:uid(),text:t.text,category:t.category,priority:t.priority,repeat:t.repeat,due:n,done:false,subtasks:JSON.parse(JSON.stringify(t.subtasks)),createdAt:new Date().toISOString()})}
function toggleSub(id,si){var t=DB.tasks.find(function(x){return x.id===id});if(t&&t.subtasks[si]){t.subtasks[si].done=!t.subtasks[si].done;save();renderTasks()}}

// Task search/filter
let tSrch="",tSort="newest",tCatFil="all",tTab="all";
function toggleSearch(){var b=document.getElementById("search-box");b.classList.toggle("show");if(b.classList.contains("show"))document.getElementById("search-input").focus();else{tSrch="";document.getElementById("search-input").value="";renderTasks()}}
function clearSearch(){tSrch="";document.getElementById("search-input").value="";renderTasks()}

function filterTasks(){
  var today=new Date().toISOString().split("T")[0],tasks=DB.tasks.slice();
  if(tSrch){var q=tSrch.toLowerCase();tasks=tasks.filter(function(t){return t.text.toLowerCase().indexOf(q)!==-1})}
  if(tCatFil!=="all")tasks=tasks.filter(function(t){return t.category===tCatFil})
  if(tTab==="active")tasks=tasks.filter(function(t){return !t.done});else if(tTab==="done")tasks=tasks.filter(function(t){return t.done});else if(tTab==="today")tasks=tasks.filter(function(t){return t.due===today})
  var po={high:0,mid:1,low:2};
  if(tSort==="newest")tasks.sort(function(a,b){return b.createdAt.localeCompare(a.createdAt)});else if(tSort==="oldest")tasks.sort(function(a,b){return a.createdAt.localeCompare(b.createdAt)});else if(tSort==="priority")tasks.sort(function(a,b){if(a.priority!==b.priority)return po[a.priority]-po[b.priority];return b.createdAt.localeCompare(a.createdAt)});else if(tSort==="due")tasks.sort(function(a,b){if(!a.due&&!b.due)return b.createdAt.localeCompare(a.createdAt);if(!a.due)return 1;if(!b.due)return -1;return a.due.localeCompare(b.due)})
  return tasks
}

  else{list.innerHTML=tasks.map(function(t){var ov=t.due&&t.due<today&&!t.done,run=pomoId===t.id;
    var tags='<span class="tag tag-'+(t.category==="work"?"w":t.category==="study"?"s":t.category==="life"?"l":"o")+'">'+ce[t.category]+" "+cn[t.category]+'</span>'+'<span class="tag tag-'+(t.priority==="high"?"h":t.priority==="mid"?"m":"lo")+'">'+pe[t.priority]+" "+pn[t.priority]+'</span>';

  }).join("");setTimeout(attachSwipe,50)}

function attachSwipe(){document.querySelectorAll(".tcard").forEach(function(el){if(el.dataset.sb)return;el.dataset.sb="1";var sx=0,sy=0,ox=0,id=el.dataset.id;el.addEventListener("touchstart",function(e){sx=e.touches[0].clientX;sy=e.touches[0].clientY;ox=0;el.style.transition="none"},{passive:true});el.addEventListener("touchmove",function(e){var dx=e.touches[0].clientX-sx,dy=e.touches[0].clientY-sy;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>10)e.preventDefault();if(dx<0){ox=Math.max(dx,-80);el.style.transform="translateX("+ox+"px)"}},{passive:false});el.addEventListener("touchend",function(){el.style.transition="transform 0.25s cubic-bezier(.4,0,.2,1)";if(ox<-50){delTask(id);el.style.transform="translateX(0)"}else el.style.transform="translateX(0)"})})}
let lastDel=null,undoTm=null;
function delTask(id){var idx=-1;for(var i=0;i<DB.tasks.length;i++){if(DB.tasks[i].id===id){idx=i;break}}if(idx===-1)return;lastDel={t:1,data:DB.tasks[idx],idx:idx};DB.tasks.splice(idx,1);save();renderTasks();vib(30);showUndo("已删除: "+lastDel.data.text.slice(0,15))}
function delExpense(id){var idx=-1;for(var i=0;i<DB.expenses.length;i++){if(DB.expenses[i].id===id){idx=i;break}}if(idx===-1)return;lastDel={t:2,data:DB.expenses[idx],idx:idx};DB.expenses.splice(idx,1);save();renderExpenses();showUndo("已删除账单 ¥"+lastDel.data.amount.toFixed(2))}
function delJournal(id){var idx=-1;for(var i=0;i<DB.journals.length;i++){if(DB.journals[i].id===id){idx=i;break}}if(idx===-1)return;lastDel={t:3,data:DB.journals[idx],idx:idx};DB.journals.splice(idx,1);save();renderJournals();showUndo("已删除日记")}
function undoDelete(){if(!lastDel)return;if(lastDel.t===1)DB.tasks.splice(lastDel.idx,0,lastDel.data);else if(lastDel.t===2)DB.expenses.splice(lastDel.idx,0,lastDel.data);else if(lastDel.t===3)DB.journals.splice(lastDel.idx,0,lastDel.data);lastDel=null;save();if(curMode==="task")renderTasks();else if(curMode==="expense")renderExpenses();else renderJournals();document.getElementById("undo-toast").classList.remove("show")}

function renderExpenses(){

  var exps=DB.expenses.slice().sort(function(a,b){return b.date.localeCompare(a.date)||b.createdAt.localeCompare(a.createdAt)});

  var bd={};eCats.forEach(function(c){bd[c.k]=0});exps.forEach(function(e){if(e.type==="expense")bd[e.category]=(bd[e.category]||0)+e.amount});var mx=Math.max.apply(null,Object.values(bd))||1;
  document.getElementById("exp-bd").innerHTML=eCats.filter(function(c){return c.k!=="income"}).map(function(c){var v=bd[c.k]||0;return'<div class="cb"><div class="ci">'+c.i+'</div><div class="cn">'+c.n+'</div><div class="ct"><div class="cf" style="width:'+Math.round(v/mx*100)+'%;background:'+c.c+'"></div></div><div class="ca">¥'+v.toFixed(0)+'</div></div>'}).join("");

// ==================== JOURNAL LOGIC ====================
let pendingPhotos=[],jView="week";

function onPhotosSelected(){
  var files=document.getElementById("photo-input").files;if(!files.length)return;
  Array.from(files).forEach(function(f){compressPhoto(f,function(dataUrl){pendingPhotos.push(dataUrl);renderPhotoPreview()})});
  document.getElementById("photo-input").value=""
}

function compressPhoto(file,cb){
  var reader=new FileReader();reader.onload=function(e){
    var img=new Image();img.onload=function(){
      var maxW=800,scale=1;if(img.width>maxW)scale=maxW/img.width;
      var w=Math.round(img.width*scale),h=Math.round(img.height*scale);
      var c=document.createElement("canvas");c.width=w;c.height=h;var ctx=c.getContext("2d");ctx.drawImage(img,0,0,w,h);
      cb(c.toDataURL("image/jpeg",0.7))
    };img.src=e.target.result
  };reader.readAsDataURL(file)
}

function renderPhotoPreview(){
  var el=document.getElementById("photo-preview");el.innerHTML=pendingPhotos.map(function(p,i){return'<div class="pp" style="background-image:url('+p+')"><button class="rm" onclick="rmPhoto('+i+')">✕</button></div>'}).join("")
}
function rmPhoto(i){pendingPhotos.splice(i,1);renderPhotoPreview()}

function addJournal(){
  var txt=document.getElementById("journal-text").value.trim();if(!txt&&!pendingPhotos.length)return;
  DB.journals.push({id:uid(),text:txt,photos:pendingPhotos.slice(),createdAt:new Date().toISOString()});
  save();document.getElementById("journal-text").value="";pendingPhotos=[];renderPhotoPreview();renderJournals();vib(10)
}

function setJournalView(v){jView=v;document.getElementById("jb-week").classList.toggle("on",v==="week");document.getElementById("jb-all").classList.toggle("on",v==="all");renderJournals()}

function renderJournals(){
  if(curMode!=="journal")return;var entries=DB.journals.slice().sort(function(a,b){return b.createdAt.localeCompare(a.createdAt)});
  if(jView==="week"){var wk=new Date();wk.setDate(wk.getDate()-7);var wks=wk.toISOString();entries=entries.filter(function(e){return e.createdAt>=wks})}
  var list=document.getElementById("journal-list");
  if(!entries.length){list.innerHTML='<div class="empty"><div class="ei">📔</div><div class="em">还没有日记</div><div class="es">记录今天做了什么吧</div></div>'}
  else{list.innerHTML=entries.map(function(e){
    var d=new Date(e.createdAt),time=d.getHours()+":"+String(d.getMinutes()).padStart(2,"0");
    var dateStr=d.getFullYear()+"-"+(d.getMonth()+1)+"-"+d.getDate()+" "+["日","一","二","三","四","五","六"][d.getDay()];
    var ph='';if(e.photos&&e.photos.length){ph='<div class="jentry-photos">'+e.photos.map(function(p,i){var w=e.photos.length===1?160:80;return'<div class="jp" style="width:'+w+'px;background-image:url('+p+')" onclick="event.stopPropagation();openLightbox(\''+e.id+'\','+i+')"></div>'}).join("")+'</div>'}
    return'<div class="jentry"><div class="jentry-header"><span class="jentry-date">📅 '+dateStr+'</span><span class="jentry-time">'+time+'</span></div>'+(e.text?'<div class="jentry-text">'+esc(e.text)+'</div>':'')+ph+'<div class="jentry-footer"><button onclick="delJournal(\''+e.id+'\')">🗑 删除</button></div></div>'
  }).join("")}
  // Stats
  document.getElementById("js-total").textContent=DB.journals.length;
  var pc=0;DB.journals.forEach(function(e){pc+=(e.photos||[]).length});document.getElementById("js-photos").textContent=pc;
  document.getElementById("js-days").textContent=calcJournalStreak()
}

function calcJournalStreak(){var dates=DB.journals.map(function(e){return e.createdAt.split("T")[0]}).filter(function(v,i,a){return a.indexOf(v)===i}).sort().reverse();if(!dates.length)return 0;var s=0,today=new Date();for(var i=0;i<100;i++){var d=new Date(today);d.setDate(d.getDate()-i);var ds=d.toISOString().split("T")[0];if(dates.indexOf(ds)!==-1)s++;else if(i===0)continue;else break}return s}
