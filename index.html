<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>自律日常</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="自律日常">
<link rel="apple-touch-icon" href="./icons/apple-icon.png">
<meta name="theme-color" content="#1E2623">
<link rel="manifest" href="./manifest.json">
<style>
:root{--bg:#1E2623;--surface:#26302C;--surface2:#2E3834;--border:rgba(255,255,255,0.04);--shadow:0 1px 3px rgba(0,0,0,0.15);--text:#E2E6E4;--text2:#8A9690;--text3:#5A6660;--accent:#D4A853;--accent2:#C98B7A;--accent3:#7BA890;--accent4:#7BA0B8;--danger:#E05555;--success:#6BAF7A;--warn:#D4A040;--font:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;--radius:14px;--safe-b:env(safe-area-inset-bottom,10px);--safe-t:env(safe-area-inset-top,0px)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;user-select:none;-webkit-user-select:none;background:linear-gradient(180deg,#1A221F 0%,#1E2623 30%,#222B27 100%)}

header{padding:12px 18px;padding-top:calc(12px + var(--safe-t));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-size:1.15rem;font-weight:700;display:flex;align-items:center;gap:8px}
header h1 .dot{width:7px;height:7px;border-radius:50%}
header .time{font-size:0.9rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text2)}
.dot-task{background:var(--accent)}.dot-expense{background:var(--accent2)}.dot-word{background:var(--accent3)}.dot-track{background:var(--accent4)}.dot-dash{background:#8B6914}

.btn-base{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.btn-base:active{background:var(--surface2);transform:scale(0.92)}

.pomo-bar{margin:0 16px 6px;padding:10px 14px;border-radius:var(--radius);background:rgba(212,168,83,0.04);border:1px solid rgba(212,168,83,0.12);display:none;align-items:center;gap:10px;flex-shrink:0}
.pomo-bar.on{display:flex}
.pomo-timer{font-size:1.4rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent)}
.pomo-label{font-size:0.62rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.pomo-bar .btn-stop{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(209,67,67,0.2);background:transparent;color:var(--danger);cursor:pointer;font-size:0.65rem;margin-left:auto;flex-shrink:0}

.nav-bar{display:flex;flex-shrink:0;border-top:1px solid var(--border);background:var(--bg);padding-bottom:calc(var(--safe-b) + 4px)}
.nav-bar button{flex:1;min-width:0;padding:6px 2px 2px;border:none;background:transparent;color:var(--text3);font-family:var(--font);font-size:0.62rem;cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;align-items:center}
.nav-bar button .ni{font-size:1.1rem}
.nav-bar button.on{color:var(--accent);font-weight:600}.nav-bar button.on.n2{color:var(--accent2)}.nav-bar button.on.n3{color:var(--accent3)}.nav-bar button.on.n4{color:var(--accent4)}.nav-bar button.on.n0{color:#8B6914}

.panel{display:none;flex-direction:column;flex:1;overflow:hidden}
.panel.on{display:flex}
.scroll{flex:1;overflow-y:auto;padding:0 16px 6px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.empty{padding:50px 20px;text-align:center;color:var(--text3);font-size:0.82rem}
.empty .ei{font-size:2.2rem;margin-bottom:8px;opacity:0.4}

.tabs{display:flex;padding:0 16px 5px;gap:3px;flex-shrink:0}
.tabs button{padding:5px 12px;border-radius:20px;border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:0.72rem;cursor:pointer;transition:all 0.15s}
.tabs button.on{background:var(--surface2);color:var(--text);font-weight:600}

.inline-add{display:flex;gap:5px;padding:0 16px 8px;flex-shrink:0;align-items:center}
.inline-add input{padding:9px 10px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:0.82rem;outline:none;flex:1}
.inline-add .add-btn{width:40px;height:40px;border-radius:var(--radius);border:none;color:#fff;font-size:1.05rem;cursor:pointer;flex-shrink:0;transition:all 0.12s}
.inline-add .add-btn:active{transform:scale(0.9)}

.bot-bar{padding:5px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:5px}
.bot-bar button{flex:1;padding:6px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:var(--font);font-size:0.65rem;cursor:pointer;transition:all 0.12s}
.bot-bar button:active{background:var(--surface2)}
.bot-bar button.on{color:var(--accent);border-color:rgba(212,168,83,0.3);font-weight:600}

.list-item{display:flex;align-items:center;gap:7px;padding:9px 10px;background:var(--surface);border-radius:var(--radius);margin-bottom:3px;border:1px solid var(--border);box-shadow:var(--shadow)}
.list-item .li-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0}
.list-item .li-info{flex:1;min-width:0}.list-item .li-name{font-size:0.76rem;font-weight:500}.list-item .li-date{font-size:0.58rem;color:var(--text3)}
.list-item .li-val{font-weight:700;font-size:0.82rem;flex-shrink:0}.list-item .li-del{font-size:0.58rem;color:var(--text3);cursor:pointer;padding:3px;opacity:0;transition:all 0.12s}.list-item:active .li-del{opacity:1}
.date-head{font-size:0.62rem;color:var(--text3);padding:5px 0 3px;font-weight:600}

.dash-summary{display:flex;gap:5px;padding:6px 16px;flex-shrink:0}
.dash-row{display:flex;gap:5px;padding:0 16px 6px;flex-shrink:0}
.ds-card{flex:1;background:var(--surface);border-radius:var(--radius);padding:12px 8px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:all 0.12s}
.ds-card:active{background:var(--surface2)}.ds-card .dv{font-size:1.3rem;font-weight:800}.ds-card .dl{font-size:0.58rem;color:var(--text2);margin-top:2px}
.ds-card .df{font-size:0.65rem;color:var(--text3);margin-top:1px}
.budget-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px}.budget-bar .bf{height:100%;border-radius:3px;transition:width 0.4s}
.overbudget .dv{color:var(--danger)!important}

.task-add{display:flex;gap:5px;padding:0 16px 8px;flex-shrink:0}
.task-add input{flex:1;padding:9px 12px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:0.82rem;outline:none}
.task-add input:focus{border-color:var(--accent)}
.task-add .prio{width:34px;height:41px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.85rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.task-add .rep{width:34px;height:41px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.65rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s;font-family:var(--font)}
.task-add .add-btn{width:42px;height:41px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:1.1rem;cursor:pointer;flex-shrink:0;transition:all 0.12s}
.task-add .add-btn:active,.task-add .prio:active,.task-add .rep:active{transform:scale(0.9)}

.tcard-wrap{margin-bottom:5px}
.tcard{display:flex;flex-direction:column;padding:10px 12px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}.tcard.done{opacity:0.4}
.tcard .main-row{display:flex;align-items:center;gap:7px}
.tcheck{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s cubic-bezier(.4,0,.2,1)}
.tcheck.done{background:var(--success);border-color:var(--success);animation:pop 0.3s cubic-bezier(.4,0,.2,1)}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.tcheck.done::after{content:"✓";color:#fff;font-size:0.55rem;font-weight:700}
.ttxt{flex:1;font-size:0.82rem;line-height:1.4;word-break:break-word;cursor:pointer}.tcard.done .ttxt{text-decoration:line-through;color:var(--text3)}
.tprio{width:5px;height:5px;border-radius:50%;flex-shrink:0}.tprio-1{background:var(--success)}.tprio-2{background:var(--warn)}.tprio-3{background:var(--danger)}
.tdue{font-size:0.62rem;color:var(--text3);flex-shrink:0}.tdue.ov{color:var(--danger)}
.tag-re{font-size:0.58rem;padding:1px 5px;border-radius:8px;background:rgba(123,160,184,0.1);color:var(--accent4);flex-shrink:0}
.tpomo{width:24px;height:24px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:0.65rem;flex-shrink:0;color:var(--accent);transition:all 0.12s;display:flex;align-items:center;justify-content:center}
.tpomo.on{color:var(--success);background:rgba(107,175,122,0.08)}
.tdel{width:24px;height:24px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:0.65rem;flex-shrink:0;color:var(--text3);transition:all 0.12s}.tdel:active{color:var(--danger);transform:scale(0.85)}
.chkl{margin-top:3px;padding-left:25px}.chkl .ci{display:flex;align-items:center;gap:5px;padding:2px 0;font-size:0.73rem;color:var(--text2);cursor:pointer}
.chkl .ci .cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--text3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.chkl .ci .cb.done{background:var(--success);border-color:var(--success)}.chkl .ci .cb.done::after{content:"✓";color:#fff;font-size:0.4rem;font-weight:700}
.chkl .ci.done .ct{text-decoration:line-through;color:var(--text3)}.chkl .progress{font-size:0.58rem;color:var(--text3);margin-bottom:2px}

.exp-sum{display:flex;gap:5px;padding:0 16px 6px;flex-shrink:0}
.exp-c{flex:1;background:var(--surface);border-radius:var(--radius);padding:10px;border:1px solid var(--border);text-align:center;box-shadow:var(--shadow)}
.exp-c .ev{font-size:1.2rem;font-weight:800}.exp-c .el{font-size:0.58rem;color:var(--text2);margin-top:1px}
.exp-c.in .ev{color:var(--success)}.exp-c.out .ev{color:var(--danger)}.exp-c.net .ev{color:var(--accent)}
.eia.in{color:var(--success)}.eia.out{color:var(--danger)}
.exp-mn{display:flex;align-items:center;justify-content:center;gap:6px;padding:0 16px 4px;flex-shrink:0}
.exp-mn button{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:0.7rem;transition:all 0.12s}
.exp-mn .ml{font-size:0.76rem;font-weight:700}
.exp-add .amt{width:70px;padding:9px 5px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:0.95rem;font-weight:700;outline:none;text-align:center}
.exp-add .ecat{padding:7px 9px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.7rem;white-space:nowrap;font-family:var(--font);color:var(--text);flex-shrink:0;transition:all 0.12s}
.budget-settings{padding:0 16px 6px;flex-shrink:0;display:flex;gap:6px;align-items:center;font-size:0.65rem;color:var(--text2)}
.budget-settings input{width:90px;padding:5px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:0.7rem;outline:none;text-align:right}
.budget-settings button{padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.65rem;color:var(--text2);font-family:var(--font)}
.budget-warn{font-size:0.6rem;padding:0 16px 4px;flex-shrink:0;display:none}.budget-warn.show{display:block;color:var(--danger);animation:gl 1s infinite}@keyframes gl{0%,100%{opacity:1}50%{opacity:0.5}}

.word-stats{display:flex;gap:5px;padding:4px 16px 6px;flex-shrink:0}
.word-card{flex:1;background:var(--surface);border-radius:var(--radius);padding:10px 6px;border:1px solid var(--border);text-align:center;box-shadow:var(--shadow)}
.word-card .wv{font-size:1.25rem;font-weight:800;color:var(--accent3)}.word-card .wl{font-size:0.58rem;color:var(--text2);margin-top:1px}
.word-add .wnum{width:70px;text-align:center;font-weight:700}.word-add .wrev{width:60px;text-align:center;font-size:0.72rem}
.wchart-wrap{padding:4px 16px 6px;flex-shrink:0}
.wchart-wrap canvas{width:100%;height:80px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border)}

.track-main{display:flex;flex-direction:column;align-items:center;padding:12px 16px 6px;flex-shrink:0}
.track-emoji{font-size:2.5rem;transition:all 0.3s}.track-emoji.running{animation:bounce 0.5s infinite alternate}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.1)}}
.track-clock{font-size:2.6rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:2px;color:var(--accent)}
.track-range{font-size:0.7rem;color:var(--text3);margin:2px 0 6px;font-variant-numeric:tabular-nums}
.track-label{font-size:0.8rem;color:var(--text2);margin-bottom:8px}.track-label .act-name{color:var(--text);font-weight:600}
.track-ctrl{display:flex;gap:12px;margin-bottom:8px}
.track-ctrl button{width:52px;height:52px;border-radius:50%;border:none;font-size:1.3rem;cursor:pointer;transition:all 0.12s;font-family:var(--font)}
.track-ctrl .btn-play{background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(212,168,83,0.25)}
.track-ctrl .btn-pause{background:var(--warn);color:#fff}
.track-ctrl .btn-stop{background:var(--danger);color:#fff;font-size:0.9rem}
.track-ctrl button:active{transform:scale(0.88)}
.track-picker{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:6px}
.track-picker button{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font);font-size:0.7rem;cursor:pointer;transition:all 0.12s;white-space:nowrap;position:relative}
.track-picker button:active{background:var(--surface2)}
.track-picker button.on{border-color:var(--accent);color:var(--accent);background:rgba(212,168,83,0.06);font-weight:600}
.track-picker .add-act{padding:5px 10px;border-radius:20px;border:1px dashed var(--border);color:var(--text3);font-size:0.68rem;cursor:pointer}
.track-stats{display:flex;gap:5px;padding:0 16px 6px;flex-shrink:0}
.track-stats .ts{flex:1;background:var(--surface);border-radius:var(--radius);padding:9px 6px;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow)}
.track-stats .ts .tv{font-size:1.15rem;font-weight:800;color:var(--accent)}.track-stats .ts .tl{font-size:0.58rem;color:var(--text2);margin-top:1px}
.track-records{padding:2px 16px 4px;flex-shrink:0;font-size:0.68rem;color:var(--text2);font-weight:600}

.remind-toast{position:fixed;top:calc(var(--safe-t) + 50px);left:50%;transform:translateX(-50%);z-index:300;background:var(--accent);color:#fff;padding:14px 20px;border-radius:var(--radius);font-size:0.8rem;display:none;white-space:nowrap;box-shadow:0 8px 30px rgba(212,168,83,0.3);animation:ti 0.3s ease-out;font-weight:600}
@keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.remind-toast.show{display:block}

.undo{position:fixed;bottom:calc(var(--safe-b) + 80px);left:50%;transform:translateX(-50%);z-index:300;background:var(--surface);border:1px solid var(--border);padding:7px 13px;border-radius:20px;font-size:0.74rem;display:none;gap:7px;align-items:center;box-shadow:0 8px 30px rgba(0,0,0,0.08)}
.undo.on{display:flex}.undo button{background:var(--accent);color:#fff;border:none;padding:3px 9px;border-radius:12px;font-family:var(--font);font-size:0.68rem;cursor:pointer;font-weight:600}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.2);z-index:200;justify-content:center;align-items:flex-end;backdrop-filter:blur(6px)}.overlay.on{display:flex}
.sheet{width:100%;max-width:500px;background:var(--surface);border-radius:20px 20px 0 0;padding:6px 18px 16px;padding-bottom:calc(16px + var(--safe-b));animation:slU 0.3s cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto}
@keyframes slU{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet h3{font-size:0.9rem;margin-bottom:10px}
.sheet .row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.sheet .row label{width:44px;font-size:0.68rem;color:var(--text2)}
.sheet input,.sheet select{flex:1;padding:8px 10px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:0.8rem;outline:none}
.sheet .btns{display:flex;gap:7px;margin-top:12px}
.sheet .btns .save{flex:2;padding:10px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:var(--font)}
.sheet .btns .cancel{flex:1;padding:10px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:0.82rem;cursor:pointer;font-family:var(--font)}
.sheet .srow{display:flex;gap:4px;margin-bottom:4px;align-items:center}
.sheet .srow input{flex:1;padding:6px 7px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:0.73rem;outline:none}
.sheet .srow .rs{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--danger);cursor:pointer;font-size:0.58rem}
.sheet .adc{font-size:0.66rem;color:var(--accent);cursor:pointer;display:inline-block;font-weight:500;margin-bottom:6px}
</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0"><defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#D4A853"/><stop offset="100%" stop-color="#C98B7A"/></linearGradient></defs></svg>

<header>
  <h1><span class="dot dot-dash" id="logo-dot"></span><span id="logo-text">今日摘要</span></h1>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="btn-base" id="pomo-btn" onclick="tap();togglePomo()" title="番茄钟" style="display:none">🍅</button>
    <div class="time" id="live-time">00:00</div>
  </div>
</header>

<div class="pomo-bar" id="pomo-bar">
  <div class="pomo-timer" id="pomo-timer">25:00</div>
  <div class="pomo-label" id="pomo-label">专注中</div>
  <button class="btn-stop" onclick="tap();stopPomo()">✕</button>
</div>
<div class="remind-toast" id="remind-toast"></div>

<!-- DASHBOARD -->
<div class="panel on" id="p-dash">
  <div class="dash-summary" style="padding-top:8px">
    <div class="ds-card" onclick="switchMode('task')"><div class="dv" id="d-tasks" style="color:var(--accent)">0</div><div class="dl">待办任务</div><div class="df" id="d-tasks-sub"></div></div>
    <div class="ds-card" onclick="switchMode('expense')"><div class="dv" id="d-spend" style="color:var(--danger)">0</div><div class="dl">今日支出</div><div class="df" id="d-spend-sub"></div></div>
  </div>
  <div class="dash-row">
    <div class="ds-card" onclick="switchMode('word')"><div class="dv" id="d-words" style="color:var(--accent3)">0</div><div class="dl">今日新词</div></div>
    <div class="ds-card" onclick="switchMode('track')"><div class="dv" id="d-time" style="color:var(--accent4)">0m</div><div class="dl">今日安排</div></div>
    <div class="ds-card" onclick="switchMode('track')"><div class="dv" id="d-pomo" style="color:#F472B6">0</div><div class="dl">番茄</div></div>

<script>
// ============================================================
// UTILITIES
// ============================================================
var $ = function(id){ return document.getElementById(id); };
var N = function(){ return new Date(); };
var TD = function(){ return N().toISOString().split('T')[0]; };
var UID = function(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); };
var HMS = function(s){ s=s||0; var h=Math.floor(s/3600), m=Math.floor((s%3600)/60); return h>0 ? h+'h'+m+'m' : m>0 ? m+'m' : '<1m'; };
var HM = function(x){ return x.getHours().toString().padStart(2,'0')+':'+x.getMinutes().toString().padStart(2,'0'); };
var QS = function(s){ var d={'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}; return s.replace(/[&<>"']/g,function(c){return d[c];}); };
var QSA = function(s){ return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); };

// Audio
var _acA = null;
function beep(){
  try{
    if(!_acA) _acA = new (window.AudioContext||window.webkitAudioContext)();
    var o=_acA.createOscillator(), g=_acA.createGain();
    o.connect(g); g.connect(_acA.destination);
    o.frequency.value=1200; o.type='sine';
    g.gain.setValueAtTime(0.12, _acA.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, _acA.currentTime+0.07);
    o.start(_acA.currentTime); o.stop(_acA.currentTime+0.07);
  }catch(e){}
}
function loudBeep(){
  try{
    if(!_acA) _acA = new (window.AudioContext||window.webkitAudioContext)();
    for(var i=0;i<3;i++){
      var o=_acA.createOscillator(), g=_acA.createGain();
      o.connect(g); g.connect(_acA.destination);
      o.frequency.value=800+i*300; o.type='square';
      g.gain.setValueAtTime(0.25, _acA.currentTime+i*0.1);
      g.gain.exponentialRampToValueAtTime(0.001, _acA.currentTime+i*0.1+0.1);
      o.start(_acA.currentTime+i*0.1); o.stop(_acA.currentTime+i*0.1+0.1);
    }
  }catch(e){}
}
function vib(p){ if(navigator.vibrate) navigator.vibrate(p); }
function tap(){ vib(6); beep(); }
function nfy(t,b){
  if('Notification' in window && Notification.permission === 'granted')
    new Notification(t,{body:b,icon:'./icons/icon-192.png',tag:'daily'});
}

// ============================================================
// DATA
// ============================================================
var KEY = 'daily-v4';
var DB = {tasks:[],expenses:[],wordRecords:[],timeRecords:[],
  activities:['📚 读书','💻 学习','🏃 运动','🎧 练琴','✍️ 写作'],
  pomos:0, workTime:25, monthBudget:0};

function load(){
  try{
    var d = JSON.parse(localStorage.getItem(KEY));
    if(!d) return;
    DB = d;
    DB.wordRecords = DB.wordRecords || [];
    DB.expenses = DB.expenses || [];
    DB.timeRecords = DB.timeRecords || [];
    DB.activities = DB.activities || ['📚 读书','💻 学习','🏃 运动','🎧 练琴','✍️ 写作'];
    DB.monthBudget = DB.monthBudget || 0;
    DB.expenses = DB.expenses.map(function(e){ e.type = e.type || 'expense'; return e; });
  }catch(e){}
}
function save(){
  localStorage.setItem(KEY, JSON.stringify(DB));
  // IndexedDB backup
  try{
    var req = indexedDB.open('daily-backup',1);
    req.onupgradeneeded = function(){ req.result.createObjectStore('data'); };
    req.onsuccess = function(){
      var tx = req.result.transaction('data','readwrite');
      tx.objectStore('data').put(DB,'main');
      req.result.close();
    };
  }catch(e){}
}
function findById(arr, id){ return arr.find(function(x){return x.id===id;}); }
function findIdx(arr, id){ return arr.findIndex(function(x){return x.id===id;}); }

function restoreBackup(){
  if(DB.tasks.length || DB.expenses.length) return;
  try{
    var req = indexedDB.open('daily-backup',1);
    req.onupgradeneeded = function(){ req.result.createObjectStore('data'); };
    req.onsuccess = function(){
      var tx = req.result.transaction('data','readonly');
      var d = tx.objectStore('data').get('main');
      d.onsuccess = function(){
        if(d.result){
          for(var k in d.result){ if(d.result.hasOwnProperty(k)) DB[k]=d.result[k]; }
          save();
        }
      };
      req.result.close();
    };
  }catch(e){}
}

// ============================================================
// RENDER HELPERS
// ============================================================
function renderDateGrouped(recs, renderItem, isExpense, totalFn){
  if(!recs.length) return '<div class="empty"><div class="ei">📋</div>暂无记录</div>';
  var groups = {};
  recs.forEach(function(r){
    var d = r.date;
    if(!groups[d]) groups[d] = [];
    groups[d].push(r);
  });
  return Object.keys(groups).sort().reverse().map(function(dt){
    var items = groups[dt];
    var dTotal = items.reduce(totalFn || function(s,r){
      if(typeof r.amount !== 'undefined'){
        return s + (r.type==='income' ? r.amount : -r.amount);
      }
      return s + (r.seconds || 0);
    }, 0);
    var sign = dTotal >= 0 ? '+' : '';
    var sc = dTotal >= 0 ? 'var(--success)' : 'var(--danger)';
    return '<div><div class="date-head">📅 '+dt+' <span style="color:'+(isExpense?sc:'var(--accent)')+'">'+
      (isExpense ? sign+dTotal.toFixed(2) : HMS(Math.abs(dTotal)))+
      '</span></div>'+items.map(renderItem).join('')+'</div>';
  }).join('');
}

// ============================================================
// MODE SWITCH
// ============================================================
var curM = 'dash';
var PANELS = ['dash','task','expense','word','track'];
var MI = {
  dash: ['今日摘要','dot-dash'],
  task: ['任务','dot-task'],
  expense: ['记账','dot-expense'],
  word: ['单词','dot-word'],
  track: ['安排','dot-track']
};

function switchMode(m){
  tap();
  curM = m;
  var mi = MI[m];
  PANELS.forEach(function(k){
    $('p-'+k).classList.toggle('on', k===m);
    var nb = $('nav-'+k);
    if(nb) nb.classList.toggle('on', k===m);
  });
  $('logo-text').textContent = mi[0];
  $('logo-dot').className = 'dot '+mi[1];
  $('pomo-btn').style.display = (m==='task' ? '' : 'none');

  var renders = {
    dash: S.dash.render,
    task: S.task.render,
    expense: S.expense.render,
    word: S.word.render,
    track: tk.render
  };
  renders[m]();
}

// ============================================================
// POMODORO
// ============================================================
var po = {id:null, timer:null, startMs:0, totalMs:0, isBreak:false};
function togglePomo(){
  var w = prompt('番茄钟时长（分钟）','25');
  if(w){ DB.workTime = parseInt(w)||25; save(); }
}
function startPomo(id){
  tap();
  var t = findById(DB.tasks, id);
  if(!t || t.done) return;
  if(po.timer) stopPomo();
  po.id = id;
  po.isBreak = false;
  po.totalMs = (DB.workTime||25)*60*1000;
  po.startMs = Date.now();
  $('pomo-bar').classList.add('on');
  $('pomo-label').textContent = t.text;
  poTick();
  S.task.render();
  po.timer = setInterval(poTick, 500);
  if('Notification' in window && Notification.permission === 'default')
    Notification.requestPermission();
}
function poTick(){
  var elapsed = Date.now() - po.startMs;
  var left = Math.max(0, Math.ceil((po.totalMs-elapsed)/1000));
  if(elapsed >= po.totalMs){
    if(!po.isBreak){
      DB.pomos++; save();
      po.isBreak = true;
      po.totalMs = 5*60*1000;
      po.startMs = Date.now();
      $('pomo-label').textContent = '休息';
      nfy('番茄完成!','休息 5 分钟');
      vib([200,100,200]);
      loudBeep();
    } else {
      stopPomo();
      return;
    }
  }
  $('pomo-timer').textContent = String(Math.floor(left/60)).padStart(2,'0')+':'+String(left%60).padStart(2,'0');
}
function stopPomo(){
  tap();
  if(po.timer){ clearInterval(po.timer); po.timer=null; }
  po.id=null;
  $('pomo-bar').classList.remove('on');
  S.task.render();
}

// ============================================================
// MODULES
// ============================================================
var S = {};

// -- DASHBOARD --
S.dash = {};
S.dash.render = function(){
  if(curM !== 'dash') return;
  var today = TD();
  var at = DB.tasks.filter(function(t){return !t.done;});
  var ad = at.filter(function(t){return t.due===today||!t.due;}).length;
  var et = DB.expenses.filter(function(e){return e.date===today;});
  var es = et.filter(function(e){return e.type!=='income';}).reduce(function(s,e){return s+e.amount;},0);
  var wt = DB.wordRecords.filter(function(r){return r.date===today;});
  var wn = wt.reduce(function(s,r){return s+(r.newWords||0);},0);
  var tt = DB.timeRecords.filter(function(r){return r.date===today;});
  var ts = tt.reduce(function(s,r){return s+r.seconds;},0);

  $('d-tasks').textContent = at.length;
  $('d-tasks-sub').textContent = '今日到期 '+ad+' 个';
  $('d-spend').textContent = '¥'+es.toFixed(2);
  $('d-spend-sub').textContent = et.filter(function(e){return e.type==='income';}).length ? '含收入笔数' : '无收入';
  $('d-words').textContent = wn;
  $('d-time').textContent = HMS(ts);
  $('d-pomo').textContent = DB.pomos||0;

  if(DB.monthBudget > 0){
    $('d-budget-row').style.display = '';
    var ym = N().toISOString().slice(0,7);
    var mSp = DB.expenses.filter(function(e){
      return e.type!=='income' && e.date.slice(0,7)===ym;
    }).reduce(function(s,e){return s+e.amount;},0);
    var pct = Math.min(100, Math.round(mSp/DB.monthBudget*100));
    $('d-budget-val').textContent = '¥'+mSp.toFixed(0);
    $('d-budget-bar').style.width = pct+'%';
    $('d-budget-label').textContent = '预算 ¥'+DB.monthBudget+' / '+
      (mSp>DB.monthBudget ? '超支 ¥'+(mSp-DB.monthBudget).toFixed(0) : '剩余 ¥'+(DB.monthBudget-mSp).toFixed(0));
    if(mSp > DB.monthBudget) $('d-budget-card').classList.add('overbudget');
    else $('d-budget-card').classList.remove('overbudget');
  } else {
    $('d-budget-row').style.display = 'none';
  }
};

// -- TASK --
S.task = {prio:'low', rep:'', tab:'active'};
S.task.PE = {high:'🔴', mid:'🟡', low:'🟢'};
S.task.PN = {high:3, mid:2, low:1};
S.task.RE = {'':'1x', daily:'d', weekly:'w', monthly:'m'};

S.task.cyclePrio = function(){
  var o=['low','mid','high'];
  S.task.prio = o[(o.indexOf(S.task.prio)+1)%3];
  $('prio-btn').textContent = S.task.PE[S.task.prio];
};
S.task.cycleRepeat = function(){
  var o=['','daily','weekly','monthly'];
  var i = (o.indexOf(S.task.rep)+1)%4;
  S.task.rep = o[i];
  $('rep-btn').textContent = S.task.RE[o[i]];
};
S.task.setTab = function(t){
  S.task.tab = t;
  $('tab-active').classList.toggle('on', t==='active');
  $('tab-done').classList.toggle('on', t==='done');
  S.task.render();
};
S.task.add = function(){
  var txt = $('task-input').value.trim();
  if(!txt) return;
  var due = '', today = TD();
  if(/今天/.test(txt)){ due=today; txt=txt.replace(/今天/g,'').trim(); }
  else if(/明天/.test(txt)){ var d=N(); d.setDate(d.getDate()+1); due=d.toISOString().split('T')[0]; txt=txt.replace(/明天/g,'').trim(); }
  DB.tasks.push({
    id:UID(), text:txt, priority:S.task.prio, repeat:S.task.rep,
    due:due, done:false, checklist:[], createdAt:N().toISOString()
  });
  save();
  $('task-input').value='';
  S.task.prio='low';
  S.task.rep='';
  $('prio-btn').textContent='🟢';
  $('rep-btn').textContent='1x';
  S.task.render();
  if(curM!=='task') S.dash.render();
};
S.task.toggle = function(id){
  var t = findById(DB.tasks,id);
  if(!t) return;
  t.done = !t.done;
  if(t.done && t.repeat) S.task._handleRepeat(t);
  save();
  S.task.render();
  tap();
};
S.task._handleRepeat = function(t){
  var next = '';
  if(t.repeat==='daily'){
    var d=N(); d.setDate(d.getDate()+1); next=d.toISOString().split('T')[0];
  } else if(t.repeat==='weekly'){
    var d=N(); d.setDate(d.getDate()+7); next=d.toISOString().split('T')[0];
  } else if(t.repeat==='monthly'){
    var d=N(); d.setMonth(d.getMonth()+1); next=d.toISOString().split('T')[0];
  }
  if(next){
    DB.tasks.push({
      id:UID(), text:t.text, priority:t.priority, repeat:t.repeat,
      due:next, done:false,
      checklist:t.checklist.map(function(c){return {text:c.text, done:false};}),
      createdAt:N().toISOString()
    });
    save();
  }
};
S.task.toggleChk = function(tid, i){
  tap();
  var t = findById(DB.tasks, tid);
  if(t && t.checklist[i]){ t.checklist[i].done = !t.checklist[i].done; save(); S.task.render(); }
};
S.task.del = function(id){
  tap();
  var i = findIdx(DB.tasks, id);
  if(i===-1) return;
  S.undo.set('task', DB.tasks[i], i);
  DB.tasks.splice(i,1);
  save();
  S.task.render();
  S.undo.show('已删除');
};
S.task.clearDone = function(){
  tap();
  var dd = DB.tasks.filter(function(t){return t.done;});
  if(!dd.length) return;
  S.undo.set('batch', dd, -1);
  DB.tasks = DB.tasks.filter(function(t){return !t.done;});
  save();
  S.task.render();
  S.undo.show('已清除 '+dd.length+' 个');
};
S.task.render = function(){
  if(curM!=='task') return;
  var today = TD();
  var tasks = DB.tasks.slice().sort(function(a,b){return b.createdAt.localeCompare(a.createdAt);});

        }).join('')+'</div>';

      '<div class="tcheck'+(t.done?' done':'')+'" onclick="S.task.toggle(\''+t.id+'\')"></div>'+

      (t.done?'':'<button class="tpomo'+(run?' on':'')+'" onclick="event.stopPropagation();tap();startPomo(\''+t.id+'\')">🍅</button>')+
      '<button class="tdel" onclick="event.stopPropagation();tap();S.task.del(\''+t.id+'\')">✕</button>'+

S.word.calcStreak = function(){
  var dates = [];
  DB.wordRecords.forEach(function(r){ if(dates.indexOf(r.date)===-1) dates.push(r.date); });
  dates.sort().reverse();
  if(!dates.length) return 0;
  var s=0;
  for(var i=0;i<100;i++){
    var d = N();
    d.setDate(d.getDate()-i);
    var ds = d.toISOString().split('T')[0];
    if(dates.indexOf(ds)!==-1) s++;
    else if(i===0) continue;
    else break;
  }
  return s;
};
S.word.render = function(){
  if(curM!=='word') return;
  var today = TD();
  var recs = DB.wordRecords.slice().sort(function(a,b){return b.date.localeCompare(a.date);});
  if(S.word.view==='week'){
    var w = N(); w.setDate(w.getDate()-7);
    recs = recs.filter(function(r){return r.date>=w.toISOString().split('T')[0];});
  }
  var tdR = recs.filter(function(r){return r.date===today;});
  $('ws-today').textContent = tdR.reduce(function(s,r){return s+(r.newWords||0);},0);
  $('ws-review').textContent = tdR.reduce(function(s,r){return s+(r.reviewWords||0);},0);
  $('ws-total').textContent = DB.wordRecords.reduce(function(s,r){return s+(r.newWords||0);},0);
  $('ws-streak').textContent = S.word.calcStreak();
  S.word._drawChart(recs);
  var el = $('word-list');
  if(!recs.length){ el.innerHTML='<div class="empty"><div class="ei">📖</div>暂无记录</div>'; return; }
  el.innerHTML = renderDateGrouped(recs, function(r){
    return '<div class="list-item"><div class="li-icon" style="background:rgba(123,168,144,0.1)">📖</div>'+
      '<div class="li-info"><div class="li-name">'+(r.note?QS(r.note):'单词记录')+'</div><div class="li-date">'+r.date+'</div></div>'+
      '<div class="li-val" style="color:var(--accent3)">+'+r.newWords+' | 复'+r.reviewWords+'</div>'+
      '<span class="li-del" onclick="event.stopPropagation();S.word.del(\''+r.id+'\')">✕</span></div>';
  }, false, function(s,r){return s+(r.newWords||0);});
};
S.word._drawChart = function(recs){
  var c = $('wchart');
  if(!c || curM!=='word') return;
  var w = c.width = c.offsetWidth*2;
  var h = c.height = c.offsetHeight*2;
  var ctx = c.getContext('2d');
  ctx.clearRect(0,0,w,h);
  if(!recs.length) return;
  var days=[];
  for(var i=6;i>=0;i--){
    var d=N(); d.setDate(d.getDate()-i);
    var ds=d.toISOString().split('T')[0];
    var v=recs.filter(function(r){return r.date===ds;}).reduce(function(s,r){return s+(r.newWords||0);},0);
    days.push({label:(d.getMonth()+1)+'/'+d.getDate(), val:v});
  }
  var mx=Math.max.apply(null,days.map(function(d){return d.val;}))||1;
  var bw=(w-60)/days.length-8, px=40;
  days.forEach(function(d,i){
    var x=px+i*(bw+8), bh=Math.max(4,(d.val/mx)*(h-60));
    ctx.fillStyle='rgba(123,168,144,0.6)'; ctx.fillRect(x,h-40-bh,bw,bh);
    ctx.fillStyle='#8C8882'; ctx.font='14px sans-serif'; ctx.textAlign='center'; ctx.fillText(d.label,x+bw/2,h-10);
    if(d.val>0){ ctx.fillStyle='#2D2926'; ctx.font='12px sans-serif'; ctx.fillText(d.val,x+bw/2,h-44-bh); }
  });
};

var tk = {actIdx:0,running:false,paused:false,startT:null,stored:0,timer:null,view:'today',remT:null,remS:0};
tk.pickAct = function(i){
  tk.actIdx = i;
  document.querySelectorAll('#track-picker button.on').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('#track-picker button')[i].classList.add('on');
  tk._updLbl();
  if(!tk.running) tk.render();
};
tk._updLbl = function(){
  var a = (DB.activities||[])[tk.actIdx] || '📌 自定义';
  $('track-emoji').textContent = a.slice(0,2);
  $('track-act-name').textContent = a.slice(2).trim()||a;
  $('track-emoji').className = 'track-emoji'+(tk.running?' running':'');
};
tk._elapsed = function(){
  return tk.paused ? tk.stored : Math.floor((Date.now()-tk.startT)/1000);
};
tk._updClock = function(){
  var s = tk._elapsed();
  $('track-clock').textContent = String(Math.floor(s/3600)).padStart(2,'0')+':'+
    String(Math.floor((s%3600)/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
};
tk._updRange = function(){
  if(!tk.running && !tk.paused){ $('track-range').textContent='--:-- 至 --:--'; return; }
  var st = tk.running ? tk.startT : Date.now()-tk.stored*1000;
  var sD = new Date(st);
  var eD = tk.running ? N() : new Date(sD.getTime()+tk.stored*1000);
  $('track-range').textContent = HM(sD)+' 至 '+HM(eD);
};
tk._startReminder = function(){
  tk.remS = Date.now();
  tk.remT = setInterval(function(){
    if(tk.running && Date.now()-tk.remS > 300000){
      loudBeep(); vib([500,200,300,200,500]);
      var a = (DB.activities||[])[tk.actIdx]||'专注中';
      var t = $('remind-toast');
      t.textContent = a+' — 已经5分钟了，回来专注!';
      t.classList.add('show');
      setTimeout(function(){t.classList.remove('show');},3000);
      tk.remS = Date.now();
    }
  }, 60000);
};
tk._stopReminder = function(){ if(tk.remT){ clearInterval(tk.remT); tk.remT=null; } };
tk.start = function(){
  tap();
  if(tk.running) return;
  if(tk.paused){ tk.paused=false; tk.stored=tk._elapsed(); } else tk.stored=0;
  tk.running=true;
  tk.startT = Date.now()-tk.stored*1000;
  $('track-emoji').classList.add('running');
  $('btn-play').style.display='none';
  $('btn-pause').style.display='';
  tk._updLbl(); tk._updClock(); tk._updRange(); tk.render();
  tk.timer = setInterval(function(){tk._updClock();tk._updRange();},200);
  tk._startReminder();
  nfy('开始计时', (DB.activities||[])[tk.actIdx]||'专注中');
};
tk.pause = function(){
  tap();
  if(!tk.running) return;
  tk.running=false; tk.paused=true;
  tk.stored = Math.floor((Date.now()-tk.startT)/1000);
  clearInterval(tk.timer); tk.timer=null;
  tk._stopReminder();
  $('track-emoji').classList.remove('running');
  $('btn-play').style.display='';
  $('btn-pause').style.display='none';
  tk._updRange(); tk.render();
};
tk.stop = function(){
  tap();
  if(!tk.running && !tk.paused) return;
  var s = tk.paused ? tk.stored : Math.floor((Date.now()-tk.startT)/1000);
  if(s < 5){
    tk.running=false; tk.paused=false; tk.stored=0; tk.startT=null;
    clearInterval(tk.timer); tk.timer=null; tk._stopReminder();
    $('btn-play').style.display=''; $('btn-pause').style.display='none';
    $('track-clock').textContent='00:00:00'; $('track-range').textContent='--:-- 至 --:--';
    tk.render(); return;
  }
  var a = (DB.activities||[])[tk.actIdx]||'自定义';
  var sD = tk.running ? new Date(tk.startT) : new Date(Date.now()-tk.stored*1000);
  var eD = new Date(sD.getTime()+s*1000);
  DB.timeRecords.push({
    id:UID(), activity:a, seconds:s,
    startTime:sD.toISOString(), endTime:eD.toISOString(),
    date:TD(), createdAt:N().toISOString()
  });
  tk.running=false; tk.paused=false; tk.stored=0; tk.startT=null;
  clearInterval(tk.timer); tk.timer=null; tk._stopReminder();
  save();
  $('btn-play').style.display=''; $('btn-pause').style.display='none';
  $('track-clock').textContent='00:00:00'; $('track-range').textContent='--:-- 至 --:--';
  $('track-emoji').classList.remove('running');
  tk.render();
  vib([50,30,50]); loudBeep();
  if(curM!=='track') S.dash.render();
};

        '<div class="li-info"><div class="li-name">'+QS(nm)+tr+'</div><div class="li-date">'+r.date+'</div></div>'+
        '<div class="li-val" style="color:var(--accent)">'+HMS(r.seconds)+'</div>'+
        '<span class="li-del" onclick="event.stopPropagation();tk.delRec(\''+r.id+'\')">✕</span></div>';
    }, false);
  }
  tk._renderBtns(); tk._updLbl();
  if(!tk.running && !tk.paused) $('track-clock').textContent='00:00:00';
};

tk._drawChart = function(recs){
  var c=$('tchart');
  if(!c || curM!=='track') return;
  var w=c.width=c.offsetWidth*2;
  var h=c.height=c.offsetHeight*2;
  var ctx=c.getContext('2d');
  ctx.clearRect(0,0,w,h);
  if(!recs.length) return;
  var days=[];
  for(var i=6;i>=0;i--){
    var d=N(); d.setDate(d.getDate()-i);
    var ds=d.toISOString().split('T')[0];
    var v=recs.filter(function(r){return r.date===ds;}).reduce(function(s,r){return s+r.seconds;},0);
    days.push({label:(d.getMonth()+1)+'/'+d.getDate(), val:Math.round(v/60)});
  }
  var mx=Math.max.apply(null,days.map(function(d){return d.val;}))||1;
  var bw=(w-60)/days.length-8, px=40;
  days.forEach(function(d,i){
    var x=px+i*(bw+8), bh=Math.max(4,(d.val/mx)*(h-60));
    ctx.fillStyle='rgba(212,168,83,0.5)'; ctx.fillRect(x,h-40-bh,bw,bh);
    ctx.fillStyle='#8C8882'; ctx.font='14px sans-serif'; ctx.textAlign='center'; ctx.fillText(d.label,x+bw/2,h-10);
    if(d.val>0){ ctx.fillStyle='#2D2926'; ctx.font='12px sans-serif'; ctx.fillText(d.val+'m',x+bw/2,h-44-bh); }
  });
};

// -- UNDO --
S.undo = {d_type:null, d_data:null, d_idx:-1, ti:null};
S.undo.set = function(type, data, idx){
  this.d_type = type;
  this.d_data = data;
  this.d_idx = idx;
};
S.undo.show = function(msg){
  clearTimeout(this.ti);
  $('undo-msg').textContent = msg;
  $('undo').classList.add('on');
  var self = this;
  this.ti = setTimeout(function(){
    self.d_type = null; self.d_data = null;
    $('undo').classList.remove('on');
  }, 4000);
};
S.undo.exec = function(){
  var type = this.d_type;
  var data = this.d_data;
  var idx = this.d_idx;
  if(!type) return;

  if(type === 'batch'){
    data.forEach(function(t){ DB.tasks.push(t); });
  } else {
    var arr = type==='task' ? DB.tasks : type==='expense' ? DB.expenses : type==='word' ? DB.wordRecords : DB.timeRecords;
    arr.splice(idx, 0, data);
  }
  this.d_type = null; this.d_data = null;
  save();
  var renders = {dash:S.dash.render, task:S.task.render, expense:S.expense.render, word:S.word.render, track:tk.render};
  renders[curM]();
  $('undo').classList.remove('on');
};

// -- IO --
S.io = {};
S.io.export = function(){
  var b = new Blob([JSON.stringify(DB,null,2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = 'daily-'+TD()+'.json';
  a.click();
};
S.io.import = function(){
  var inp = document.createElement('input');
  inp.type = 'file'; inp.accept = '.json';
  inp.onchange = function(e){
    var f = e.target.files[0]; if(!f) return;
    var r = new FileReader();
    r.onload = function(ev){
      try{
        var d = JSON.parse(ev.target.result);
        var tc = (d.tasks||[]).length, ec = (d.expenses||[]).length,
            wc = (d.wordRecords||[]).length, rc = (d.timeRecords||[]).length;
        if(confirm('导入 '+tc+' 任务 / '+ec+' 账单 / '+wc+' 单词 / '+rc+' 安排?')){
          function mergeArr(target, src){
            var ids = new Set(target.map(function(x){return x.id;}));
            src.forEach(function(x){ if(!ids.has(x.id)) target.push(x); });
          }
          if(d.tasks) mergeArr(DB.tasks, d.tasks);
          if(d.expenses) mergeArr(DB.expenses, d.expenses);
          if(d.wordRecords) mergeArr(DB.wordRecords, d.wordRecords);
          if(d.timeRecords) mergeArr(DB.timeRecords, d.timeRecords);
          DB.pomos = Math.max(DB.pomos||0, d.pomos||0);
          if(d.activities) DB.activities = d.activities;
          if(d.monthBudget) DB.monthBudget = d.monthBudget;
          save();
          var renders = {dash:S.dash.render, task:S.task.render, expense:S.expense.render, word:S.word.render, track:tk.render};
          renders[curM]();
        }
      }catch(ex){ alert('格式错误'); }
    };
    r.readAsText(f);
  };
  inp.click();
};
var exportAll = function(){ S.io.export(); };

        if(nw.state === 'installed' && navigator.serviceWorker.controller){

      });
    });
  });
}
