<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>自律日常</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="自律日常">
<link rel="apple-touch-icon" href="./icons/apple-icon.png">
<meta name="theme-color" content="#F5F0EA">
<link rel="manifest" href="./manifest.json">
<style>
:root{--bg:#F5F0EA;--surface:#EDE7DF;--surface2:#E5DED5;--border:rgba(0,0,0,0.05);--shadow:0 1px 3px rgba(0,0,0,0.04);--text:#2D2926;--text2:#8C8882;--text3:#B5B0AA;--accent:#C2653A;--accent2:#D4956A;--accent3:#7D9B5A;--accent4:#5B8C9E;--danger:#D14343;--success:#5B9B6F;--warn:#D4952A;--font:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;--radius:14px;--safe-b:env(safe-area-inset-bottom,10px);--safe-t:env(safe-area-inset-top,0px)}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;user-select:none;-webkit-user-select:none}

header{padding:12px 18px;padding-top:calc(12px + var(--safe-t));display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
header h1{font-size:1.15rem;font-weight:700;display:flex;align-items:center;gap:8px;letter-spacing:-0.3px}
header h1 .dot{width:7px;height:7px;border-radius:50%}
header .time{font-size:0.9rem;font-weight:600;font-variant-numeric:tabular-nums;color:var(--text2)}
.dot-task{background:var(--accent)}.dot-expense{background:var(--accent2)}.dot-word{background:var(--accent3)}.dot-track{background:var(--accent4)}.dot-dash{background:#8B6914}

.btn-base{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.btn-base:active{background:var(--surface2);transform:scale(0.92)}

.pomo-bar{margin:0 16px 6px;padding:10px 14px;border-radius:var(--radius);background:rgba(194,101,58,0.04);border:1px solid rgba(194,101,58,0.12);display:none;align-items:center;gap:10px;flex-shrink:0}
.pomo-bar.on{display:flex}
.pomo-timer{font-size:1.4rem;font-weight:800;font-variant-numeric:tabular-nums;color:var(--accent)}
.pomo-label{font-size:0.62rem;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.pomo-bar .btn-stop{width:28px;height:28px;border-radius:50%;border:1.5px solid rgba(209,67,67,0.2);background:transparent;color:var(--danger);cursor:pointer;font-size:0.65rem;margin-left:auto;flex-shrink:0}

.nav-bar{display:flex;flex-shrink:0;border-top:1px solid var(--border);background:var(--bg);padding-bottom:var(--safe-b)}
.nav-bar button{flex:1;min-width:0;padding:5px 2px 1px;border:none;background:transparent;color:var(--text3);font-family:var(--font);font-size:0.56rem;cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;align-items:center}
.nav-bar button .ni{font-size:0.95rem}
.nav-bar button.on{color:var(--accent);font-weight:600}.nav-bar button.on.n2{color:var(--accent2)}.nav-bar button.on.n3{color:var(--accent3)}.nav-bar button.on.n4{color:var(--accent4)}.nav-bar button.on.n0{color:#8B6914}

.panel{display:none;flex-direction:column;flex:1;overflow:hidden}
.panel.on{display:flex}
.scroll{flex:1;overflow-y:auto;padding:0 16px 6px;-webkit-overflow-scrolling:touch}
.scroll::-webkit-scrollbar{display:none}
.empty{padding:50px 20px;text-align:center;color:var(--text3);font-size:0.82rem}
.empty .ei{font-size:2.2rem;margin-bottom:8px;opacity:0.4}

.tabs{display:flex;padding:0 16px 5px;gap:3px;flex-shrink:0}
.tabs button{padding:5px 12px;border-radius:20px;border:none;background:transparent;color:var(--text2);font-family:var(--font);font-size:0.72rem;cursor:pointer;transition:all 0.15s}
.tabs button.on{background:var(--surface2);color:var(--text);font-weight:600}

.inline-add{display:flex;gap:5px;padding:0 16px 8px;flex-shrink:0;align-items:center}
.inline-add input{padding:9px 10px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:0.82rem;outline:none;flex:1}
.inline-add .add-btn{width:40px;height:40px;border-radius:var(--radius);border:none;color:#fff;font-size:1.05rem;cursor:pointer;flex-shrink:0;transition:all 0.12s}
.inline-add .add-btn:active{transform:scale(0.9)}

.bot-bar{padding:5px 16px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:5px}
.bot-bar button{flex:1;padding:6px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text2);font-family:var(--font);font-size:0.65rem;cursor:pointer;transition:all 0.12s}
.bot-bar button:active{background:var(--surface2)}
.bot-bar button.on{color:var(--accent);border-color:rgba(194,101,58,0.3);font-weight:600}

.list-item{display:flex;align-items:center;gap:7px;padding:9px 10px;background:var(--surface);border-radius:var(--radius);margin-bottom:3px;border:1px solid var(--border);box-shadow:var(--shadow)}
.list-item .li-icon{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:0.7rem;flex-shrink:0}
.list-item .li-info{flex:1;min-width:0}.list-item .li-name{font-size:0.76rem;font-weight:500}.list-item .li-date{font-size:0.58rem;color:var(--text3)}
.list-item .li-val{font-weight:700;font-size:0.82rem;flex-shrink:0}
.list-item .li-del{font-size:0.58rem;color:var(--text3);cursor:pointer;padding:3px;opacity:0;transition:all 0.12s}.list-item:active .li-del{opacity:1}
.date-head{font-size:0.62rem;color:var(--text3);padding:5px 0 3px;font-weight:600}

/* DASHBOARD */
.dash-summary{display:flex;gap:5px;padding:6px 16px;flex-shrink:0}
.dash-row{display:flex;gap:5px;padding:0 16px 6px;flex-shrink:0}
.ds-card{flex:1;background:var(--surface);border-radius:var(--radius);padding:12px 8px;border:1px solid var(--border);box-shadow:var(--shadow);cursor:pointer;transition:all 0.12s}
.ds-card:active{background:var(--surface2)}
.ds-card .dv{font-size:1.3rem;font-weight:800}.ds-card .dl{font-size:0.58rem;color:var(--text2);margin-top:2px}
.ds-card .df{font-size:0.65rem;color:var(--text3);margin-top:1px}
.budget-bar{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-top:6px}
.budget-bar .bf{height:100%;border-radius:3px;transition:width 0.4s}
.overbudget .dv{color:var(--danger)!important}

/* TASK */
.task-add{display:flex;gap:5px;padding:0 16px 8px;flex-shrink:0}
.task-add input{flex:1;padding:9px 12px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:0.82rem;outline:none}
.task-add input:focus{border-color:var(--accent)}
.task-add .prio{width:34px;height:41px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.85rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.task-add .rep{width:34px;height:41px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.65rem;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s;font-family:var(--font)}
.task-add .add-btn{width:42px;height:41px;border-radius:var(--radius);border:none;background:var(--accent);color:#fff;font-size:1.1rem;cursor:pointer;flex-shrink:0;transition:all 0.12s}
.task-add .add-btn:active,.task-add .prio:active,.task-add .rep:active{transform:scale(0.9)}

.tcard-wrap{margin-bottom:5px}
.tcard{display:flex;flex-direction:column;padding:10px 12px;background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.tcard.done{opacity:0.4}
.tcard .main-row{display:flex;align-items:center;gap:7px}
.tcheck{width:18px;height:18px;border-radius:50%;flex-shrink:0;border:2px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s cubic-bezier(.4,0,.2,1)}
.tcheck.done{background:var(--success);border-color:var(--success);animation:pop 0.3s cubic-bezier(.4,0,.2,1)}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}
.tcheck.done::after{content:"✓";color:#fff;font-size:0.55rem;font-weight:700}
.ttxt{flex:1;font-size:0.82rem;line-height:1.4;word-break:break-word;cursor:pointer}
.tcard.done .ttxt{text-decoration:line-through;color:var(--text3)}
.tprio{width:5px;height:5px;border-radius:50%;flex-shrink:0}.tprio-1{background:var(--success)}.tprio-2{background:var(--warn)}.tprio-3{background:var(--danger)}
.tdue{font-size:0.62rem;color:var(--text3);flex-shrink:0}.tdue.ov{color:var(--danger)}
.tag-re{font-size:0.58rem;padding:1px 5px;border-radius:8px;background:rgba(91,140,158,0.1);color:var(--accent4);flex-shrink:0}
.tpomo{width:24px;height:24px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:0.65rem;flex-shrink:0;color:var(--accent);transition:all 0.12s;display:flex;align-items:center;justify-content:center}
.tpomo.on{color:var(--success);background:rgba(91,155,111,0.08)}
.tdel{width:24px;height:24px;border-radius:50%;border:none;background:transparent;cursor:pointer;font-size:0.65rem;flex-shrink:0;color:var(--text3);transition:all 0.12s}.tdel:active{color:var(--danger);transform:scale(0.85)}
.chkl{margin-top:3px;padding-left:25px}.chkl .ci{display:flex;align-items:center;gap:5px;padding:2px 0;font-size:0.73rem;color:var(--text2);cursor:pointer}
.chkl .ci .cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--text3);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all 0.12s}
.chkl .ci .cb.done{background:var(--success);border-color:var(--success)}.chkl .ci .cb.done::after{content:"✓";color:#fff;font-size:0.4rem;font-weight:700}
.chkl .ci.done .ct{text-decoration:line-through;color:var(--text3)}.chkl .progress{font-size:0.58rem;color:var(--text3);margin-bottom:2px}

/* EXPENSE */
.exp-sum{display:flex;gap:5px;padding:0 16px 6px;flex-shrink:0}
.exp-c{flex:1;background:var(--surface);border-radius:var(--radius);padding:10px;border:1px solid var(--border);text-align:center;box-shadow:var(--shadow)}
.exp-c .ev{font-size:1.2rem;font-weight:800}.exp-c .el{font-size:0.58rem;color:var(--text2);margin-top:1px}
.exp-c.in .ev{color:var(--success)}.exp-c.out .ev{color:var(--danger)}.exp-c.net .ev{color:var(--accent)}
.eia.in{color:var(--success)}.eia.out{color:var(--danger)}
.exp-mn{display:flex;align-items:center;justify-content:center;gap:6px;padding:0 16px 4px;flex-shrink:0}
.exp-mn button{width:22px;height:22px;border-radius:50%;border:1px solid var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:0.7rem;transition:all 0.12s}
.exp-mn .ml{font-size:0.76rem;font-weight:700}
.exp-add .amt{width:70px;padding:9px 5px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:0.95rem;font-weight:700;outline:none;text-align:center}
.exp-add .ecat{padding:7px 9px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.7rem;white-space:nowrap;font-family:var(--font);color:var(--text);flex-shrink:0;transition:all 0.12s}
.budget-settings{padding:0 16px 6px;flex-shrink:0;display:flex;gap:6px;align-items:center;font-size:0.65rem;color:var(--text2)}
.budget-settings input{width:90px;padding:5px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);font-size:0.7rem;outline:none;text-align:right}
.budget-settings button{padding:4px 10px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:0.65rem;color:var(--text2);font-family:var(--font)}
.budget-warn{font-size:0.6rem;padding:0 16px 4px;flex-shrink:0;display:none}
.budget-warn.show{display:block;color:var(--danger);animation:glitch 1s infinite}@keyframes glitch{0%,100%{opacity:1}50%{opacity:0.5}}

/* WORD */
.word-stats{display:flex;gap:5px;padding:4px 16px 6px;flex-shrink:0}
.word-card{flex:1;background:var(--surface);border-radius:var(--radius);padding:10px 6px;border:1px solid var(--border);text-align:center;box-shadow:var(--shadow)}
.word-card .wv{font-size:1.25rem;font-weight:800;color:var(--accent3)}.word-card .wl{font-size:0.58rem;color:var(--text2);margin-top:1px}
.word-add .wnum{width:70px;text-align:center;font-weight:700}
.word-add .wrev{width:60px;text-align:center;font-size:0.72rem}
.wchart-wrap{padding:4px 16px 6px;flex-shrink:0}
.wchart-wrap canvas{width:100%;height:80px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border)}

/* TRACK */
.track-main{display:flex;flex-direction:column;align-items:center;padding:12px 16px 6px;flex-shrink:0}
.track-emoji{font-size:2.5rem;transition:all 0.3s}
.track-emoji.running{animation:bounce 0.5s infinite alternate}
@keyframes bounce{from{transform:scale(1)}to{transform:scale(1.1)}}
.track-clock{font-size:2.6rem;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:2px;color:var(--accent)}
.track-range{font-size:0.7rem;color:var(--text3);margin:2px 0 6px;font-variant-numeric:tabular-nums}
.track-label{font-size:0.8rem;color:var(--text2);margin-bottom:8px}
.track-label .act-name{color:var(--text);font-weight:600}
.track-ctrl{display:flex;gap:12px;margin-bottom:8px}
.track-ctrl button{width:52px;height:52px;border-radius:50%;border:none;font-size:1.3rem;cursor:pointer;transition:all 0.12s;font-family:var(--font)}
.track-ctrl .btn-play{background:var(--accent);color:#fff;box-shadow:0 3px 12px rgba(194,101,58,0.25)}
.track-ctrl .btn-pause{background:var(--warn);color:#fff}
.track-ctrl .btn-stop{background:var(--danger);color:#fff;font-size:0.9rem}
.track-ctrl button:active{transform:scale(0.88)}
.track-picker{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-bottom:6px}
.track-picker button{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text2);font-family:var(--font);font-size:0.7rem;cursor:pointer;transition:all 0.12s;white-space:nowrap;position:relative}
.track-picker button:active{background:var(--surface2)}
.track-picker button.on{border-color:var(--accent);color:var(--accent);background:rgba(194,101,58,0.06);font-weight:600}
.track-picker .add-act{padding:5px 10px;border-radius:20px;border:1px dashed var(--border);color:var(--text3);font-size:0.68rem;cursor:pointer}
.track-stats{display:flex;gap:5px;padding:0 16px 6px;flex-shrink:0}
.track-stats .ts{flex:1;background:var(--surface);border-radius:var(--radius);padding:9px 6px;text-align:center;border:1px solid var(--border);box-shadow:var(--shadow)}
.track-stats .ts .tv{font-size:1.15rem;font-weight:800;color:var(--accent)}.track-stats .ts .tl{font-size:0.58rem;color:var(--text2);margin-top:1px}
.track-records{padding:2px 16px 4px;flex-shrink:0;font-size:0.68rem;color:var(--text2);font-weight:600}

.remind-toast{position:fixed;top:calc(var(--safe-t) + 50px);left:50%;transform:translateX(-50%);z-index:300;background:var(--accent);color:#fff;padding:14px 20px;border-radius:var(--radius);font-size:0.8rem;display:none;white-space:nowrap;box-shadow:0 8px 30px rgba(194,101,58,0.3);animation:toastIn 0.3s ease-out;font-weight:600;letter-spacing:0.5px}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.remind-toast.show{display:block}

.undo{position:fixed;bottom:calc(var(--safe-b) + 80px);left:50%;transform:translateX(-50%);z-index:300;background:var(--surface);border:1px solid var(--border);padding:7px 13px;border-radius:20px;font-size:0.74rem;display:none;gap:7px;align-items:center;box-shadow:0 8px 30px rgba(0,0,0,0.08)}
.undo.on{display:flex}.undo button{background:var(--accent);color:#fff;border:none;padding:3px 9px;border-radius:12px;font-family:var(--font);font-size:0.68rem;cursor:pointer;font-weight:600}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.2);z-index:200;justify-content:center;align-items:flex-end;backdrop-filter:blur(6px)}
.overlay.on{display:flex}
.sheet{width:100%;max-width:500px;background:var(--surface);border-radius:20px 20px 0 0;padding:6px 18px 16px;padding-bottom:calc(16px + var(--safe-b));animation:slU 0.3s cubic-bezier(.4,0,.2,1);max-height:85vh;overflow-y:auto}
@keyframes slU{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet h3{font-size:0.9rem;margin-bottom:10px}
.sheet .row{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.sheet .row label{width:44px;font-size:0.68rem;color:var(--text2)}
.sheet input,.sheet select{flex:1;padding:8px 10px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:0.8rem;outline:none}
.sheet .btns{display:flex;gap:7px;margin-top:12px}
.sheet .btns .save{flex:2;padding:10px;border-radius:9px;border:none;background:var(--accent);color:#fff;font-size:0.85rem;font-weight:700;cursor:pointer;font-family:var(--font)}
.sheet .btns .cancel{flex:1;padding:10px;border-radius:9px;border:1px solid var(--border);background:transparent;color:var(--text2);font-size:0.82rem;cursor:pointer;font-family:var(--font)}
.sheet .srow{display:flex;gap:4px;margin-bottom:4px;align-items:center}
.sheet .srow input{flex:1;padding:6px 7px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--font);font-size:0.73rem;outline:none}
.sheet .srow .rs{width:20px;height:20px;border-radius:50%;border:none;background:transparent;color:var(--danger);cursor:pointer;font-size:0.58rem}
.sheet .adc{font-size:0.66rem;color:var(--accent);cursor:pointer;display:inline-block;font-weight:500;margin-bottom:6px}
</style>
</head>
<body>

<svg style="position:absolute;width:0;height:0"><defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#C2653A"/><stop offset="100%" stop-color="#D4956A"/></linearGradient></defs></svg>

<header>
  <h1><span class="dot dot-task" id="logo-dot"></span><span id="logo-text">任务</span></h1>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="btn-base" id="pomo-btn" onclick="tap();togglePomo()" title="番茄钟">🍅</button>
    <div class="time" id="live-time">00:00</div>
  </div>
</header>

<div class="pomo-bar" id="pomo-bar">
  <div class="pomo-timer" id="pomo-timer">25:00</div>
  <div class="pomo-label" id="pomo-label">专注中</div>
  <button class="btn-stop" onclick="tap();stopPomo()">✕</button>
</div>
<div class="remind-toast" id="remind-toast"></div>

<!-- DASHBOARD -->
<div class="panel on" id="p-dash">
  <div class="dash-summary" style="padding-top:8px">
    <div class="ds-card" onclick="switchMode('task')"><div class="dv" id="d-tasks" style="color:var(--accent)">0</div><div class="dl">待办任务</div><div class="df" id="d-tasks-sub"></div></div>
    <div class="ds-card" onclick="switchMode('expense')"><div class="dv" id="d-spend" style="color:var(--danger)">¥0</div><div class="dl">今日支出</div><div class="df" id="d-spend-sub"></div></div>
  </div>
  <div class="dash-row">
    <div class="ds-card" onclick="switchMode('word')"><div class="dv" id="d-words" style="color:var(--accent3)">0</div><div class="dl">今日新词</div></div>
    <div class="ds-card" onclick="switchMode('track')"><div class="dv" id="d-time" style="color:var(--accent4)">0m</div><div class="dl">今日安排</div></div>
    <div class="ds-card" onclick="switchMode('track')"><div class="dv" id="d-pomo" style="color:#F472B6">0</div><div class="dl">🍅 番茄</div></div>
  </div>
  <div class="dash-row" id="d-budget-row" style="display:none">
    <div class="ds-card" id="d-budget-card">

  <div class="row"><label>重复</label><select id="e-repeat"><option value="">不重复</option><option value="daily">🔄 每天</option><option value="weekly">🔁 每周</option><option value="monthly">🔂 每月</option></select></div>
  <div style="font-size:0.7rem;color:var(--text2);font-weight:500;margin:6px 0 3px">📝 任务选项</div>

</div></div>

<script>
/* UTILS */
const $=id=>document.getElementById(id);
const n=()=>new Date();
const td=()=>n().toISOString().split('T')[0];
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const hms=s=>{s=s||0;let h=Math.floor(s/3600),m=Math.floor((s%3600)/60);return h>0?h+'h'+m+'m':m>0?m+'m':'<1m'};
const esc=s=>{let d={"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"};return s.replace(/[&<>"']/g,c=>d[c])};
const escA=s=>s.replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const hm=x=>x.getHours().toString().padStart(2,"0")+":"+x.getMinutes().toString().padStart(2,"0");

/* Audio */
let _acA=null;
function beep(){try{if(!_acA)_acA=new(window.AudioContext||window.webkitAudioContext)();let o=_acA.createOscillator(),g=_acA.createGain();o.connect(g);g.connect(_acA.destination);o.frequency.value=1200;o.type='sine';g.gain.setValueAtTime(0.12,_acA.currentTime);g.gain.exponentialRampToValueAtTime(0.001,_acA.currentTime+0.07);o.start(_acA.currentTime);o.stop(_acA.currentTime+0.07)}catch(e){}}
function loudBeep(){try{if(!_acA)_acA=new(window.AudioContext||window.webkitAudioContext)();for(let i=0;i<3;i++){let o=_acA.createOscillator(),g=_acA.createGain();o.connect(g);g.connect(_acA.destination);o.frequency.value=800+i*300;o.type='square';g.gain.setValueAtTime(0.25,_acA.currentTime+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,_acA.currentTime+i*0.1+0.1);o.start(_acA.currentTime+i*0.1);o.stop(_acA.currentTime+i*0.1+0.1)}}catch(e){}}
const vib=p=>navigator.vibrate&&navigator.vibrate(p);
const tap=()=>{vib(6);beep()};
const nfy=(t,b)=>{if("Notification"in window&&Notification.permission==="granted")new Notification(t,{body:b,icon:"./icons/icon-192.png",tag:"daily"})};

/* DATA */
const KEY="daily-v4";
let DB={tasks:[],expenses:[],wordRecords:[],timeRecords:[],activities:["📚 读书","💻 学习","🏃 运动","🎧 练琴","✍️ 写作"],pomos:0,workTime:25,monthBudget:0};
function load(){try{let d=JSON.parse(localStorage.getItem(KEY));if(!d)return;DB=d;DB.wordRecords=DB.wordRecords||[];DB.expenses=DB.expenses||[];DB.timeRecords=DB.timeRecords||[];DB.activities=DB.activities||["📚 读书","💻 学习","🏃 运动","🎧 练琴","✍️ 写作"];DB.monthBudget=DB.monthBudget||0;DB.expenses=DB.expenses.map(e=>{e.type=e.type||'expense';return e})}catch(e){}}
const save=()=>{localStorage.setItem(KEY,JSON.stringify(DB));
  /* IndexedDB backup */ try{let req=indexedDB.open("daily-backup",1);req.onupgradeneeded=()=>req.result.createObjectStore("data");req.onsuccess=()=>{let tx=req.result.transaction("data","readwrite");tx.objectStore("data").put(DB,"main");req.result.close()}}catch(e){}}
const find=(a,i)=>a.find(x=>x.id===i);
const findI=(a,i)=>a.findIndex(x=>x.id===i);

/* Restore from IndexedDB if localStorage empty */
function restoreBackup(){if(DB.tasks.length||DB.expenses.length)return;try{let req=indexedDB.open("daily-backup",1);req.onupgradeneeded=()=>req.result.createObjectStore("data");req.onsuccess=()=>{let tx=req.result.transaction("data","readonly"),d=tx.objectStore("data").get("main");d.onsuccess=()=>{if(d.result){DB=Object.assign(DB,d.result);save()}};req.result.close()}}catch(e){}}

function renderDateGrouped(recs,renderItem,cv,totalFn){
  if(!recs.length)return'<div class="empty"><div class="ei">📋</div>暂无记录</div>';
  let g={};recs.forEach(r=>{let d=r.date;if(!g[d])g[d]=[];g[d].push(r)});
  return Object.keys(g).sort().reverse().map(dt=>{
    let items=g[dt],dT=items.reduce(totalFn||((s,r)=>{let v=typeof r.amount!=='undefined'?(r.type==='income'?r.amount:-r.amount):r.seconds||0;return s+v}),0);
    let sign=dT>=0?'+':'',sc=dT>=0?'var(--success)':'var(--danger)';
    return'<div><div class="date-head">📅 '+dt+' <span style="color:'+(cv?sc:'var(--accent)')+'">'+(typeof items[0]?.amount!=='undefined'?sign+dT.toFixed(2):hms(Math.abs(dT)))+'</span></div>'+items.map(renderItem).join("")+'</div>';
  }).join("");
}

/* MODE */
let curM="dash";
const P=["dash","task","expense","word","track"];
const MI={dash:["今日摘要","dot-dash"],task:["任务","dot-task"],expense:["记账","dot-expense"],word:["单词","dot-word"],track:["安排","dot-track"]};
function switchMode(m){tap();curM=m;let mi=MI[m];
  P.forEach(k=>{$("p-"+k).classList.toggle("on",k===m);let nb=$("nav-"+k);if(nb)nb.classList.toggle("on",k===m)});
  $("logo-text").textContent=mi[0];$("logo-dot").className="dot "+mi[1];
  $("pomo-btn").style.display=m==="task"?"":"none";
  let R={dash:S.dash.render,task:S.task.render,expense:S.expense.render,word:S.word.render,track:S.track.render};R[m]();
}

/* POMODORO — now Date.now() diff based */
let po={id:null,timer:null,startMs:0,totalMs:0,qPause:false,isBreak:false};
function togglePomo(){let w=prompt("番茄钟时长（分钟）","25");if(w){DB.workTime=parseInt(w)||25;save()}}
function startPomo(id){tap();let t=find(DB.tasks,id);if(!t||t.done)return;if(po.timer)stopPomo();
  po.id=id;po.isBreak=false;po.totalMs=(DB.workTime||25)*60*1000;po.startMs=Date.now();po.qPause=false;
  $("pomo-bar").classList.add("on");$("pomo-label").textContent=t.text;poTick();S.task.render();
  po.timer=setInterval(()=>{poTick()},500);
  if("Notification"in window&&Notification.permission==="default")Notification.requestPermission();
}
function poTick(){let el=Date.now()-po.startMs,left=Math.max(0,Math.ceil((po.totalMs-el)/1000));
  if(el>=po.totalMs){if(!po.isBreak){DB.pomos++;save();po.isBreak=true;po.totalMs=5*60*1000;po.startMs=Date.now();$("pomo-label").textContent="☕ 休息";nfy("🍅 完成！","休息 5 分钟");vib([200,100,200]);loudBeep()}else{stopPomo();return}}
  $("pomo-timer").textContent=String(Math.floor(left/60)).padStart(2,"0")+":"+String(left%60).padStart(2,"0")
}
function stopPomo(){tap();if(po.timer){clearInterval(po.timer);po.timer=null}po.id=null;$("pomo-bar").classList.remove("on");S.task.render()}

/* S = modules */
const S={};

/* -- DASHBOARD -- */
S.dash={};
S.dash.render=()=>{
  if(curM!=="dash")return;
  let today=td(),at=DB.tasks.filter(t=>!t.done),ad=at.filter(t=>t.due===today||!t.due).length;
  let et=DB.expenses.filter(e=>e.date===today),es=et.filter(e=>e.type!=="income").reduce((s,e)=>s+e.amount,0);
  let wt=DB.wordRecords.filter(r=>r.date===today),wn=wt.reduce((s,r)=>s+(r.newWords||0),0);
  let tt=DB.timeRecords.filter(r=>r.date===today),ts=tt.reduce((s,r)=>s+r.seconds,0);
  $("d-tasks").textContent=at.length;$("d-tasks-sub").textContent="今日到期 "+ad+" 个";
  $("d-spend").textContent="¥"+es.toFixed(2);$("d-spend-sub").textContent=et.filter(e=>e.type==="income").length?"含 "+et.filter(e=>e.type==="income").length+" 笔收入":"无收入记录";
  $("d-words").textContent=wn;$("d-time").textContent=hms(ts);$("d-pomo").textContent=DB.pomos||0;
  // Budget
  if(DB.monthBudget>0){let bd=$("d-budget-row");bd.style.display="";let ym=n().toISOString().slice(0,7),mSp=DB.expenses.filter(e=>e.type!=="income"&&e.date.slice(0,7)===ym).reduce((s,e)=>s+e.amount,0),pct=Math.min(100,Math.round(mSp/DB.monthBudget*100));
    $("d-budget-val").textContent="¥"+mSp.toFixed(0);$("d-budget-bar").style.width=pct+"%";$("d-budget-label").textContent="预算 ¥"+DB.monthBudget+" / "+(mSp>DB.monthBudget?"超支 ¥"+(mSp-DB.monthBudget).toFixed(0):"剩余 ¥"+(DB.monthBudget-mSp).toFixed(0));if(mSp>DB.monthBudget)$("d-budget-card").classList.add("overbudget")}else $("d-budget-row").style.display="none";
};

/* -- TASK -- */
S.task={prio:"low",rep:"",tab:"active"};
S.task.PE={high:"🔴",mid:"🟡",low:"🟢"};S.task.PN={high:3,mid:2,low:1};S.task.RE={"":"1×",daily:"🔄d",weekly:"🔁w",monthly:"🔂m"};
S.task.cyclePrio=()=>{let o=["low","mid","high"];S.task.prio=o[(o.indexOf(S.task.prio)+1)%3];$("prio-btn").textContent=S.task.PE[S.task.prio]};
S.task.cycleRepeat=()=>{let o=["","daily","weekly","monthly"],i=(o.indexOf(S.task.rep)+1)%4;S.task.rep=o[i];$("rep-btn").textContent=S.task.RE[o[i]]};
S.task.setTab=t=>{S.task.tab=t;$("tab-active").classList.toggle("on",t==="active");$("tab-done").classList.toggle("on",t==="done");S.task.render()};
S.task.add=()=>{
  let t=$("task-input").value.trim();if(!t)return;let due="",today=td();
  if(/今天/.test(t)){due=today;t=t.replace(/今天/g,"").trim()}else if(/明天/.test(t)){let d=n();d.setDate(d.getDate()+1);due=d.toISOString().split('T')[0];t=t.replace(/明天/g,"").trim()}
  DB.tasks.push({id:uid(),text:t,priority:S.task.prio,repeat:S.task.rep,due:due,done:false,checklist:[],createdAt:n().toISOString()});
  save();$("task-input").value="";S.task.prio="low";S.task.rep="";$("prio-btn").textContent="🟢";$("rep-btn").textContent="1×";S.task.render();
  if(curM!=="task")S.dash.render()
};
S.task.toggle=id=>{let t=find(DB.tasks,id);if(t){t.done=!t.done;if(t.done&&t.repeat)S.task.handleRepeat(t);save();S.task.render();tap()}};
S.task.handleRepeat=t=>{let next="";if(t.repeat==="daily"){let d=n();d.setDate(d.getDate()+1);next=d.toISOString().split('T')[0]}else if(t.repeat==="weekly"){let d=n();d.setDate(d.getDate()+7);next=d.toISOString().split('T')[0]}else if(t.repeat==="monthly"){let d=n();d.setMonth(d.getMonth()+1);next=d.toISOString().split('T')[0]}if(next){DB.tasks.push({id:uid(),text:t.text,priority:t.priority,repeat:t.repeat,due:next,done:false,checklist:t.checklist.map(c=>({text:c.text,done:false})),createdAt:n().toISOString()});save()}};
S.task.toggleChk=(tid,i)=>{tap();let t=find(DB.tasks,tid);if(t&&t.checklist[i]){t.checklist[i].done=!t.checklist[i].done;save();S.task.render()}};
S.task.del=id=>{tap();let i=findI(DB.tasks,id);if(i===-1)return;S.undo.set({k:"task",d:DB.tasks[i],i:i});DB.tasks.splice(i,1);save();S.task.render();S.undo.show("已删除")};
S.task.clearDone=()=>{tap();let dd=DB.tasks.filter(t=>t.done);if(!dd.length)return;S.undo.set({k:"batch",d:dd});DB.tasks=DB.tasks.filter(t=>!t.done);save();S.task.render();S.undo.show("已清除 "+dd.length+" 个")};

S.task.render=()=>{
  if(curM!=="task")return;
  let ts=DB.tasks.slice().sort((a,b)=>b.createdAt.localeCompare(a.createdAt)),today=td();
  ts=S.task.tab==="done"?ts.filter(t=>t.done):ts.filter(t=>!t.done);
  let el=$("task-list");
  if(!ts.length){el.innerHTML='<div class="empty"><div class="ei">'+(S.task.tab==="done"?"🎉":"📝")+'</div>'+(S.task.tab==="done"?"还没有完成的任务":"暂无待办任务")+'</div>';return}
  el.innerHTML=ts.map(t=>{
    let ov=t.due&&t.due<today&&!t.done,run=po.id===t.id;
    let ds='';if(t.due){if(t.due<today&&!t.done)ds='<span class="tdue ov">过期</span>';else ds='<span class="tdue">'+(t.due===today?"今天":t.due)+'</span>'}
    let rep='';if(t.repeat)rep='<span class="tag-re">'+S.task.RE[t.repeat]+'</span>';
    let clH='';let cl=t.checklist||[];
    if(cl.length){let dc=cl.filter(c=>c.done).length;clH='<div class="chkl"><div class="progress">'+dc+'/'+cl.length+'</div>'+cl.map((c,i)=>'<div class="ci'+(c.done?" done":"")+'" onclick="event.stopPropagation();S.task.toggleChk(\''+t.id+'\','+i+')"><div class="cb'+(c.done?" done":"")+'"></div><span class="ct">'+esc(c.text)+'</span></div>').join("")+'</div>'}

$("task-input").addEventListener("keydown",e=>{if(e.key==="Enter"){tap();S.task.add()}});
$("edit-sheet").addEventListener("click",function(e){if(e.target===this)S.task.closeEdit()});
$("exp-amount").addEventListener("keydown",e=>{if(e.key==="Enter"){tap();S.expense.add()}});
$("word-new").addEventListener("keydown",e=>{if(e.key==="Enter"){tap();S.word.add()}});
$("word-review").addEventListener("keydown",e=>{if(e.key==="Enter"){tap();S.word.add()}});
$("budget-amount").addEventListener("keydown",e=>{if(e.key==="Enter"){tap();S.expense.setBudget()}});
</script>
